function ProgressPhotos() {
  const [photos, setPhotos] = useState(() => {
    try { const s = localStorage.getItem('ds_progress_photos'); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [comparing, setComparing] = useState(false);

  function handleCapture(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize to max 400px to save localStorage space
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxSz = 400;
        const scale = Math.min(maxSz / img.width, maxSz / img.height, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        const entry = { date: localDate(), src: dataUrl };
        setPhotos(prev => {
          const next = [entry, ...prev].slice(0, 12); // Max 12 photos
          try { localStorage.setItem('ds_progress_photos', JSON.stringify(next)); } catch {}
          return next;
        });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <div className="flex items-center justify-between mb-3">
        <${SectionHeader} title=${"📸 " + t('Fotos de progreso')} />
        <label className="press-scale flex items-center gap-1.5 px-3 py-1.5 rounded-lg cursor-pointer"
          style=${{ background: T.accentDim, color: T.accent, fontSize: 11, fontWeight: 700 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          ${t('Capturar')}
          <input type="file" accept="image/*" capture="user" onChange=${handleCapture} className="hidden" />
        </label>
      </div>
      ${photos.length === 0 ? html`
        <div className="text-center py-6" style=${{ color: T.muted, fontSize: 12 }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke=${T.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style=${{ display: 'inline-block', marginBottom: 8, opacity: 0.5 }}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <div>${t('Toma fotos para ver tu transformación')}</div>
        </div>
      ` : html`
        ${photos.length >= 2 && html`
          <button onClick=${() => setComparing(!comparing)}
            className="w-full mb-3 py-2 rounded-lg press-scale text-center"
            style=${{ fontSize: 11, fontWeight: 700, color: T.accent, background: T.accentDim }}>
            ${comparing ? t('Ver todas') : t('Comparar primera vs última')}
          </button>
        `}
        ${comparing && photos.length >= 2 ? html`
          <div className="flex gap-3">
            <div className="flex-1">
              <img src=${photos[photos.length - 1].src} className="w-full rounded-xl" style=${{ aspectRatio: '3/4', objectFit: 'cover' }} />
              <div className="text-center mt-1" style=${{ fontSize: 10, color: T.muted }}>${photos[photos.length - 1].date}</div>
            </div>
            <div className="flex-1">
              <img src=${photos[0].src} className="w-full rounded-xl" style=${{ aspectRatio: '3/4', objectFit: 'cover' }} />
              <div className="text-center mt-1" style=${{ fontSize: 10, color: T.muted }}>${photos[0].date}</div>
            </div>
          </div>
        ` : html`
          <div className="flex gap-2 overflow-x-auto no-scrollbar" style=${{ margin: '0 -4px', padding: '0 4px' }}>
            ${photos.map((p, i) => html`
              <div key=${i} style=${{ flexShrink: 0, width: 90 }}>
                <img src=${p.src} className="rounded-xl" style=${{ width: 90, height: 120, objectFit: 'cover' }} />
                <div className="text-center mt-1" style=${{ fontSize: 9, color: T.muted }}>${new Date(p.date + 'T12:00:00').toLocaleDateString(LANG === 'en' ? 'en' : 'es', { day: 'numeric', month: 'short' })}</div>
              </div>
            `)}
          </div>
        `}
      `}
    </div>
  `;
}

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dontskip-backup-' + localDate() + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }, []);

  const handleImportJSON = useCallback(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backup = JSON.parse(ev.target.result);
          if (!backup.version || !backup.data || typeof backup.data !== 'object') {
            alert(t('Archivo inválido. Debe ser un backup de DontSkip con version y data.'));
            return;
          }
          const keys = Object.keys(backup.data);
          const msg = LANG === 'en'
            ? keys.length + ' keys will be imported. This will overwrite your current data. Continue?'
            : 'Se importarán ' + keys.length + ' keys. Esto sobreescribirá tus datos actuales. ¿Continuar?';
          if (!confirm(msg)) return;
          keys.forEach(k => localStorage.setItem(k, backup.data[k]));
          alert(t('Datos importados correctamente'));
          location.reload();
        } catch { alert(t('Archivo inválido. Debe ser un backup de DontSkip con version y data.')); }
      };
      reader.readAsText(file);
    };
    input.click();
  }, []);

  const handleFactoryReset = useCallback(() => {
    if (!confirm(t('¿Estás seguro? Se borrarán entrenamientos, comidas, agua, récords, fotos y notas.'))) return;
    const keep = ['ds_theme','ds_lang','ds_unit_pref','ds_goal_protein','ds_goal_calories','ds_goal_water_ml'];
    Object.keys(localStorage).filter(k => k.startsWith('ds_') && !keep.includes(k)).forEach(k => localStorage.removeItem(k));
    sessionStorage.clear();
    alert(t('Datos eliminados'));
    location.reload();
  }, []);

  const [notes, setNotes] = useState(() => {
    try { return localStorage.getItem('ds_notes') || ''; } catch { return ''; }
  });
  const notesTimer = useRef(null);
  function handleNotesChange(e) {
    const v = e.target.value;
    setNotes(v);
    clearTimeout(notesTimer.current);
    notesTimer.current = setTimeout(() => {
      try { localStorage.setItem('ds_notes', v); } catch {}
    }, 400);
  }

  const initWeight = (() => {
    const log = getWeightLog();
    return log.length ? log[log.length - 1].kg : 72;
  })();
  const [currentWeight, setCurrentWeight] = useState(initWeight);
  const [editingWeight, setEditingWeight] = useState(false);
  const [weightInput, setWeightInput] = useState(String(initWeight));

  function saveWeight() {
    const val = parseFloat(weightInput);
    if (isNaN(val) || val <= 0) return;
    setCurrentWeight(val);
    setEditingWeight(false);
    saveWeightEntry({ date: localDate(), kg: val });
  }

  const initHeight = (() => {
    try { return parseFloat(localStorage.getItem('ds_height_cm')) || 174; } catch { return 174; }
  })();
  const [heightCm, setHeightCm] = useState(initHeight);
  const [editingHeight, setEditingHeight] = useState(false);
  const [heightInput, setHeightInput] = useState(String(initHeight));

  function saveHeight() {
    const val = parseFloat(heightInput);
    if (isNaN(val) || val <= 0) return;
    setHeightCm(val);
    setEditingHeight(false);
    try { localStorage.setItem('ds_height_cm', String(val)); } catch {}
  }

  function formatHeight(cm) {
    if (unitPref === 'lbs') {
      const totalIn = cm / 2.54;
      const ft = Math.floor(totalIn / 12);
      const inches = Math.round(totalIn % 12);
      return ft + "'" + inches + '"';
    }
    return (cm / 100).toFixed(2) + 'm';
  }

  function formatWeightDisplay(kg) {
    if (unitPref === 'lbs') return Math.round(kg * 2.20462) + ' lbs';
    return kg + ' kg';
  }

  function saveName() {
    const trimmed = nameInput.trim() || 'Felipe';
    setName(trimmed);
    setEditingName(false);
    try { localStorage.setItem('ds_profile_name', trimmed); } catch {}
  }

  function toggleWaterUnit() {
    const next = waterUnit === 'ml' ? 'floz' : 'ml';
    setWaterUnit(next);
    try { localStorage.setItem('ds_unit_water', next); } catch {}
  }

  // Editable goals
  const [goalProtein, setGoalProtein] = useState(PROTEIN_GOAL);
  const [goalCalories, setGoalCalories] = useState(CALORIES_GOAL);
  const [goalWater, setGoalWater] = useState(WATER_GOAL_ML);
  const [editingGoals, setEditingGoals] = useState(false);
  function saveGoals() {
    setGoal('protein', goalProtein); setGoal('calories', goalCalories); setGoal('water_ml', goalWater);
    setEditingGoals(false);
  }

  const chipStyle = (active) => ({
    fontSize: 12, fontWeight: 700, padding: '4px 12px', borderRadius: 8, cursor: 'pointer',
    background: active ? T.accent : 'transparent', color: active ? '#fff' : T.muted,
    border: active ? 'none' : '1px solid ' + T.border, transition: 'all 0.2s',
  });

  const sectionTitle = (text) => html`
    <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 12 }}>${text}</div>
  `;

  const rowStyle = (last) => ({
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    padding: '12px 0', borderBottom: last ? 'none' : '1px solid ' + T.border,
  });

  const todayKey = getTodayKey();
  const dayOrder = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];

  return html`
    <div>
      <!-- Header -->
      <div className="px-5 pt-2 pb-3 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <img src="logo-icon.png" alt="" style=${{ height: 28, width: 'auto' }} />
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 30, fontWeight: 800, letterSpacing: '-0.8px', color: T.text }}>${t('Perfil')}</div>
        </div>
        <div className="flex items-center gap-2">
          <${LangToggle} onToggle=${onLangToggle} />
          <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />
        </div>
      </div>

      <div className="px-5 space-y-3 stagger">

        <!-- Card 1: Mi información -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('👤 ' + t('Mi información'))}
          <div style=${rowStyle(false)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>🙋🏼 ${t('Nombre')}</span>
            ${editingName ? html`
              <div className="flex items-center gap-2">
                <input type="text" value=${nameInput} onInput=${e => setNameInput(e.target.value)}
                  onKeyDown=${e => e.key === 'Enter' && saveName()}
                  className="text-sm font-bold rounded-lg py-1 px-2"
                  style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text, width: 120, textAlign: 'right' }} />
                <button onClick=${saveName} className="p-1 rounded-lg" style=${{ color: T.green }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
              </div>
            ` : html`
              <div className="flex items-center gap-2">
                <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${name}</span>
                <button onClick=${() => { setEditingName(true); setNameInput(name); }} className="p-1 rounded-lg" style=${{ color: T.muted }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                </button>
              </div>
            `}
          </div>
          <div style=${rowStyle(false)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>🎂 ${t('Edad')}</span>
            <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>34 ${t('años')}</span>
          </div>
          <div style=${rowStyle(false)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>⚖️ ${t('Peso actual')}</span>
            ${editingWeight ? html`
              <div className="flex items-center gap-2">
                <input type="number" step="0.1" value=${weightInput} onInput=${e => setWeightInput(e.target.value)}
                  onKeyDown=${e => e.key === 'Enter' && saveWeight()}
                  className="text-sm font-bold rounded-lg py-1 px-2"
                  style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text, width: 80, textAlign: 'right' }} />
                <span style=${{ fontSize: 12, color: T.muted }}>kg</span>
                <button onClick=${saveWeight} className="p-1 rounded-lg" style=${{ color: T.green }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>

                <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${formatWeightDisplay(currentWeight)}</span>
                <button onClick=${() => { setEditingWeight(true); setWeightInput(String(currentWeight)); }} className="p-1 rounded-lg" style=${{ color: T.muted }}>

                </button>

          </div>
          <div style=${rowStyle(false)}>

            ${editingHeight ? html`

                <span style=${{ fontSize: 12, color: T.muted }}>cm</span>
                <button onClick=${saveHeight} className="p-1 rounded-lg" style=${{ color: T.green }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
              </div>
            ` : html`
              <div className="flex items-center gap-2">
                <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${formatHeight(heightCm)}</span>

                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                </button>
              </div>
            `}

          <div style=${rowStyle(true)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>🎯 ${t('Objetivo')}</span>
            <span style=${{ fontSize: 14, fontWeight: 700, color: T.accent }}>${t('Recomposición corporal')}</span>
          </div>
        </div>

        <!-- Card 2: Mis metas diarias -->
        <div className="ds-card" style=${{ padding: 20 }}>
          <div className="flex items-center justify-between" style=${{ marginBottom: 12 }}>
            ${sectionTitle('🎯 ' + t('Mis metas diarias'))}
            <button onClick=${() => editingGoals ? saveGoals() : setEditingGoals(true)}
              className="px-3 py-1 rounded-lg press-scale"
              style=${{ fontSize: 11, fontWeight: 700, background: editingGoals ? T.green : T.accentDim, color: editingGoals ? '#fff' : T.accent }}>
              ${editingGoals ? t('Guardar') : t('Editar')}

          </div>
          <div style=${rowStyle(false)}>
            <div className="flex items-center gap-2">
              <span style=${{ fontSize: 16 }}>🥩</span>
              <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>${t('Proteína')}</span>
            </div>
            ${editingGoals ? html`
              <div className="flex items-center gap-1">
                <input type="number" value=${goalProtein} onChange=${e => setGoalProtein(Number(e.target.value))}
                  className="w-16 text-right text-sm font-bold rounded-lg py-1 px-2"
                  style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text }} />
                <span style=${{ fontSize: 12, color: T.muted }}>g</span>
              </div>
            ` : html`<span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${goalProtein}g</span>`}
          </div>
          <div style=${rowStyle(false)}>
            <div className="flex items-center gap-2">
              <span style=${{ fontSize: 16 }}>🔥</span>
              <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>${t('Calorías')}</span>
            </div>
            ${editingGoals ? html`
              <div className="flex items-center gap-1">
                <input type="number" value=${goalCalories} onChange=${e => setGoalCalories(Number(e.target.value))}
                  className="w-20 text-right text-sm font-bold rounded-lg py-1 px-2"
                  style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text }} />
                <span style=${{ fontSize: 12, color: T.muted }}>kcal</span>
              </div>
            ` : html`<span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${goalCalories.toLocaleString()} kcal</span>`}
          </div>
          <div style=${rowStyle(true)}>
            <div className="flex items-center gap-2">
              <span style=${{ fontSize: 16 }}>💧</span>
              <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>${t('Agua')}</span>
            </div>
            ${editingGoals ? html`
              <div className="flex items-center gap-1">
                <input type="number" value=${goalWater} onChange=${e => setGoalWater(Number(e.target.value))}
                  className="w-20 text-right text-sm font-bold rounded-lg py-1 px-2"
                  style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text }} />
                <span style=${{ fontSize: 12, color: T.muted }}>ml</span>
              </div>
            ` : html`<span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${Math.floor(goalWater / 250)} ${t('vasos')} (${goalWater.toLocaleString()} ml)</span>`}
          </div>
          ${editingGoals && html`<div style=${{ fontSize: 11, color: T.amber, marginTop: 8, textAlign: 'center' }}>${t('Los cambios se aplican al recargar la app')}</div>`}
        </div>

        <!-- Card 3: Unidades y preferencias -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('⚙️ ' + t('Unidades y preferencias'))}
          <div style=${rowStyle(false)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>${t('Unidad de peso')}</span>
            <div className="flex gap-1">
              <button onClick=${() => { if (unitPref !== 'kg') onUnitToggle(); }} style=${chipStyle(unitPref === 'kg')}>kg</button>
              <button onClick=${() => { if (unitPref !== 'lbs') onUnitToggle(); }} style=${chipStyle(unitPref === 'lbs')}>lbs</button>
            </div>
          </div>
          <div style=${rowStyle(true)}>
            <span style=${{ fontSize: 13, fontWeight: 600, color: T.sub }}>${t('Unidad de agua')}</span>
            <div className="flex gap-1">
              <button onClick=${() => { if (waterUnit !== 'ml') toggleWaterUnit(); }} style=${chipStyle(waterUnit === 'ml')}>ml</button>
              <button onClick=${() => { if (waterUnit !== 'floz') toggleWaterUnit(); }} style=${chipStyle(waterUnit === 'floz')}>fl oz</button>
            </div>
          </div>
        </div>

        <!-- Card 4: Plan de entrenamiento -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('📅 ' + t('Plan de entrenamiento'))}
          <div style=${{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            ${dayOrder.map((dk, i) => {
              const r = ROUTINES[dk];
              const isToday = dk === todayKey;
              const last = i === dayOrder.length - 1;
              return html`
                <div key=${dk} className="flex items-center gap-3"
                  style=${{
                    padding: '10px 12px', borderRadius: 10, marginBottom: last ? 0 : 2,
                    background: isToday ? T.accentDim : 'transparent',
                  }}>
                  <span style=${{ fontSize: 12, fontWeight: 700, color: isToday ? T.accent : T.muted, width: 70, flexShrink: 0 }}>${dayLabel(dk)}</span>
                  <span style=${{ fontSize: 13, fontWeight: 700, color: isToday ? T.accent : T.text, width: 75, flexShrink: 0 }}>${t(r.name)}</span>
                  <span style=${{ fontSize: 11, color: isToday ? T.accent : T.sub, flex: 1 }}>${t(r.focus)}</span>
                </div>
              `;
            })}
          </div>
        </div>

        <!-- Card 6: Recordatorio suplementos -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('💊 ' + t('Recordatorio de suplementos'))}
          <div style=${rowStyle(false)}>
            <div>
              <div className="flex items-center gap-2 mb-1">
                <span style=${{ fontSize: 16 }}>💪🏼</span>

              </div>
              <div style=${{ fontSize: 12, color: T.sub, paddingLeft: 28 }}>${t('27g proteína por scoop. Días de entrenamiento.')}</div>
            </div>

          <div style=${rowStyle(true)}>
            <div>
              <div className="flex items-center gap-2 mb-1">
                <span style=${{ fontSize: 16 }}>💊</span>
                <span style=${{ fontSize: 13, fontWeight: 700, color: T.text }}>${t('Creatina — 5g diarios')}</span>
              </div>
              <div style=${{ fontSize: 12, color: T.sub, paddingLeft: 28 }}>${t('Todos los días, incluso descanso. Con el desayuno.')}</div>
            </div>
          </div>
        </div>

        <!-- Card 7: Exportar datos -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('📤 ' + t('Exportar datos'))}
          <button onClick=${() => {
            const rows = [t('Fecha,Proteína (g),Calorías,Agua (ml),Ejercicios completados')];
            for (let i = 30; i >= 0; i--) {
              const d = localDate(new Date(Date.now() - i * 86400000));
              try {
                const m = JSON.parse(localStorage.getItem('ds_meals_' + d) || '[]');
                const conf = m.filter(x => x.confirmed);
                const prot = conf.reduce((s, x) => s + x.items.reduce((a, item) => a + (item.protein || 0), 0), 0);
                const cal = conf.reduce((s, x) => s + x.items.reduce((a, item) => a + (item.cal || 0), 0), 0);
                const wat = Number(localStorage.getItem('ds_water_' + d)) || 0;
                const dk = DAYS[new Date(d + 'T12:00:00').getDay()];
                const ws = localStorage.getItem('ds_workout_' + dk + '_' + d);
                const done = ws ? JSON.parse(ws).filter(e => e.sets.every(s => s.done)).length : 0;
                if (prot || cal || wat || done) rows.push(d + ',' + prot + ',' + cal + ',' + wat + ',' + done);
              } catch {}
            }
            const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'dontskip_export_' + localDate() + '.csv';
            a.click();
          }}
            className="w-full py-3 rounded-xl font-bold press-scale"
            style=${{ background: T.accentDim, color: T.accent, fontSize: 13, border: '1px solid ' + T.accent + '20' }}>
            ${t('Descargar CSV (últimos 30 días)')}
          </button>
        </div>

        <!-- Card: Mis datos (backup/restore) -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('💾 ' + t('Mis datos'))}
          <div style=${{ fontSize: 12, color: T.muted, marginBottom: 14 }}>${t('Exportar backup JSON con todos tus datos')}</div>
          <div className="flex gap-2">
            <button onClick=${handleExportJSON}
              className="flex-1 py-3 rounded-xl font-semibold text-center active:scale-[0.97] transition-transform"
              style=${{ background: T.accentDim, color: T.accent, fontSize: 13, border: '1px solid ' + T.accent + '20' }}>
              ${t('Exportar datos JSON')}
            </button>
            <button onClick=${handleImportJSON}
              className="flex-1 py-3 rounded-xl font-semibold text-center active:scale-[0.97] transition-transform"
              style=${{ background: T.elevated, color: T.text, fontSize: 13, border: '1px solid ' + T.border }}>
              ${t('Importar datos JSON')}
            </button>
          </div>
        </div>

        <!-- Card 8: Notas de mejora -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('📝 ' + t('Notas de mejora'))}
          <div style=${{ fontSize: 12, color: T.muted, marginBottom: 10 }}>${t('Ideas, bugs o mejoras para la siguiente versión')}</div>
          <textarea
            value=${notes}
            onInput=${handleNotesChange}
            placeholder="${t('Escribe tus notas aquí...')}"
            rows="8"
            style=${{
              width: '100%', fontSize: 14, fontWeight: 500, color: T.text, lineHeight: 1.6,
              background: T.input, border: '1px solid ' + T.border, borderRadius: 12,
              padding: '12px 14px', resize: 'vertical', fontFamily: 'Outfit, sans-serif',
              outline: 'none', transition: 'border-color 0.2s',
            }}
            onFocus=${e => e.target.style.borderColor = T.accent}
            onBlur=${e => e.target.style.borderColor = T.border}
          />
          <div style=${{ fontSize: 11, color: T.muted, marginTop: 6, textAlign: 'right' }}>
            ${notes.length > 0 ? notes.split('\n').filter(l => l.trim()).length + ' ' + t('líneas') : t('Vacío')}
          </div>
        </div>

        <!-- Card 9: Reset de fábrica -->
        <div className="ds-card" style=${{ padding: 20 }}>
          ${sectionTitle('🔄 ' + t('Restablecer datos'))}
          <div style=${{ fontSize: 12, color: T.muted, marginBottom: 14 }}>${t('Eliminar todos los datos y empezar de cero. Se conservan tus ajustes.')}</div>
          <button onClick=${handleFactoryReset}
            className="w-full py-3 rounded-xl font-semibold text-center active:scale-[0.97] transition-transform"
            style=${{ background: T.red + '15', color: T.red, fontSize: 13, border: '1px solid ' + T.red + '30' }}>
            ${t('Borrar todo')}
          </button>
        </div>

      </div>

      <div style=${{ height: 100 }} />
    </div>
  `;
}

// ── Food Verifier ──────────────────────────────────────────────────────

function FoodVerifier({ consumedCal, consumedProtein, foodLibrary }) {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);

  function handleVerify() {
    if (!query.trim()) return;
    const q = query.toLowerCase().trim();

    // Try to parse quantity (e.g., "2 slices de pizza", "3 huevos")
    const qtyMatch = q.match(/^(\d+)\s*(slices?|rebanadas?|porciones?|unidades?|latas?|scoops?|tazas?|barras?)?\s*(de\s+)?(.+)$/);
    let qty = 1;
    let searchTerm = q;
    if (qtyMatch) {
      qty = parseInt(qtyMatch[1]);
      searchTerm = qtyMatch[4] || q;
    }

    // Search in library
    const match = foodLibrary.find(f => {
      const fname = f.name.toLowerCase();
      return fname.includes(searchTerm) || searchTerm.includes(fname.split(' ')[0]);
    });

    if (!match) {
      setResult({ type: 'not_found' });
      return;
    }

    const addedCal = match.cal * qty;
    const addedProtein = match.protein * qty;
    const totalCal = consumedCal + addedCal;
    const totalProtein = consumedProtein + addedProtein;
    const remainingCal = CALORIES_GOAL - totalCal;
    const remainingProtein = PROTEIN_GOAL - totalProtein;

    let type = 'green';
    let message = '';

    if (totalCal <= CALORIES_GOAL && totalProtein >= 0) {
      type = 'green';
      message = t('Te quedan') + ' ' + Math.max(0, remainingCal) + ' ' + t('kcal y necesitas') + ' ' + Math.max(0, remainingProtein) + 'g ' + t('de proteína hoy.');
    } else if (totalCal <= CALORIES_GOAL * 1.1) {
      type = 'yellow';
      message = t('Puedes, pero estarías cerca del límite. Compensa en tu próxima comida con algo más ligero.');
    } else {
      type = 'red';
      message = t('Superarías tu meta por') + ' ' + Math.abs(remainingCal) + ' ' + t('kcal. Considera una porción más pequeña.');
    }

    setResult({ type, match, qty, addedCal, addedProtein, message });
  }

  const colors = { green: { bg: T.greenDim, border: T.greenDim, text: T.green, icon: '\u2705' },
    yellow: { bg: T.amberDim, border: T.amberDim, text: T.amber, icon: '\u26A0\uFE0F' },
    red: { bg: T.redDim, border: T.redDim, text: T.red, icon: '\u274C' },
  };

  return html`
    <div className="ds-card fade-up" style=${{ padding: 20, marginBottom: 12 }}>
      <div className="flex items-center gap-2 mb-3">
        <span className="text-lg">\uD83E\uDD14</span>
        <span className="font-bold" style=${{ color: T.text }}>${t('¿Puedo comer esto?')}</span>
      </div>
      <div className="flex gap-2 mb-3">
        <input type="text" value=${query} onChange=${e => setQuery(e.target.value)}
          onKeyDown=${e => e.key === 'Enter' && handleVerify()}
          placeholder=${t('Ej: 2 slices de pizza')}
          className="flex-1 text-sm rounded-xl py-2.5 px-4"
          style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
        <button onClick=${handleVerify}
          className="px-4 py-2.5 rounded-xl text-sm font-bold flex-shrink-0"
          style=${{ background: T.accent, color: T.bg }}>
          ${t('Verificar')}
        </button>
      </div>

      ${result && result.type === 'not_found' && html`
        <div className="rounded-xl p-4 text-sm" style=${{ background: T.elevated, border: '1px solid ' + T.border }}>
          <div className="flex items-start gap-2">
            <span className="text-lg flex-shrink-0">\uD83D\uDCA1</span>
            <div>
              <div className="font-semibold mb-1" style=${{ color: T.text }}>${t('No tengo ese alimento en tu biblioteca')}</div>
              <div className="text-xs leading-relaxed" style=${{ color: T.sub }}>${t('Puedes añadirlo manualmente en "Mi Biblioteca", o en una próxima versión Jarvis podrá calcularlo automáticamente.')}</div>
            </div>
          </div>
        </div>
      `}

      ${result && result.type !== 'not_found' && html`
        <div className="rounded-xl p-4" style=${{ background: colors[result.type].bg, border: '1px solid ' + colors[result.type].border }}>
          <div className="flex items-center gap-2 mb-2">
            <span>${colors[result.type].icon}</span>
            ${result.match.icon && html`<span style=${{ fontSize: 16 }}>${result.match.icon}</span>`}
            <span className="font-bold text-sm" style=${{ color: colors[result.type].text }}>
              ${result.qty > 1 ? result.qty + 'x ' : ''}${result.match.name}
            </span>
          </div>
          <div className="flex gap-4 mb-2 text-xs">
            <span style=${{ color: colors[result.type].text }}>+${result.addedCal} kcal</span>
            <span style=${{ color: colors[result.type].text }}>+${result.addedProtein}g ${t('proteína')}</span>
          </div>
          <div className="text-xs leading-relaxed" style=${{ color: colors[result.type].text, opacity: 0.85 }}>${result.message}</div>
        </div>
      `}
    </div>
  `;
}

    ? foodLibrary.filter(f => f.name.toLowerCase().includes(query.toLowerCase().trim()))
    : foodLibrary;

  const totalP = selected.reduce((s, i) => s + i.protein, 0);

    const cal = Math.round(food.cal * qty);

    setSelected(prev => [...prev, { name: label, cal, protein, carbs: Math.round((food.carbs || 0) * qty), fat: Math.round((food.fat || 0) * qty) }]);

function WorkoutTimer({ startTime }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    if (!startTime) return;
    setElapsed(Math.floor((Date.now() - startTime) / 1000));
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
    return () => clearInterval(id);
  }, [startTime]);
  if (!startTime) return null;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  return html`
    <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 700, color: T.accent, fontVariantNumeric: 'tabular-nums' }}>
      ${m}:${String(s).padStart(2, '0')}
    </span>
  `;
}

function calcVolume(exerciseStates, routine, unitPref) {
  if (!routine.exercises) return 0;
  let total = 0;
  exerciseStates.forEach((es, i) => {
    const ex = routine.exercises[i];
    if (!ex || ex.reps.toString().includes('s')) return; // skip planks
    es.sets.forEach(s => {
      if (s.done && s.weight > 0) {
        const reps = s.reps || parseInt(ex.reps) || 0;
        total += s.weight * reps;
      }
    });
  });
  return Math.round(total);
}

function formatVolume(vol) {
  if (vol >= 1000) return (vol / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(vol);
}

function LiveTab({ routine, exerciseStates, onExerciseUpdate, unitPref, workoutStartTime, pausedElapsed, onStartTimer, onPauseTimer, onStopTimer, dark, onThemeToggle, onLangToggle }) {
  const isPaused = pausedElapsed !== null;
  const [elapsed, setElapsed] = useState(isPaused ? pausedElapsed : 0);
  useEffect(() => {
    if (!workoutStartTime || isPaused) {
      if (isPaused) setElapsed(pausedElapsed);
      return;
    }
    setElapsed(Math.floor((Date.now() - workoutStartTime) / 1000));
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - workoutStartTime) / 1000)), 1000);
    return () => clearInterval(id);
  }, [workoutStartTime, isPaused, pausedElapsed]);

  const [confirmStop, setConfirmStop] = useState(false);
  const [expandedNext, setExpandedNext] = useState(false);
  const [showWarmup, setShowWarmup] = useState(true);
  const [warmupDone, setWarmupDone] = useState(() => {
    try { const v = JSON.parse(localStorage.getItem('ds_warmup_' + localDate()) || '[]'); return Array.isArray(v) ? v : []; } catch { return []; }
  });
  const [showStretching, setShowStretching] = useState(true);
  const [stretchDone, setStretchDone] = useState(() => {
    try { const v = JSON.parse(localStorage.getItem('ds_stretch_' + localDate()) || '[]'); return Array.isArray(v) ? v : []; } catch { return []; }
  });
  const warmupExercises = WARMUP_ROUTINES[routine.name] || [];
  const stretchExercises = STRETCHING_ROUTINES[routine.name] || [];

  function toggleWarmup(idx) {
    const next = warmupDone.includes(idx) ? warmupDone.filter(i => i !== idx) : [...warmupDone, idx];
    setWarmupDone(next);
    try { localStorage.setItem('ds_warmup_' + localDate(), JSON.stringify(next)); } catch {}
    haptic([10]);
  }
  function toggleStretch(idx) {
    const next = stretchDone.includes(idx) ? stretchDone.filter(i => i !== idx) : [...stretchDone, idx];
    setStretchDone(next);
    try { localStorage.setItem('ds_stretch_' + localDate(), JSON.stringify(next)); } catch {}
    haptic([10]);
  }

  // HIIT timer
  const [showHIIT, setShowHIIT] = useState(false);

  // Weekly coach
  const [showCoach, setShowCoach] = useState(false);
  const trainingWeek = getTrainingWeek();
  const recommendations = useMemo(() => getWeeklyRecommendations(routine, getTodayKey(), unitPref), [routine, unitPref]);
  const hasRecommendations = recommendations.some(r => r.status !== 'new');

  // Mood/energy check-in
  const moodKey = 'ds_mood_' + localDate();
  const [mood, setMood] = useState(() => {
    try { return Number(localStorage.getItem(moodKey)) || 0; } catch { return 0; }
  });
  const moods = [
    { emoji: '😫', label: t('Agotado') },
    { emoji: '😐', label: t('Normal') },
    { emoji: '😊', label: t('Bien') },
    { emoji: '💪🏼', label: t('Fuerte') },
    { emoji: '🔥', label: t('Imparable') },
  ];
  function pickMood(idx) {
    setMood(idx);
    try { localStorage.setItem(moodKey, String(idx)); } catch {}
    haptic([10]);
  }

  const totalSec = elapsed;
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const timerStr = h > 0 ? h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') : String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const startTimeStr = workoutStartTime ? new Date(workoutStartTime).toLocaleTimeString(LANG === 'en' ? 'en' : 'es', { hour: '2-digit', minute: '2-digit' }) : null;

  const exercises = routine.exercises || [];
  const currentIdx = exerciseStates.findIndex(e => !e.sets.every(s => s.done));
  const nextIdx = currentIdx >= 0 ? currentIdx + 1 : -1;
  const currentEx = currentIdx >= 0 ? exercises[currentIdx] : null;
  const currentState = currentIdx >= 0 ? exerciseStates[currentIdx] : null;
  const nextEx = nextIdx >= 0 && nextIdx < exercises.length ? exercises[nextIdx] : null;
  const gymDone = exerciseStates.filter(e => e.sets.every(s => s.done)).length;
  const gymTotal = exercises.length;
  const totalVolume = calcVolume(exerciseStates, routine, unitPref);
  const completedSets = exerciseStates.reduce((a, e) => a + e.sets.filter(s => s.done).length, 0);
  const totalSets = exerciseStates.reduce((a, e) => a + e.sets.length, 0);
  const allDone = gymDone === gymTotal && gymTotal > 0;
  const progressPct = gymTotal > 0 ? Math.round((gymDone / gymTotal) * 100) : 0;

  const prevCurrentIdx = useRef(currentIdx);
  useEffect(() => {
    if (currentIdx !== prevCurrentIdx.current) { setExpandedNext(false); prevCurrentIdx.current = currentIdx; }
  }, [currentIdx]);

  function toggleSet(exIdx, si) {
    const es = exerciseStates[exIdx];
    const newSets = es.sets.map((set, i) => i === si ? { ...set, done: !set.done } : set);
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
  }

  function completeExercise(exIdx) {
    const es = exerciseStates[exIdx];
    const newSets = es.sets.map(set => ({ ...set, done: true }));
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
  }

  // Rest day
  if (routine.rest) {
