              onClick=${() => setExpandedNext(!expandedNext)}>
              <div className="flex items-center gap-4" style=${{ padding: 14 }}>
                ${nextEx.gif && !expandedNext ? html`
                  <img src=${nextEx.gif} alt=${exName(nextEx)} loading="lazy"
                    style=${{ height: 72, width: 72, objectFit: 'contain', borderRadius: 12, flexShrink: 0, background: T.bg }}
                    onError=${(e) => { e.target.style.display = 'none'; }} />
                ` : ''}
                <div className="flex-1 min-w-0">
                  <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 15, fontWeight: 800, color: T.text, letterSpacing: '-0.3px' }}>${exName(nextEx)}</div>
                  <div style=${{ fontSize: 11, fontWeight: 600, color: T.accent, marginTop: 2 }}>${t(nextEx.muscle)} \u00B7 ${nextEx.sets}\u00D7${nextEx.reps}</div>
                  ${!expandedNext && html`<div style=${{ fontSize: 11, color: T.sub, marginTop: 4, lineHeight: 1.4 }}>${nextEx.desc}</div>`}
                </div>
                <${CaretDown} size=${14} weight="bold" color=${T.muted} style=${{ flexShrink: 0, transition: 'transform 0.2s', transform: expandedNext ? 'rotate(180deg)' : 'none' }} />
              </div>
              ${expandedNext && html`
                <div className="slide-down" onClick=${(e) => e.stopPropagation()}>
                  ${nextEx.gif ? html`
                    <div className="flex justify-center" style=${{ padding: '8px 0 12px', background: T.bg }}>
                      <img src=${nextEx.gif} alt=${exName(nextEx)} loading="lazy"
                        style=${{ height: 200, width: 200, objectFit: 'contain' }}
                        onError=${(e) => { e.target.style.display = 'none'; }} />
                    </div>
                  ` : ''}
                  <div style=${{ padding: '0 14px 14px' }}>
                    <p style=${{ fontSize: 12, color: T.sub, lineHeight: 1.5, marginBottom: 10 }}>${nextEx.desc}</p>
                    <a href=${nextEx.videoId ? 'https://youtube.com/watch?v=' + nextEx.videoId : 'https://youtube.com/results?search_query=' + encodeURIComponent(exName(nextEx) + ' exercise gym')}
                      target="_blank" rel="noopener"
                      className="flex items-center justify-center gap-2 py-2.5 rounded-xl"
                      style=${{ background: 'rgba(220,38,38,0.06)', color: '#dc2626', fontSize: 12, fontWeight: 700, border: '1px solid rgba(220,38,38,0.12)' }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="#dc2626"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8z"/><polygon fill="#fff" points="9.75 15.02 15.5 12 9.75 8.98"/></svg>
                      ${t('Ver tutorial')}
                    </a>
                  </div>
                </div>
              `}
            </div>
          </div>
        `}

        <!-- Queue -->
        ${(() => {
          const queueStart = nextIdx + 1;
          const remaining = exercises.slice(queueStart);
          if (remaining.length === 0) return '';
          return html`
            <div className="px-5 pt-4">
              <div className="flex items-center gap-2 mb-2">
                <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 9, fontWeight: 800, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.14em' }}>${t('Cola')} \u00B7 ${remaining.length} ${t('restantes')}</span>
              </div>
              <div className="ds-card" style=${{ padding: 0, overflow: 'hidden' }}>
                ${remaining.map((qEx, qi) => html`
                  <div key=${qi} className="flex items-center gap-3 px-4 py-2.5"
                    style=${{ borderTop: qi > 0 ? '1px solid ' + T.border : 'none' }}>
                    <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 10, fontWeight: 900, color: T.muted, width: 16, textAlign: 'center' }}>${queueStart + qi + 1}</span>
                    <div className="flex-1 min-w-0">
                      <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 700, color: T.text, letterSpacing: '-0.2px' }}>${exName(qEx)}</div>
                      <div style=${{ fontSize: 10, color: T.muted }}>${qEx.sets}\u00D7${qEx.reps}</div>
                    </div>
                  </div>
                `)}
              </div>
            </div>
          `;
        })()}

        <!-- Completed -->
        ${gymDone > 0 && html`
          <div className="px-5 pt-4">
            <div className="flex items-center gap-2 mb-2">
              <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 9, fontWeight: 800, color: T.green, textTransform: 'uppercase', letterSpacing: '0.14em' }}>${t('Completados')} \u00B7 ${gymDone}</span>
            </div>
            <div className="ds-card" style=${{ padding: 0, overflow: 'hidden' }}>
              ${exercises.map((ex, ei) => {
                if (!exerciseStates[ei].sets.every(s => s.done)) return '';
                const vol = exerciseStates[ei].sets.reduce((a, s) => a + (s.weight || 0) * (s.reps || parseInt(ex.reps) || 0), 0);
                return html`
                  <div key=${ei} className="flex items-center gap-3 px-4 py-2.5"
                    style=${{ borderTop: '1px solid ' + T.border }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke=${T.green} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 600, color: T.muted, flex: 1, letterSpacing: '-0.2px' }}>${exName(ex)}</span>
                    ${vol > 0 ? html`<span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 11, fontWeight: 700, color: T.muted, fontVariantNumeric: 'tabular-nums' }}>${formatVolume(vol)}</span>` : ''}
                  </div>
                `;
              })}
            </div>
          </div>
        `}
      `}

      <div className="bottom-spacer" />

      ${showCoach && html`
        <div className="fixed inset-0 z-50 flex items-end justify-center"
          style=${{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(4px)' }}
          onClick=${() => setShowCoach(false)}>
          <div className="celebrate-modal w-full" onClick=${(e) => e.stopPropagation()}
            style=${{ background: T.card, borderRadius: '24px 24px 0 0', padding: '24px 20px', paddingBottom: 'calc(24px + env(safe-area-inset-bottom))', maxHeight: '80vh', overflowY: 'auto', border: '1px solid ' + T.border, borderBottom: 'none' }}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 18, fontWeight: 900, color: T.text, letterSpacing: '-0.5px' }}>
                  📋 ${t('Semana')} ${trainingWeek}
                </div>
                <div style=${{ fontSize: 11, color: T.sub, marginTop: 2 }}>
                  ${trainingWeek % 4 === 0 ? t('Semana de descarga') + ' \u2014 ' + t('Reduce la intensidad para recuperar') : t('Basado en tu rendimiento reciente')}
                </div>
              </div>
              <button onClick=${() => setShowCoach(false)} className="press-scale"
                style=${{ width: 32, height: 32, borderRadius: '50%', background: T.input, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke=${T.muted} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>

            <div className="space-y-2">
              ${recommendations.map((rec, ri) => {
                const statusColor = rec.status === 'increase' ? T.green : rec.status === 'deload' ? T.amber : rec.status === 'maintain' ? T.accent : T.muted;
                const statusBg = rec.status === 'increase' ? T.greenDim : rec.status === 'deload' ? T.amberDim : rec.status === 'maintain' ? T.accentDim : T.input;
                const statusLabel = rec.status === 'increase' ? t('Subir peso') : rec.status === 'deload' ? t('Descarga') : rec.status === 'maintain' ? t('Mantener peso') : t('Sin registro');
                const statusTip = rec.status === 'increase' ? t('Completaste todos los reps') : rec.status === 'deload' ? t('Usa 80% de tu peso actual') : rec.status === 'maintain' ? t('Sigue trabajando en este peso') : t('Registra tu primera sesión');
                return html`
                  <div key=${ri} className="flex items-center gap-3 py-3 px-3 rounded-xl"
                    style=${{ background: T.elevated, border: '1px solid ' + T.border }}>
                    <div className="flex-1 min-w-0">
                      <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 700, color: T.text, letterSpacing: '-0.2px' }}>${exName(rec.exercise)}</div>
                      <div style=${{ fontSize: 10, color: T.muted, marginTop: 1 }}>${statusTip}</div>
                    </div>
                    ${rec.current !== null ? html`
                      <div className="text-right" style=${{ flexShrink: 0 }}>
                        <div className="flex items-center gap-1.5">
                          <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 600, color: T.muted, fontVariantNumeric: 'tabular-nums' }}>${rec.current}</span>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke=${statusColor} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                          <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 14, fontWeight: 900, color: statusColor, fontVariantNumeric: 'tabular-nums' }}>${rec.recommended} ${unitPref}</span>
                        </div>
                        <div style=${{ marginTop: 3 }}>
                          <span style=${{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 6, background: statusBg, color: statusColor }}>${statusLabel}</span>
                        </div>
                      </div>
                    ` : html`
                      <span style=${{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 6, background: T.input, color: T.muted }}>${statusLabel}</span>
                    `}
                  </div>
                `;
              })}
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

function TodayTab({ meals, onMealConfirm, onMealEdit, onAddMeal, waterMl, onAddWater, onUndoWater, waterLog, unitPref, onUnitToggle, exerciseStates, onExerciseUpdate, workoutStartTime, onStartTimer, dark, onThemeToggle, onLangToggle, onOpenPerfil }) {
  const todayKey = getTodayKey();
  const routine = ROUTINES[todayKey];
  const todayDayLabel = dayLabel(todayKey);

  const protein = sumMealsProp(meals, 'protein');
  const calories = sumMealsProp(meals, 'cal');
  const gymDone = exerciseStates.filter(e => e.sets.every(s => s.done)).length;
  const gymTotal = routine.rest ? 0 : routine.exercises.length;

  const streak = getStreak();
  const profileName = (() => { try { return localStorage.getItem('ds_profile_name') || 'Felipe'; } catch { return 'Felipe'; } })();

  // Celebration modal
  const [showCelebration, setShowCelebration] = useState(false);
  const celebratedKey = 'ds_workout_celebrated_' + localDate();

  useEffect(() => {
    if (gymDone === gymTotal && gymTotal > 0) {
      try {
        if (localStorage.getItem(celebratedKey) === 'true') return;
        localStorage.setItem(celebratedKey, 'true');
        setShowCelebration(true);
      } catch {}
    }
  }, [gymDone, gymTotal, celebratedKey]);

  const completedSets = exerciseStates.reduce((s, e) => s + e.sets.filter(set => set.done).length, 0);
  const totalVolume = calcVolume(exerciseStates, routine, unitPref);

  // Workout elapsed for celebration
  const workoutElapsed = workoutStartTime ? Math.floor((Date.now() - workoutStartTime) / 1000) : 0;
  const elapsedMin = Math.floor(workoutElapsed / 60);

  // Post-workout micro-feedback — compare vs last session
  const microFeedback = useMemo(() => {
    if (!showCelebration || routine.rest) return [];
    const msgs = [];
    try {
      const today = localDate();
      let lastStates = null;
      for (let d = 1; d <= 28; d++) {
        const prev = localDate(new Date(Date.now() - d * 86400000));
        if (prev === today) continue;
        const pk = 'ds_workout_' + todayKey + '_' + prev;
        const ps = localStorage.getItem(pk);
        if (ps) { lastStates = JSON.parse(ps); break; }
      }
      if (lastStates && totalVolume > 0) {
        const lastVol = calcVolume(lastStates, routine, unitPref);
        if (lastVol > 0) {
          const diff = totalVolume - lastVol;
          const pct = Math.round((diff / lastVol) * 100);
          if (pct > 0) msgs.push({ text: '\u2191 ' + pct + (LANG === 'en' ? '% more volume vs last session' : '% m\u00E1s volumen vs \u00FAltima sesi\u00F3n'), color: T.green });
          else if (pct < 0) msgs.push({ text: '\u2193 ' + Math.abs(pct) + (LANG === 'en' ? '% less volume vs last session' : '% menos volumen vs \u00FAltima sesi\u00F3n'), color: T.amber });
          else msgs.push({ text: LANG === 'en' ? '\u2194 Same volume as last session' : '\u2194 Mismo volumen que la \u00FAltima sesi\u00F3n', color: T.sub });
        }
      }
      // Count PRs today
      const records = getRecords();
      let prCount = 0;
      exerciseStates.forEach((es, i) => {
        const ex = routine.exercises && routine.exercises[i];
        if (!ex) return;
        const best = records[ex.id];
        if (best && best.date === today) prCount++;
      });
      if (prCount > 0) msgs.push({ text: LANG === 'en' ? '\uD83C\uDFC6 ' + prCount + ' new personal record' + (prCount > 1 ? 's' : '') : '\uD83C\uDFC6 ' + prCount + ' nuevo' + (prCount > 1 ? 's' : '') + ' r\u00E9cord' + (prCount > 1 ? 's' : '') + ' personal' + (prCount > 1 ? 'es' : ''), color: T.amber });
    } catch {}
    return msgs;
  }, [showCelebration]);

  // Time-based gradient (#15)
  const timeGradient = useMemo(() => {
    const h = new Date().getHours();
    if (h < 7) return 'linear-gradient(135deg, rgba(30,40,80,0.14) 0%, rgba(60,80,140,0.06) 100%)';
    if (h < 12) return 'linear-gradient(135deg, rgba(59,130,246,0.10) 0%, rgba(147,197,253,0.04) 100%)';
    if (h < 17) return 'linear-gradient(135deg, rgba(251,191,36,0.09) 0%, rgba(253,224,71,0.03) 100%)';
    if (h < 20) return 'linear-gradient(135deg, rgba(249,115,22,0.10) 0%, rgba(251,191,36,0.04) 100%)';
    return 'linear-gradient(135deg, rgba(30,40,80,0.14) 0%, rgba(60,80,140,0.06) 100%)';
  }, []);

  return html`
    <div className="stagger">
      <div className="mx-5 fade-up" style=${{ paddingTop: 16, paddingBottom: 18, paddingLeft: 20, paddingRight: 20, background: T.card, borderRadius: 20, marginBottom: 12, border: '1px solid ' + T.border }}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <button onClick=${onOpenPerfil} className="flex items-center justify-center press-scale" style=${{ width: 36, height: 36, borderRadius: 10, background: T.input }}>
              <${GearSix} size=${18} weight="bold" color=${T.muted} />
            </button>
            <${LangToggle} onToggle=${onLangToggle} />
            <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />
          </div>
          <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full pop-in" style=${{ background: T.amberDim, animationDelay: '0.3s' }}>
            <${FireSimple} size=${14} weight="fill" color=${T.amber} />
            <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 800, color: T.amber }}>${LANG === 'en' ? 'Day' : 'Día'} ${streak}</span>
          </div>
        </div>
        <div style=${{ marginTop: 12 }}>
          <div style=${{ fontSize: 14, fontWeight: 500, color: T.sub, marginBottom: 2 }}>
            ${new Date().toLocaleDateString(LANG === 'en' ? 'en' : 'es', { weekday: 'long', day: 'numeric', month: 'long' })}
          </div>
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, color: T.text, letterSpacing: '-1px', lineHeight: 1.1 }}>
            ${t(getGreeting())}, ${profileName}
          </div>
        </div>
        <div className="flex items-center justify-between" style=${{ marginTop: 12 }}>
          <div className="inline-flex items-center slide-in-right" style=${{ background: T.accentDim, color: T.accent, fontSize: 12, fontWeight: 700, borderRadius: 20, padding: '6px 14px' }}>
            ${todayDayLabel} \u00B7 ${t(routine.name)}
          </div>
          <${WeekStrip} />
        </div>
      </div>

      <div className="px-5">
        <${DashboardStats} protein=${protein} calories=${calories} waterMl=${waterMl} gymDone=${gymDone} gymTotal=${gymTotal} />
      </div>

      <div className="px-5">
        <${SupplementsCheck} />
      </div>

      <div className="px-5">
        <${CollapsibleSection} title=${LANG === 'en' ? 'Workout' : 'Entrenamiento'} icon=${html`<div style=${{ width: 36, height: 36, borderRadius: 10, background: 'rgba(37,99,235,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><${Barbell} size=${20} weight="duotone" color="#2563eb" /></div>`} defaultOpen=${false}
          summary=${routine.rest ? t(routine.name) : t(routine.name) + ' \u00B7 ' + t(routine.focus)}
          badge=${gymTotal > 0 ? { text: gymDone + '/' + gymTotal, bg: gymDone === gymTotal ? T.greenDim : T.accentDim, color: gymDone === gymTotal ? T.green : T.accent } : null}
          extra=${workoutStartTime && !routine.rest ? html`
            <div className="flex items-center gap-3" style=${{ marginTop: 2 }}>
              <${WorkoutTimer} startTime=${workoutStartTime} />
              ${totalVolume > 0 ? html`
                <span style=${{ fontSize: 11, fontWeight: 600, color: T.muted }}>${formatVolume(totalVolume)} ${unitPref}</span>
              ` : ''}
            </div>
          ` : null}>
          <${WorkoutCard}
            routine=${routine}
            unitPref=${unitPref}
            onUnitToggle=${onUnitToggle}
            exercises=${exerciseStates}
            onExerciseUpdate=${onExerciseUpdate}
          />
        <//>
      </div>


      <div className="px-5">
        <div className="flex items-center gap-2 mb-3" style=${{ paddingLeft: 4 }}>
          <div style=${{ width: 28, height: 28, borderRadius: 8, background: 'rgba(14,165,233,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <${Drop} size=${16} weight="fill" color=${T.water} />
          </div>
          <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', color: T.muted, textTransform: 'uppercase' }}>${LANG === 'en' ? 'Hydration' : 'Hidratación'}</span>
        </div>
        <${WaterCounter} waterMl=${waterMl} onAddWater=${onAddWater} onUndoWater=${onUndoWater} waterLog=${waterLog} />
      </div>

      <${DaySummary} protein=${protein} calories=${calories} waterMl=${waterMl} gymDone=${gymDone} gymTotal=${gymTotal} />

      <div className="bottom-spacer" />
    </div>

    ${showCelebration && html`
      <div className="fixed inset-0 z-50 flex items-center justify-center"
        style=${{ background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)', overflow: 'hidden' }}
        onClick=${() => setShowCelebration(false)}>
        ${Array.from({ length: 30 }, (_, i) => html`
          <div key=${i} className="confetti-particle"
            style=${{
              left: Math.random() * 100 + '%', top: -10,
              background: ['#16a34a', '#d97706', '#2563eb', '#dc2626', '#9333ea', '#0ea5e9'][i % 6],
              animationDelay: (Math.random() * 1.2) + 's',
              animationDuration: (1.8 + Math.random() * 1.5) + 's',
              width: (6 + Math.random() * 6) + 'px',
              height: (6 + Math.random() * 6) + 'px',
            }} />
        `)}
        <div className="celebrate-modal" onClick=${e => e.stopPropagation()}
          style=${{ background: T.card, borderRadius: 24, padding: 32, margin: 24,
            maxWidth: 340, width: '100%', textAlign: 'center', border: '1px solid ' + T.border,
            boxShadow: '0 24px 48px rgba(0,0,0,0.2)' }}>

          <div className="celebrate" style=${{ marginBottom: 20, display: 'inline-block' }}>
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke=${T.accent}
              strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
              <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
              <path d="M4 22h16"/>
              <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/>
              <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/>
              <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
            </svg>
          </div>

          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 24, fontWeight: 800,
            color: T.text, marginBottom: 8, letterSpacing: '-0.5px' }}>
            ${LANG === 'en' ? 'Workout completed!' : '¡Entrenamiento completado!'}
          </div>

          <div style=${{ fontSize: 14, color: T.sub, marginBottom: microFeedback.length > 0 ? 12 : 20 }}>
            ${t(routine.name)} — ${t(routine.focus)}
          </div>

          ${microFeedback.length > 0 && html`
            <div style=${{ marginBottom: 16 }}>
              ${microFeedback.map((fb, i) => html`
                <div key=${i} className="pop-in" style=${{ fontSize: 12, fontWeight: 700, color: fb.color, marginBottom: 4, animationDelay: (i * 0.15) + 's' }}>${fb.text}</div>
              `)}
            </div>
          `}

          <div className="flex justify-center gap-5" style=${{ marginBottom: 24 }}>
            <div>
              <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 24, fontWeight: 900, color: T.accent }}>${gymTotal}</div>
              <div style=${{ fontSize: 11, color: T.muted }}>${t('ejercicios')}</div>
            </div>
            <div>
              <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 24, fontWeight: 900, color: T.accent }}>${completedSets}</div>
              <div style=${{ fontSize: 11, color: T.muted }}>${t('SETS')}</div>
            </div>
            ${totalVolume > 0 ? html`
              <div>
                <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 24, fontWeight: 900, color: T.accent }}>${formatVolume(totalVolume)}</div>
                <div style=${{ fontSize: 11, color: T.muted }}>${unitPref} vol.</div>
              </div>
            ` : ''}
            ${elapsedMin > 0 ? html`
              <div>
                <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 24, fontWeight: 900, color: T.accent }}>${elapsedMin}</div>
                <div style=${{ fontSize: 11, color: T.muted }}>min</div>
              </div>
            ` : ''}
          </div>

          <div className="flex gap-3">
            <button onClick=${() => setShowCelebration(false)}
              className="flex-1 py-3 rounded-xl font-bold transition-all active:scale-[0.97]"
              style=${{ background: T.accent, color: '#fff', fontSize: 15, fontFamily: 'Outfit, sans-serif', fontWeight: 700 }}>
              ${LANG === 'en' ? 'Time to rest!' : '¡A descansar!'}
            </button>
            <button onClick=${() => {
              const stats = [
                '\uD83C\uDFCB\uFE0F ' + gymTotal + ' ' + t('ejercicios') + ' \u00B7 ' + completedSets + ' sets',
                totalVolume > 0 ? '\uD83D\uDCAA\uD83C\uDFFC ' + formatVolume(totalVolume) + ' ' + unitPref + (LANG === 'en' ? ' volume' : ' de volumen') : '',
                elapsedMin > 0 ? '\u23F1\uFE0F ' + elapsedMin + (LANG === 'en' ? ' minutes' : ' minutos') : '',
              ].filter(Boolean);
              const fb = microFeedback.map(f => f.text).filter(Boolean);
              const lines = [
                LANG === 'en' ? '\uD83C\uDFC6 Workout completed!' : '\uD83C\uDFC6 Entrenamiento completado!',
                t(routine.name) + ' \u2014 ' + t(routine.focus),
                '',
                ...stats,
                ...(fb.length > 0 ? ['', ...fb] : []),
                '',
                '#DontSkip #Fitness'
              ].join('\n');
              if (navigator.share) {
                navigator.share({ text: lines }).catch(() => {});
              } else {
                navigator.clipboard.writeText(lines).then(() => alert(LANG === 'en' ? 'Copied to clipboard' : 'Copiado al portapapeles'));
              }
            }}
              className="flex items-center justify-center w-12 rounded-xl transition-all active:scale-[0.97]"
              style=${{ background: T.elevated, border: '1px solid ' + T.border }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke=${T.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    `}
  `;
}


// ═══════════════════════════════════════════════════════════════════════
// APP — State lifted here for cross-tab sync
// ═══════════════════════════════════════════════════════════════════════

function ThemeToggle({ dark, onToggle }) {
  return html`
    <button onClick=${onToggle} className="p-2 rounded-xl transition-all"
      style=${{ background: T.input, color: T.muted }}
      aria-label=${dark ? 'Switch to light mode' : 'Switch to dark mode'}>
      ${dark
        ? html`<${Sun} size=${20} weight="duotone" />`
        : html`<${Moon} size=${20} weight="duotone" />`
      }
    </button>
  `;
}

function LangToggle({ onToggle }) {
  return html`
    <button onClick=${onToggle} className="flex items-center justify-center press-scale"
      style=${{ width: 36, height: 36, borderRadius: 10, background: T.input, fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 800, color: T.muted, letterSpacing: '0.5px' }}>
      ${LANG === 'en' ? 'EN' : 'ES'}
    </button>
  `;
}

// ── Floating Timer (visible across all tabs) ─────────────────────────

function FloatingTimer({ workoutStartTime, isPaused, pausedElapsed, routine, exerciseStates, onPlay, onPause, onStop, onGoLive }) {
  const [elapsed, setElapsed] = useState(isPaused ? pausedElapsed : 0);
  useEffect(() => {
    if (!workoutStartTime || isPaused) {
      if (isPaused) setElapsed(pausedElapsed);
      return;
    }
    setElapsed(Math.floor((Date.now() - workoutStartTime) / 1000));
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - workoutStartTime) / 1000)), 1000);
    return () => clearInterval(id);
  }, [workoutStartTime, isPaused, pausedElapsed]);

  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  const timerStr = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const gymDone = exerciseStates.filter(e => e.sets.every(s => s.done)).length;
  const gymTotal = (routine.exercises || []).length;

  return html`
    <div className="fade-up" style=${{ padding: '0 16px', marginBottom: 4 }}>
      <div className="flex items-center gap-3" onClick=${onGoLive}
        style=${{ background: T.accent, borderRadius: 16, padding: '10px 14px', cursor: 'pointer' }}>
        <div className="flex items-center gap-2 flex-1 min-w-0">
          ${isPaused
            ? html`<div style=${{ width: 8, height: 8, borderRadius: '50%', background: '#fbbf24' }} />`
            : html`<div className="live-dot" style=${{ width: 8, height: 8, background: '#fff' }} />`
          }
          <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 20, fontWeight: 900, color: '#fff', letterSpacing: '-0.5px', fontVariantNumeric: 'tabular-nums' }}>${timerStr}</span>
          <span style=${{ fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginLeft: 4 }}>${routine.name} \u00B7 ${gymDone}/${gymTotal}</span>
        </div>
        <div className="flex items-center gap-1.5" onClick=${e => e.stopPropagation()}>
          ${isPaused ? html`
            <button onClick=${onPlay} className="flex items-center justify-center press-scale"
              style=${{ width: 32, height: 32, borderRadius: 8, background: 'rgba(255,255,255,0.2)' }}>
              <${Play} size=${16} weight="fill" color="#fff" />
            </button>
          ` : html`
            <button onClick=${onPause} className="flex items-center justify-center press-scale"
              style=${{ width: 32, height: 32, borderRadius: 8, background: 'rgba(255,255,255,0.2)' }}>
              <${Pause} size=${16} weight="fill" color="#fff" />
            </button>
          `}
          <button onClick=${onStop} className="flex items-center justify-center press-scale"
            style=${{ width: 32, height: 32, borderRadius: 8, background: 'rgba(255,255,255,0.15)' }}>
            <${Stop} size=${16} weight="fill" color="#fff" />
          </button>
        </div>
      </div>
    </div>
  `;
}


function App() {
  const [theme, setTheme] = useState(getInitialTheme);
  const [tab, setTab] = useState('hoy');
  const [tabKey, setTabKey] = useState(0);
  const handleTabChange = useCallback((newTab) => { setTab(newTab); setTabKey(k => k + 1); }, []);

  // Swipe between tabs (#16)
  const tabOrder = ['live', 'hoy', 'comidas', 'progreso', 'jarvis'];
  const swipeRef = useRef({ startX: 0, startY: 0 });
  const handleTouchStart = useCallback((e) => {
    swipeRef.current = { startX: e.touches[0].clientX, startY: e.touches[0].clientY };
  }, []);
  const handleTouchEnd = useCallback((e) => {
    const dx = e.changedTouches[0].clientX - swipeRef.current.startX;
    const dy = e.changedTouches[0].clientY - swipeRef.current.startY;
    if (Math.abs(dx) < 80 || Math.abs(dy) > Math.abs(dx) * 0.7) return; // too short or too vertical
    setTab(prev => {
      const idx = tabOrder.indexOf(prev);
      if (dx < 0 && idx < tabOrder.length - 1) { setTabKey(k => k + 1); return tabOrder[idx + 1]; }
      if (dx > 0 && idx > 0) { setTabKey(k => k + 1); return tabOrder[idx - 1]; }
      return prev;
    });
  }, []);

  const handleThemeToggle = useCallback(() => {
    setTheme(prev => {
      const next = prev === 'dark' ? 'light' : 'dark';
      T = THEMES[next];
      applyThemeCSS(next);
      try { localStorage.setItem('ds_theme', next); } catch {}
      return next;
    });
  }, []);

  const [lang, setLang] = useState(LANG);
  const handleLangToggle = useCallback(() => {
    setLang(prev => {
      const next = prev === 'es' ? 'en' : 'es';
      LANG = next;
      try { localStorage.setItem('ds_lang', next); } catch {}
      try { document.documentElement.lang = next; } catch {}
      return next;
    });
  }, []);

  const todayKey = getTodayKey();
  const routine = ROUTINES[todayKey];

  const [unitPref, setUnitPref] = useState(() => {
    try { return localStorage.getItem('ds_unit_pref') || 'lbs'; } catch { return 'lbs'; }
  });
  const waterKey = 'ds_water_' + localDate();
  const waterLogKey = waterKey + '_log';
  const [waterMl, setWaterMl] = useState(() => {
    try { return Number(localStorage.getItem(waterKey)) || 0; } catch { return 0; }
  });
  const [waterLog, setWaterLog] = useState(() => {
    try { const s = localStorage.getItem(waterLogKey); return s ? JSON.parse(s) : []; } catch { return []; }
  });

  const workoutKey = 'ds_workout_' + todayKey + '_' + localDate();

  const [exerciseStates, setExerciseStates] = useState(() => {
    if (routine.rest) return [];
    try {
      const saved = localStorage.getItem(workoutKey);
      if (saved) return JSON.parse(saved);
    } catch {}
    // Pre-fill weights from last session of the same day
    let lastWeights = null;
    try {
      const today = localDate();
      for (let d = 1; d <= 28; d++) {
        const prev = localDate(new Date(Date.now() - d * 86400000));
        if (prev === today) continue;
        const pk = 'ds_workout_' + todayKey + '_' + prev;
        const ps = localStorage.getItem(pk);
        if (ps) { lastWeights = JSON.parse(ps); break; }
      }
    } catch {}
    return routine.exercises.map((ex, ei) => ({
      sets: Array.from({ length: ex.sets }, (_, si) => {
        const prev = lastWeights && lastWeights[ei] && lastWeights[ei].sets && lastWeights[ei].sets[si];
        return { weight: prev ? prev.weight : null, reps: prev && prev.reps ? prev.reps : null, done: false };
      })
    }));
  });

  const dayMeals = getMealsForDay(todayKey);
  const mealsKey = 'ds_meals_' + localDate();
  const mealsVersionKey = mealsKey + '_v';
  const currentVersion = dayMeals.map(m => m.items.map(i => i.name).join('|')).join('~');
  const [meals, setMeals] = useState(() => {
    try {
      const saved = localStorage.getItem(mealsKey);
      if (saved) {
        const savedVersion = localStorage.getItem(mealsVersionKey);
        if (savedVersion === currentVersion) return JSON.parse(saved);
        // Defaults changed — reset all meals to new defaults
        localStorage.setItem(mealsVersionKey, currentVersion);
        const fresh = dayMeals.map(m => ({ ...m, confirmed: false, items: m.items.map(it => ({ ...it })) }));
        localStorage.setItem(mealsKey, JSON.stringify(fresh));
        return fresh;
      }
    } catch {}
    localStorage.setItem(mealsVersionKey, currentVersion);
    return dayMeals.map(m => ({ ...m, confirmed: false, items: m.items.map(i => ({ ...i })) }));
  });

  useEffect(() => {
    if (!routine.rest && exerciseStates.length > 0) {
      try { localStorage.setItem(workoutKey, JSON.stringify(exerciseStates)); } catch {}
      // Sync records: save any completed set with weight > 0
      const dateNow = localDate();
      routine.exercises.forEach((ex, ei) => {
        const es = exerciseStates[ei];
        if (!es || !es.sets) return;
        es.sets.forEach(s => {
          if (s.done && s.weight > 0) {
            saveRecord(ex.id, s.weight, s.reps || 0, dateNow, unitPref);
          }
        });
      });
    }
  }, [exerciseStates, workoutKey, routine.rest]);

  // Workout timer — persist start time + pause in localStorage
  const dateStr = localDate();
  const timerKey = 'ds_workout_timer_' + todayKey + '_' + dateStr;
  const pauseKey = 'ds_workout_paused_' + dateStr;
  const [workoutStartTime, setWorkoutStartTime] = useState(() => {
    try { const v = localStorage.getItem(timerKey); return v ? Number(v) : null; } catch { return null; }
  });
  const [pausedElapsed, setPausedElapsed] = useState(() => {
    try { const p = localStorage.getItem(pauseKey); return p ? Number(p) : null; } catch { return null; }
  });

  const startTimer = useCallback(() => {
    if (workoutStartTime && pausedElapsed === null) return; // already running
    if (pausedElapsed !== null) {
      // Resume: recalculate start time
      const newStart = Date.now() - pausedElapsed * 1000;
      setWorkoutStartTime(newStart);
      setPausedElapsed(null);
      try { localStorage.setItem(timerKey, String(newStart)); localStorage.removeItem(pauseKey); } catch {}
    } else {
      const now = Date.now();
      setWorkoutStartTime(now);
      try { localStorage.setItem(timerKey, String(now)); } catch {}
    }
  }, [workoutStartTime, pausedElapsed, timerKey, pauseKey]);

  const pauseTimer = useCallback(() => {
    if (!workoutStartTime || pausedElapsed !== null) return;
    const elapsed = Math.floor((Date.now() - workoutStartTime) / 1000);
    setPausedElapsed(elapsed);
    try { localStorage.setItem(pauseKey, String(elapsed)); } catch {}
  }, [workoutStartTime, pausedElapsed, pauseKey]);

  const stopTimer = useCallback(() => {
    setWorkoutStartTime(null);
    setPausedElapsed(null);
    try { localStorage.removeItem(timerKey); localStorage.removeItem(pauseKey); } catch {}
  }, [timerKey, pauseKey]);

  const handleExerciseUpdate = useCallback((index, state) => {
    setExerciseStates(prev => prev.map((e, i) => i === index ? state : e));
    // Start timer on first set completion
    if (!workoutStartTime && state.sets.some(s => s.done)) {
      startTimer();
    }
  }, [workoutStartTime, startTimer]);

  const saveMeals = useCallback((m) => {
    try { localStorage.setItem(mealsKey, JSON.stringify(m)); } catch {}
  }, [mealsKey]);

  const handleMealConfirm = useCallback((index) => {
    setMeals(prev => {
      const next = prev.map((m, i) => i === index ? { ...m, confirmed: true } : m);
      saveMeals(next);
      return next;
    });
  }, [saveMeals]);

  const handleMealEdit = useCallback((index, newItems) => {
    setMeals(prev => {
      const next = prev.map((m, i) => i === index ? { ...m, items: newItems, confirmed: true } : m);
      saveMeals(next);
      return next;
    });
  }, [saveMeals]);

  const handleAddMeal = useCallback((items) => {
    const hour = new Date().getHours();
    const timeStr = (hour > 12 ? hour - 12 : hour || 12) + ':' + String(new Date().getMinutes()).padStart(2, '0') + (hour >= 12 ? ' PM' : ' AM');
    setMeals(prev => {
      const next = [...prev, { time: timeStr, name: LANG === 'en' ? 'Custom meal' : 'Comida personalizada', icon: 'custom', confirmed: true, items }];
      saveMeals(next);
      return next;
    });
  }, [saveMeals]);

  const handleAddWater = useCallback((ml) => {
    setWaterMl(w => {
      const next = w + ml;
      try { localStorage.setItem(waterKey, String(next)); } catch {}
      return next;
    });
    setWaterLog(prev => {
      const next = [...prev, ml];
      try { localStorage.setItem(waterLogKey, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [waterKey, waterLogKey]);

  const handleUndoWater = useCallback(() => {
    setWaterLog(prev => {
      if (prev.length === 0) return prev;
      const lastMl = prev[prev.length - 1];
      const next = prev.slice(0, -1);
      try { localStorage.setItem(waterLogKey, JSON.stringify(next)); } catch {}
      setWaterMl(w => {
        const updated = Math.max(w - lastMl, 0);
        try { localStorage.setItem(waterKey, String(updated)); } catch {}
        return updated;
      });
      return next;
    });
  }, [waterKey, waterLogKey]);

  const handleUnitToggle = useCallback(() => {
    setUnitPref(u => {
      const next = u === 'kg' ? 'lbs' : 'kg';
      try { localStorage.setItem('ds_unit_pref', next); } catch {}
      return next;
    });
  }, []);

  // Request notification permission
  useEffect(() => {
    try { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); } catch {}
  }, []);

  // Splash screen
  const [showSplash, setShowSplash] = useState(() => {
    try { if (sessionStorage.getItem('ds_splash_shown')) return false; } catch {}
    return true;
  });
  useEffect(() => {
    if (showSplash) {
      try { sessionStorage.setItem('ds_splash_shown', '1'); } catch {}
      const tid = setTimeout(() => setShowSplash(false), 1600);
      return () => clearTimeout(tid);
    }
  }, []);

  return html`
    ${showSplash && html`
      <div className="splash-screen fixed inset-0 z-[100] flex flex-col items-center justify-center"
        style=${{ background: 'linear-gradient(135deg, #1a3a5c, #0f2338)' }}>
        <img src="logo-icon.png" alt="" className="splash-logo" style=${{ height: 80, width: 'auto', marginBottom: 16 }} />
        <div className="splash-text" style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, color: 'rgba(255,255,255,0.9)', letterSpacing: '-1px' }}>DontSkip</div>
      </div>
    `}
    <div className="safe-top-bar" style=${{ background: T.bg }} />
    <div className="max-w-lg mx-auto min-h-screen" style=${{ paddingTop: 'var(--safe-top)' }}
      onTouchStart=${handleTouchStart} onTouchEnd=${handleTouchEnd}>

      ${workoutStartTime && tab !== 'live' && !routine.rest ? (() => {
        const isPaused = pausedElapsed !== null;
        return html`<${FloatingTimer}
          workoutStartTime=${workoutStartTime} isPaused=${isPaused} pausedElapsed=${pausedElapsed}
          routine=${routine} exerciseStates=${exerciseStates}
          onPlay=${startTimer} onPause=${pauseTimer} onStop=${stopTimer}
          onGoLive=${() => handleTabChange('live')}
        />`;
      })() : ''}

      <div key=${tabKey} className="tab-enter">
      ${tab === 'hoy' && html`<${TodayTab}
        meals=${meals} onMealConfirm=${handleMealConfirm} onMealEdit=${handleMealEdit} onAddMeal=${handleAddMeal}
        waterMl=${waterMl} onAddWater=${handleAddWater} onUndoWater=${handleUndoWater} waterLog=${waterLog}
        unitPref=${unitPref} onUnitToggle=${handleUnitToggle}
        exerciseStates=${exerciseStates} onExerciseUpdate=${handleExerciseUpdate}
        workoutStartTime=${workoutStartTime} onStartTimer=${startTimer}
        dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle}
        onOpenPerfil=${() => handleTabChange('perfil')}
      />`}
      ${tab === 'live' && html`<${LiveTab}
        routine=${routine}
        exerciseStates=${exerciseStates} onExerciseUpdate=${handleExerciseUpdate}
        unitPref=${unitPref}
        workoutStartTime=${workoutStartTime} pausedElapsed=${pausedElapsed}
        onStartTimer=${startTimer} onPauseTimer=${pauseTimer} onStopTimer=${stopTimer}
        dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle}
      />`}
      ${tab === 'comidas' && html`<${ComidasTab}
        meals=${meals} onMealConfirm=${handleMealConfirm} onMealEdit=${handleMealEdit} onAddMeal=${handleAddMeal}
        dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle}
      />`}
      ${tab === 'progreso' && html`<${ProgresoTab} dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle} unitPref=${unitPref} />`}
      ${tab === 'perfil' && html`<${PerfilTab} dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle} unitPref=${unitPref} onUnitToggle=${handleUnitToggle} />`}
      ${tab === 'jarvis' && html`<${JarvisTab} meals=${meals} waterMl=${waterMl} exerciseStates=${exerciseStates} routine=${routine} dark=${theme === 'dark'} onThemeToggle=${handleThemeToggle} onLangToggle=${handleLangToggle} />`}
      </div>
      <${TabBar} active=${tab} onChange=${handleTabChange} />
    </div>
  `;
}

// RENDER
// ═══════════════════════════════════════════════════════════════════════

root.render(html`<${App} />`);

</script>
