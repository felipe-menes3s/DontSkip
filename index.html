                  </div>
                `)}
              </div>
            `;
          })()}

          ${(() => {
            if (isPlank || !sets[0] || !sets[0].weight || sets[0].weight <= 0) return '';
            const work = sets[0].weight;
            const warmups = [
              { pct: 0, label: t('Barra'), w: unitPref === 'lbs' ? 45 : 20 },
              { pct: 50, label: '50%', w: Math.round(work * 0.5) },
              { pct: 70, label: '70%', w: Math.round(work * 0.7) },
              { pct: 85, label: '85%', w: Math.round(work * 0.85) },
            ].filter(wu => wu.w < work);
            if (warmups.length < 2) return '';
            return html`
              <details className="mb-3" style=${{ fontSize: 11 }}>
                <summary className="flex items-center gap-1.5 cursor-pointer py-1.5 px-2 rounded-lg" style=${{ color: T.accent, fontWeight: 700, background: T.accentDim }}>
                  <${Barbell} size=${12} weight="duotone" />
                  ${t('Calentamiento sugerido')}
                </summary>
                <div className="flex gap-2 mt-2 px-1">
                  ${warmups.map((wu, wi) => html`
                    <div key=${wi} className="flex-1 text-center py-2 rounded-lg" style=${{ background: T.elevated }}>
                      <div style=${{ fontSize: 13, fontWeight: 800, color: T.text }}>${wu.w}</div>
                      <div style=${{ fontSize: 9, color: T.muted, marginTop: 1 }}>${wu.label}</div>
                    </div>
                  `)}
                  <div className="flex-1 text-center py-2 rounded-lg" style=${{ background: T.accentDim }}>
                    <div style=${{ fontSize: 13, fontWeight: 800, color: T.accent }}>${work}</div>
                    <div style=${{ fontSize: 9, color: T.accent, marginTop: 1 }}>Work</div>
                  </div>
                </div>
              </details>
            `;
          })()}

          ${(() => {
            if (isPlank || !sets[0] || !sets[0].weight || sets[0].weight <= 0) return '';
            const barWeight = unitPref === 'lbs' ? 45 : 20;
            const totalW = sets[0].weight;
            if (totalW <= barWeight) return '';
            const perSide = (totalW - barWeight) / 2;
            const plates = unitPref === 'lbs' ? [45, 35, 25, 10, 5, 2.5] : [20, 15, 10, 5, 2.5, 1.25];
            const result = [];
            let remaining = perSide;
            plates.forEach(p => {
              const count = Math.floor(remaining / p);
              if (count > 0) { result.push({ w: p, n: count }); remaining -= count * p; }
            });
            if (result.length === 0) return '';
            return html`
              <details className="mb-3" style=${{ fontSize: 11 }}>
                <summary className="flex items-center gap-1.5 cursor-pointer py-1.5 px-2 rounded-lg" style=${{ color: T.water, fontWeight: 700, background: T.waterDim }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                  ${t('Discos por lado')}
                </summary>
                <div className="flex items-center gap-2 mt-2 px-1">
                  <div className="text-center py-1.5 px-3 rounded-lg" style=${{ background: T.elevated }}>
                    <div style=${{ fontSize: 12, fontWeight: 700, color: T.muted }}>${t('Barra')}</div>
                    <div style=${{ fontSize: 11, fontWeight: 800, color: T.text }}>${barWeight}</div>
                  </div>
                  <span style=${{ color: T.muted, fontSize: 10 }}>+</span>
                  ${result.map((r, ri) => html`
                    <div key=${ri} className="text-center py-1.5 px-3 rounded-lg" style=${{ background: T.waterDim }}>
                      <div style=${{ fontSize: 12, fontWeight: 800, color: T.water }}>${r.w}${unitPref === 'lbs' ? '' : 'kg'}</div>
                      <div style=${{ fontSize: 9, color: T.muted }}>×${r.n}</div>
                    </div>
                  `)}
                  <span style=${{ fontSize: 10, color: T.sub, marginLeft: 'auto' }}>${t('por lado')}</span>
                </div>
              </details>
            `;
          })()}

          ${!isPlank && sets[0] && sets[0].weight > 0 && sets.some(s => !s.done && !s.weight) ? html`
            <button onClick=${fillSets}
              className="w-full flex items-center justify-center gap-1.5 mb-2 py-2 rounded-xl press-scale"
              style=${{ background: T.accentDim, color: T.accent, fontSize: 11, fontWeight: 700, border: '1px solid ' + T.accent + '15' }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              ${t('Rellenar sets')} (${sets[0].weight} ${unitPref} × ${sets[0].reps || exercise.reps})
            </button>
          ` : ''}
          <div className="space-y-2">
            ${sets.map((s, si) => html`
              <div key=${si} className="flex items-center gap-2"
                style=${{ background: s.done ? T.greenDim : T.input, border: s.done ? '1px solid ' + T.greenDim : '1px solid transparent', transition: 'all 0.2s', borderRadius: 12, padding: '10px 14px' }}>
                <input type="checkbox" className="ds-check" checked=${s.done} onChange=${() => toggleSet(si)} />
                <span className="text-xs font-semibold w-10" style=${{ color: T.muted }}>Set ${si + 1}</span>
                ${isPlank ? html`
                  <span className="text-xs flex-1 text-center" style=${{ color: T.sub }}>${exercise.reps}</span>
                ` : html`
                  <div className="flex items-center gap-1 flex-1">
                    <input type="number" placeholder="0" value=${s.weight || ''}
                      onChange=${e => updateSet(si, 'weight', Number(e.target.value))}
                      className="w-16 text-center text-sm font-semibold rounded-lg py-1.5"
                      style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
                    <span className="text-xs" style=${{ color: T.muted }}>${unitPref}</span>
                  </div>
                  <div className="flex items-center gap-1">
                    <input type="number" placeholder=${exercise.reps} value=${s.reps || ''}
                      onChange=${e => updateSet(si, 'reps', Number(e.target.value))}
                      className="w-12 text-center text-sm font-semibold rounded-lg py-1.5"
                      style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
                    <span className="text-xs" style=${{ color: T.muted }}>reps</span>
                  </div>
                `}
                ${prSet === si && html`
                  <span className="pop-in px-2 py-0.5 rounded-md" style=${{ fontSize: 10, fontWeight: 800, background: T.amberDim, color: T.amber, whiteSpace: 'nowrap' }}>PR \uD83C\uDFC6</span>
                `}
                ${s.done && !isPlank ? html`
                  <button onClick=${(e) => { e.stopPropagation(); const rpes = [null,6,7,8,9,10]; const cur = s.rpe || null; const idx = rpes.indexOf(cur); const next = rpes[(idx + 1) % rpes.length]; updateSet(si, 'rpe', next); }}
                    className="press-scale" style=${{ fontSize: 9, fontWeight: 800, padding: '2px 6px', borderRadius: 6, minWidth: 28, textAlign: 'center',
                      background: !s.rpe ? T.elevated : s.rpe <= 7 ? T.greenDim : s.rpe <= 8 ? T.amberDim : T.red + '18',
                      color: !s.rpe ? T.muted : s.rpe <= 7 ? T.green : s.rpe <= 8 ? T.amber : T.red,
                      border: '1px solid ' + (!s.rpe ? T.border : 'transparent') }}>
                    ${s.rpe ? 'RPE ' + s.rpe : 'RPE'}
                  </button>
                ` : ''}
              </div>
            `)}
          </div>
          ${(() => {
            if (isPlank) return '';
            const doneSets = sets.filter(s => s.done && s.weight > 0 && s.reps > 0);
            if (doneSets.length === 0) return '';
            const best = doneSets.reduce((a, b) => estimate1RM(a.weight, a.reps) >= estimate1RM(b.weight, b.reps) ? a : b);
            const orm = estimate1RM(best.weight, best.reps);
            if (orm <= 0) return '';
            return html`
              <div className="flex items-center justify-between mt-2 px-3 py-2 rounded-lg" style=${{ background: T.accentDim, border: '1px solid ' + T.accent + '15' }}>
                <span style=${{ fontSize: 11, fontWeight: 600, color: T.accent }}>1RM Est.</span>
                <span style=${{ fontSize: 13, fontWeight: 800, color: T.accent, fontFamily: 'Outfit, sans-serif' }}>${orm} ${unitPref}</span>
              </div>
            `;
          })()}
          ${!allDone && html`
            <button onClick=${completeAll}
              className="w-full flex items-center justify-center gap-2 mt-3 py-2.5 rounded-xl press-scale transition-all"
              style=${{ background: T.greenDim, color: T.green, fontSize: 12, fontWeight: 700, border: '1px solid ' + T.green + '30' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              ${t('Completar ejercicio')}
            </button>
          `}
          ${showTimer && !allDone && html`<${RestTimer} duration=${getRestTime(exercise.id)} onDone=${() => setShowTimer(false)} />`}

          ${html`
            <div className="mt-3 flex items-start gap-2">
              <${Note} size=${12} weight="duotone" color=${T.muted} style=${{ marginTop: 6, flexShrink: 0 }} />
              <input type="text" placeholder=${t('Agregar nota...')}
                value=${exerciseState.note || ''}
                onChange=${e => onUpdate({ ...exerciseState, note: e.target.value })}
                className="flex-1 text-xs py-1.5 px-2 rounded-lg"
                style=${{ background: T.input, border: '1px solid ' + T.border, color: T.sub, outline: 'none' }} />
            </div>
          `}
        </div>
      `}
    </div>
  `;
}

// ── Water Counter ──────────────────────────────────────────────────────

function WaterCounter({ waterMl, onAddWater, onUndoWater, waterLog }) {
  const [showCustom, setShowCustom] = useState(false);
  const [customVal, setCustomVal] = useState('');
  const [customUnit, setCustomUnit] = useState('ml');
  const prevWater = useRef(waterMl);

  const done = waterMl >= WATER_GOAL_ML;
  const pct = Math.min(waterMl / WATER_GOAL_ML, 1);
  const totalOz = Math.round(waterMl * 0.033814);
  const goalOz = Math.round(WATER_GOAL_ML * 0.033814);
  const glassCount = Math.floor(waterMl / WATER_GLASS_ML);
  const goalGlasses = Math.floor(WATER_GOAL_ML / WATER_GLASS_ML);

  function addCustom() {
    const num = parseFloat(customVal);
    if (!num || num <= 0) return;
    const ml = customUnit === 'ml' ? Math.round(num) : Math.round(num * 29.5735);
    onAddWater(ml);
    setCustomVal('');
    setShowCustom(false);
  }

  const quickAmounts = [
    { ml: 150, label: '150 ml', sub: '5 oz' },
    { ml: 250, label: '250 ml', sub: '8 oz' },
    { ml: 500, label: '500 ml', sub: '17 oz' },
    { ml: 750, label: '750 ml', sub: '25 oz' },
  ];

  // Glass fill: percentage from bottom
  const fillH = pct * 100;

  return html`
    <div className="ds-card fade-up" style=${{ padding: 20, marginBottom: 12 }}>
      <!-- Header -->
      <div className="flex items-center justify-between mb-4">
        <span style=${{ fontFamily: 'Outfit, sans-serif', fontWeight: 700, fontSize: 15, color: T.text }}>${t('Agua')}</span>
        <span style=${{ fontSize: 13, fontWeight: 600, color: T.muted }}>${glassCount} ${t('de')} ${goalGlasses} ${t('vasos')}</span>
      </div>

      <!-- Main: glass + stats -->
      <div className="flex items-center gap-5">
        <!-- Glass SVG -->
        <div className="flex-shrink-0" style=${{ width: 80, height: 120 }}>
          <svg width="80" height="120" viewBox="0 0 80 120">
            <defs>
              <clipPath id="glassClip">
                <path d="M8 6 L18 110 C18 114 27 117 40 117 C53 114 62 114 62 110 L72 6 Z" />
              </clipPath>
            </defs>
            <!-- Glass outline — wider at top (mouth), narrower at bottom (base) -->
            <path d="M8 6 L18 110 C18 114 27 117 40 117 C53 117 62 114 62 110 L72 6 Z"
              fill=${T.input} stroke=${T.border} strokeWidth="1.5" />
            <!-- Water fill (celeste) -->
            ${waterMl > 0 && html`
              <g clipPath="url(#glassClip)">
                <rect x="0" y=${120 - fillH * 1.12} width="80" height=${fillH * 1.12 + 1}
                  fill="#7dd3fc" opacity="0.35"
                  style=${{ transition: 'y 0.5s ease, height 0.5s ease' }} />
                <rect x="0" y=${120 - fillH * 1.09} width="80" height=${fillH * 1.09 + 1}
                  fill="#38bdf8" opacity="0.30"
                  style=${{ transition: 'y 0.5s ease, height 0.5s ease' }} />
              </g>
            `}
            <!-- Glass rim -->
            <path d="M8 6 L72 6" stroke=${T.border} strokeWidth="2" strokeLinecap="round" />
            <!-- ML text inside -->
            <text x="40" y="60" textAnchor="middle" fill=${done ? T.green : T.text}
              style=${{ fontFamily: 'Outfit, sans-serif', fontSize: waterMl >= 1000 ? 18 : 22, fontWeight: 900 }}>
              ${waterMl}
            </text>
            <text x="40" y="76" textAnchor="middle" fill=${T.muted}
              style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 11, fontWeight: 600 }}>
              ml
            </text>
          </svg>
        </div>

        <!-- Stats column -->
        <div className="flex-1 flex flex-col gap-3">
          <div>
            <div className="flex justify-between mb-1">
              <span style=${{ fontSize: 11, fontWeight: 600, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.05em' }}>${t('Progreso')}</span>
              <span style=${{ fontSize: 11, fontWeight: 700, color: T.accent }}>${Math.round(pct * 100)}%</span>
            </div>
            <div className="h-2 rounded-full overflow-hidden" style=${{ background: T.input }}>
              <div className="h-full rounded-full"
                style=${{ width: (pct * 100) + '%', background: done ? T.green : T.accent, transition: 'width 0.5s ease' }} />
            </div>
            <div className="flex justify-between mt-1">
              <span style=${{ fontSize: 11, color: T.muted }}>${totalOz} fl oz</span>
              <span style=${{ fontSize: 11, color: T.muted }}>${goalOz} fl oz</span>
            </div>
          </div>

          <!-- Mini drops -->
          <div className="flex gap-1 flex-wrap">
            ${Array.from({ length: goalGlasses }, (_, i) => {
              const filled = i < glassCount;
              return html`
                <svg key=${i} width="14" height="18" viewBox="0 0 14 18"
                  style=${{ transition: 'opacity 0.3s', transitionDelay: (i * 40) + 'ms', opacity: filled ? 1 : 0.35 }}>
                  <path d="M7 1 C7 1 1.5 7 1.5 10.5 C1.5 13.5 4 16 7 16 C10 16 12.5 13.5 12.5 10.5 C12.5 7 7 1 7 1Z"
                    fill=${filled ? '#38bdf8' : T.input}
                    stroke=${filled ? '#38bdf8' : T.border}
                    strokeWidth="0.8" />
                </svg>
              `;
            })}
          </div>

          <div style=${{ fontSize: 11, color: T.muted }}>
            ${t('Meta')}: ${WATER_GOAL_ML} ml · ${goalOz} fl oz
          </div>
        </div>
      </div>

      <!-- Quick-add buttons -->
      <div className="flex gap-2 mt-4">
        ${quickAmounts.map(q => html`
          <button key=${q.ml} onClick=${() => onAddWater(q.ml)} disabled=${done}
            className="flex-1 py-2.5 rounded-xl text-center transition-all active:scale-[0.96]"
            style=${{ background: T.accentDim, border: '1px solid ' + T.accentDim }}>
            <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 700, color: T.accent }}>${q.label}</div>
            <div style=${{ fontSize: 10, color: T.muted, marginTop: 1 }}>${q.sub}</div>
          </button>
        `)}
      </div>

      <!-- Undo + Custom row -->
      <div className="flex gap-2 mt-2">
        ${!showCustom ? html`
          <button onClick=${() => setShowCustom(true)} disabled=${done}
            className="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-[0.97]"
            style=${{ background: T.input, color: T.sub, border: '1px solid ' + T.border }}>
            ${t('Cantidad personalizada')}
          </button>
          ${waterLog && waterLog.length > 0 && html`
            <button onClick=${onUndoWater}
              className="py-2.5 px-3.5 rounded-xl text-sm font-semibold transition-all active:scale-[0.96] flex items-center gap-1.5"
              style=${{ background: T.input, color: T.sub, border: '1px solid ' + T.border }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><polyline points="7 14 3 10 7 6"/></svg>
              ${waterLog[waterLog.length - 1]} ml
            </button>
          `}
        ` : html`
          <div className="flex gap-2 w-full items-center">
            <input type="number" placeholder=${customUnit === 'ml' ? '350' : '12'}
              value=${customVal} onInput=${e => setCustomVal(e.target.value)}
              className="flex-1 py-2.5 px-3 rounded-xl text-sm font-semibold"
              style=${{ background: T.input, color: T.text, border: '1px solid ' + T.border }}
              onKeyDown=${e => e.key === 'Enter' && addCustom()}
            />
            <button onClick=${() => setCustomUnit(u => u === 'ml' ? 'oz' : 'ml')}
              className="py-2.5 px-3 rounded-xl text-xs font-bold"
              style=${{ background: T.accentDim, color: T.accent, minWidth: 44 }}>
              ${customUnit}
            </button>
            <button onClick=${addCustom}
              className="py-2.5 px-4 rounded-xl text-sm font-bold transition-all active:scale-[0.96]"
              style=${{ background: T.accent, color: '#fff' }}>
              +
            </button>
          </div>
        `}
      </div>

      ${done && html`
        <div className="text-center mt-3" style=${{ fontSize: 13, fontWeight: 700, color: T.green }}>
          \u2713 ${t('Meta cumplida')}
        </div>
      `}
    </div>
  `;
}


// ── Jarvis FAB ─────────────────────────────────────────────────────────

function JarvisTab({ meals, waterMl, exerciseStates, routine, dark, onThemeToggle, onLangToggle }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [showQuick, setShowQuick] = useState(true);
  const chatEndRef = useRef(null);
  const inputRef = useRef(null);

  // Auto-scroll to bottom
  useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [messages.length, loading]);

  const ctx = useMemo(() => buildDayContext(routine, exerciseStates, meals, waterMl), [routine, exerciseStates, meals, waterMl]);

  const welcomeMsg = useMemo(() => {
    const g = getGreeting();
    if (ctx.isRest) {
      return LANG === 'en'
        ? '\uD83D\uDC4B\uD83C\uDFFC ' + t(g) + ' Felipe. Today is ' + ctx.dayLabel + ' \u2014 ' + t(ctx.routineName) + '. You have ' + ctx.proteinNow + 'g protein and ' + ctx.waterGlasses + ' glasses of water.'
        : '\uD83D\uDC4B\uD83C\uDFFC ' + g + ' Felipe. Hoy es ' + ctx.dayLabel + ' \u2014 ' + ctx.routineName + '. Llevas ' + ctx.proteinNow + 'g de prote\u00EDna y ' + ctx.waterGlasses + ' vasos de agua.';
    }
    return LANG === 'en'
      ? '\uD83D\uDC4B\uD83C\uDFFC ' + t(g) + ' Felipe. Today is ' + ctx.dayLabel + ' \u2014 ' + t(ctx.routineName) + ' (' + t(ctx.routineFocus) + '). You have ' + ctx.proteinNow + 'g protein and ' + ctx.waterGlasses + ' glasses of water.'
      : '\uD83D\uDC4B\uD83C\uDFFC ' + g + ' Felipe. Hoy es ' + ctx.dayLabel + ' \u2014 ' + ctx.routineName + ' (' + ctx.routineFocus + '). Llevas ' + ctx.proteinNow + 'g de prote\u00EDna y ' + ctx.waterGlasses + ' vasos de agua.';
  }, [ctx]);

  // Day summary cards
  const summaryCards = useMemo(() => {
    const cards = [];
    const protPct = Math.min(100, Math.round((ctx.proteinNow / PROTEIN_GOAL) * 100));
    cards.push({ label: t('Proteína'), value: ctx.proteinNow + 'g', max: PROTEIN_GOAL + 'g', pct: protPct, color: T.accent });
    const calPct = Math.min(100, Math.round((ctx.caloriesNow / CALORIES_GOAL) * 100));
    cards.push({ label: t('Calorías'), value: ctx.caloriesNow, max: CALORIES_GOAL.toLocaleString(), pct: calPct, color: T.amber || '#f59e0b' });
    const wGoalGlasses = Math.floor(WATER_GOAL_ML / WATER_GLASS_ML);
    const waterPct = Math.min(100, Math.round((waterMl / WATER_GOAL_ML) * 100));
    cards.push({ label: t('Agua'), value: ctx.waterGlasses, max: wGoalGlasses + ' ' + t('vasos'), pct: waterPct, color: T.water || '#38bdf8' });
    if (!ctx.isRest) {
      const done = exerciseStates.filter(es => es.sets.every(s => s.done)).length;
      const total = routine.exercises ? routine.exercises.length : 0;
      const gymPct = total > 0 ? Math.round((done / total) * 100) : 0;
      cards.push({ label: 'Gym', value: done + '/' + total, max: t('ejercicios'), pct: gymPct, color: T.green || '#22c55e' });
    }
    return cards;
  }, [ctx, waterMl, exerciseStates, routine]);

  const addJarvisReply = useCallback((text) => {
    setLoading(true);
    setTimeout(() => {
      setMessages(prev => [...prev, { role: 'jarvis', content: text }]);
      setLoading(false);
    }, 600);
  }, []);

  const handleQuickButton = useCallback((action) => {
    setShowQuick(false);
    if (action === 'food_prompt') {
      setMessages(prev => [...prev, { role: 'jarvis', content: t('¿Qué quieres comer? Escríbelo abajo y te digo si encaja con tu día.') }]);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
      return;
    }
    if (action === 'exercise_prompt') {
      setMessages(prev => [...prev, { role: 'jarvis', content: t('¿Cuál ejercicio? Escribe el nombre y te explico la técnica.') }]);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
      return;
    }
    setMessages(prev => [...prev, { role: 'user', content: JARVIS_BUTTONS.find(b => b.action === action)?.label || action }]);
    addJarvisReply(jarvisRespond(action, '', ctx));
  }, [ctx, addJarvisReply]);

  const handleSend = useCallback(() => {
    const text = input.trim();
    if (!text || loading) return;
    setInput('');
    setShowQuick(false);
    setMessages(prev => [...prev, { role: 'user', content: text }]);
    const intent = detectIntent(text);
    addJarvisReply(jarvisRespond(intent, text, ctx));
  }, [input, loading, ctx, addJarvisReply]);

  const handleClear = useCallback(() => {
    setMessages([]);
    setShowQuick(true);
  }, []);

  return html`
    <div className="flex flex-col" style=${{ height: 'calc(100vh - var(--safe-top) - 64px - var(--safe-bottom))', overflow: 'hidden' }}>
      <!-- Header -->
      <div className="px-5 pt-4 pb-3">
        <div className="flex items-center justify-between mb-1">
          <div className="flex items-center gap-2.5">
            <img src="logo-icon.png" alt="" style=${{ height: 28, width: 'auto' }} />
            <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 800, color: T.text, letterSpacing: '-0.8px' }}>Jarvis</div>
          </div>
          <div className="flex items-center gap-2">
            ${messages.length > 0 && html`
              <button onClick=${handleClear} className="p-2 rounded-xl active:scale-90 transition-transform"
                style=${{ background: T.input, color: T.muted }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            `}
            <${LangToggle} onToggle=${onLangToggle} />
            <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />
          </div>
        </div>
        <div style=${{ fontSize: 13, color: T.sub }}>${t('Tu asistente de fitness')}</div>
      </div>

      <!-- Day snapshot -->
      <div className="px-5 mb-3">
        <div className="flex gap-2">
          ${summaryCards.map((c, i) => html`
            <div key=${i} className="flex-1 rounded-xl py-2.5 px-2" style=${{ background: T.elevated, border: '1px solid ' + T.border, textAlign: 'center' }}>
              <div style=${{ fontSize: 16, fontWeight: 800, color: c.color, fontFamily: 'Outfit, sans-serif', lineHeight: 1 }}>${c.value}</div>
              <div style=${{ fontSize: 9, fontWeight: 600, color: T.muted, marginTop: 3, textTransform: 'uppercase', letterSpacing: '0.05em' }}>${c.label}</div>
              <div style=${{ marginTop: 4, height: 3, borderRadius: 2, background: T.input, overflow: 'hidden' }}>
                <div style=${{ width: c.pct + '%', height: '100%', borderRadius: 2, background: c.color, transition: 'width 0.5s ease' }} />
              </div>
            </div>
          `)}
        </div>
      </div>

      <!-- Chat area -->
      <div className="flex-1 overflow-y-auto px-4 no-scrollbar"
        style=${{ display: 'flex', flexDirection: 'column', gap: 12 }}>

        <!-- Welcome message -->
        <div className="flex gap-2.5 msg-enter">
          <div className="flex-shrink-0 mt-0.5" style=${{
            width: 32, height: 32, borderRadius: 12,
            background: 'linear-gradient(135deg, ' + T.accent + ', ' + T.accentGlow + ')',
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <span style=${{ color: '#fff', fontFamily: 'Outfit, sans-serif', fontWeight: 900, fontSize: 14 }}>J</span>
          </div>
          <div className="rounded-2xl px-4 py-2.5" style=${{
            background: T.elevated, maxWidth: '82%', fontSize: 14, lineHeight: '1.55',
            color: T.text, borderTopLeftRadius: 6, border: '1px solid ' + T.border
          }}>
            ${welcomeMsg}
          </div>
        </div>

        <!-- Quick buttons -->
        ${showQuick && messages.length === 0 && html`
          <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 4 }}>
            ${JARVIS_BUTTONS.map((btn, i) => html`
              <button key=${i} onClick=${() => handleQuickButton(btn.action)}
                className="flex items-center gap-3 py-3 px-3.5 rounded-xl transition-all active:scale-[0.97]"
                style=${{ background: T.elevated, border: '1px solid ' + T.border, textAlign: 'left' }}>
                <span style=${{ fontSize: 20, flexShrink: 0 }}>${btn.emoji}</span>
                <span style=${{ fontSize: 12, fontWeight: 600, color: T.text, lineHeight: '1.3' }}>${t(btn.label)}</span>
              </button>
            `)}
          </div>
        `}

        <!-- Messages -->
        ${messages.map((msg, i) => html`
          <div key=${i} className="flex msg-enter"
            style=${{ justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start', gap: 10 }}>
            ${msg.role === 'jarvis' && html`
              <div className="flex-shrink-0 mt-0.5" style=${{
                width: 32, height: 32, borderRadius: 12,
                background: 'linear-gradient(135deg, ' + T.accent + ', ' + T.accentGlow + ')',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                <span style=${{ color: '#fff', fontFamily: 'Outfit, sans-serif', fontWeight: 900, fontSize: 14 }}>J</span>
              </div>
            `}
            <div className="rounded-2xl px-4 py-2.5" style=${{
              background: msg.role === 'user' ? T.accent : T.elevated,
              color: msg.role === 'user' ? '#ffffff' : T.text,
              maxWidth: '82%', fontSize: 14, lineHeight: '1.55',
              borderBottomRightRadius: msg.role === 'user' ? 6 : 16,
              borderTopLeftRadius: msg.role === 'jarvis' ? 6 : 16,
              border: msg.role === 'jarvis' ? '1px solid ' + T.border : 'none',
              whiteSpace: 'pre-wrap', wordBreak: 'break-word'
            }}>
              ${msg.content}
            </div>
          </div>
        `)}

        <!-- Loading dots -->
        ${loading && html`
          <div className="flex gap-2.5 msg-enter">
            <div className="flex-shrink-0 mt-0.5" style=${{
              width: 32, height: 32, borderRadius: 12,
              background: 'linear-gradient(135deg, ' + T.accent + ', ' + T.accentGlow + ')',
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
              <span style=${{ color: '#fff', fontFamily: 'Outfit, sans-serif', fontWeight: 900, fontSize: 14 }}>J</span>
            </div>
            <div className="rounded-2xl px-4 py-3" style=${{ background: T.elevated, borderTopLeftRadius: 6, border: '1px solid ' + T.border }}>
              <div className="flex gap-1.5">
                <div className="typing-dot" style=${{ width: 7, height: 7, borderRadius: '50%', background: T.muted }} />
                <div className="typing-dot" style=${{ width: 7, height: 7, borderRadius: '50%', background: T.muted }} />
                <div className="typing-dot" style=${{ width: 7, height: 7, borderRadius: '50%', background: T.muted }} />
              </div>
            </div>
          </div>
        `}

        <div ref=${chatEndRef} />
      </div>

      <!-- Input bar (sticky bottom) -->
      <div className="px-4 py-3" style=${{ borderTop: '1px solid ' + T.border, background: T.bg }}>
        <div className="flex items-center gap-2">
          <input ref=${inputRef}
            type="text"
            value=${input}
            onInput=${e => setInput(e.target.value)}
            onKeyDown=${e => e.key === 'Enter' && !loading && handleSend()}
            placeholder=${t('Pregunta algo a Jarvis...')}
            className="flex-1 text-sm rounded-xl py-3 px-4"
            style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text, outline: 'none' }}
            disabled=${loading}
          />
          <button onClick=${handleSend}
            disabled=${!input.trim() || loading}
            className="flex-shrink-0 w-11 h-11 rounded-xl flex items-center justify-center transition-all active:scale-90"
            style=${{
              background: input.trim() && !loading ? T.accent : T.muted,
              opacity: input.trim() && !loading ? 1 : 0.4
            }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  `;
}

      <div className="flex items-stretch max-w-lg mx-auto" style=${{ minHeight: 56 }}>
        ${tabs.map(tab => {
          const isActive = active === tab.id;
          return html`
            <button key=${tab.id} onClick=${() => onChange(tab.id)}
              className="flex-1 flex flex-col items-center justify-center gap-0.5 transition-all"
              style=${{ color: isActive ? '#fff' : T.muted, background: isActive ? T.accent : 'transparent', borderRadius: 10 }}>
              <div style=${{ position: 'relative' }}>
                ${tab.icon(isActive)}
                ${tab.id === 'live' && html`<div className="live-dot" style=${{ position: 'absolute', top: -1, right: -3, width: 6, height: 6, background: isActive ? '#fff' : T.accent }} />`}
              </div>
              <span className="font-semibold" style=${{ fontSize: 10 }}>${tab.label}</span>
            </button>
          `;
        })}
      </div>
    </div>
  `;
}


// ── Semana Tab ────────────────────────────────────────────────────────

function WeekCalendar({ days, selectedIdx, onSelect }) {
  return html`
    <div className="flex gap-1.5 px-5 mb-4">
      ${days.map((d, i) => {
        const isSelected = i === selectedIdx;
        const isToday = d.isToday;
        let bg = 'transparent';
        let textColor = T.text;
        let border = '2px solid transparent';
        if (isToday) { bg = T.accent; textColor = '#fff'; border = '2px solid ' + T.accent; }
        else if (isSelected) { bg = T.accentDim; border = '2px solid ' + T.accent; }
        const moodEmojis = ['\uD83D\uDE2B', '\uD83D\uDE10', '\uD83D\uDE0A', '\uD83D\uDCAA\uD83C\uDFFC', '\uD83D\uDD25'];
        let emoji = '';
        if (d.isPast || d.isToday) {
          const savedMood = (() => { try { const m = localStorage.getItem('ds_mood_' + localDate(d.date)); return m ? moodEmojis[Number(m)] : null; } catch { return null; } })();

function WeeklyVolumeReport() {
  const report = useMemo(() => {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const dayKeys = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

    let thisWeekVol = 0, lastWeekVol = 0, thisWeekSets = 0, lastWeekSets = 0;
    const muscleVol = {};

    // This week
    for (let d = 0; d <= mondayOffset; d++) {
      const date = new Date(today.getTime() - d * 86400000);
      const dateStr = localDate(date);
      const dayIdx = date.getDay();
      const dk = dayKeys[dayIdx];
      const r = ROUTINES[dk];
      if (r.rest || r.cardio || !r.exercises) continue;
      try {
        const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
        if (!saved) continue;
        const states = JSON.parse(saved);
        r.exercises.forEach((ex, i) => {
          if (!states[i]) return;
          states[i].sets.forEach(s => {
            if (s.done) {
              thisWeekSets++;
              if (s.weight > 0) {
                const reps = s.reps || parseInt(ex.reps) || 0;
                const vol = s.weight * reps;
                thisWeekVol += vol;
                const m = ex.muscle;
                muscleVol[m] = (muscleVol[m] || 0) + vol;
              }
            }
          });
        });
      } catch {}
    }

    // Last week
    for (let d = mondayOffset + 1; d <= mondayOffset + 7; d++) {
      const date = new Date(today.getTime() - d * 86400000);
      const dateStr = localDate(date);
      const dayIdx = date.getDay();
      const dk = dayKeys[dayIdx];
      const r = ROUTINES[dk];
      if (r.rest || r.cardio || !r.exercises) continue;
      try {
        const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
        if (!saved) continue;
        const states = JSON.parse(saved);
        r.exercises.forEach((ex, i) => {
          if (!states[i]) return;
          states[i].sets.forEach(s => {
            if (s.done) {
              lastWeekSets++;
              if (s.weight > 0) {
                const reps = s.reps || parseInt(ex.reps) || 0;
                lastWeekVol += s.weight * reps;
              }
            }
          });
        });
      } catch {}
    }

    // Top muscle
    const topMuscle = Object.entries(muscleVol).sort((a, b) => b[1] - a[1])[0];
    const volDiff = lastWeekVol > 0 ? Math.round(((thisWeekVol - lastWeekVol) / lastWeekVol) * 100) : null;

    return { thisWeekVol, lastWeekVol, thisWeekSets, lastWeekSets, volDiff, topMuscle };
  }, []);

  if (report.thisWeekVol === 0 && report.lastWeekVol === 0) return '';

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <${SectionHeader} title=${t("Volumen semanal")} />
      <div className="flex items-end gap-4 mb-3">
        <div>
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, color: T.text, letterSpacing: '-1px' }}>
            ${report.thisWeekVol >= 1000 ? (report.thisWeekVol / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : report.thisWeekVol}
          </div>
          <div style=${{ fontSize: 11, color: T.muted }}>${t('lbs esta semana')}</div>
        </div>
        ${report.volDiff !== null ? html`
          <div className="px-2.5 py-1 rounded-lg" style=${{ background: report.volDiff >= 0 ? T.greenDim : T.amberDim, marginBottom: 4 }}>
            <span style=${{ fontSize: 12, fontWeight: 800, color: report.volDiff >= 0 ? T.green : T.amber }}>
              ${report.volDiff >= 0 ? '\u2191' : '\u2193'} ${Math.abs(report.volDiff)}%
            </span>
          </div>
        ` : ''}
      </div>
      <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        <div className="px-3 py-2 rounded-lg" style=${{ background: T.elevated }}>
          <div style=${{ fontSize: 16, fontWeight: 800, color: T.text }}>${report.thisWeekSets}</div>
          <div style=${{ fontSize: 10, color: T.muted }}>${t('Sets completados')}</div>
        </div>
        ${report.topMuscle ? html`
          <div className="px-3 py-2 rounded-lg" style=${{ background: T.elevated }}>
            <div style=${{ fontSize: 14, fontWeight: 800, color: T.text }}>${t(report.topMuscle[0])}</div>
            <div style=${{ fontSize: 10, color: T.muted }}>${t('Más volumen')}</div>
          </div>
        ` : html`
          <div className="px-3 py-2 rounded-lg" style=${{ background: T.elevated }}>
            <div style=${{ fontSize: 16, fontWeight: 800, color: T.text }}>${report.lastWeekSets || '\u2014'}</div>
            <div style=${{ fontSize: 10, color: T.muted }}>${t('Sets sem. pasada')}</div>
          </div>
        `}
      </div>
    </div>
  `;
}

function WeekSummary() {
  const streak = getStreak();
  const planWeek = getPlanWeek();
  const weekDays = getWeekDays();
  const trainedThisWeek = weekDays.filter(d => {
    if (d.routine.rest && !d.routine.cardio) return false;
    const dateStr = localDate(d.date);
    if (d.routine.cardio) {
      try { return localStorage.getItem('ds_cardio_done_' + dateStr) === 'true'; } catch { return false; }
    }
    try {
      const saved = localStorage.getItem('ds_workout_' + d.dayKey + '_' + dateStr);
      if (!saved) return false;
      const states = JSON.parse(saved);
      return states.some(ex => ex.sets && ex.sets.some(s => s.done));
    } catch { return false; }
  }).length;
  const totalTrainDays = weekDays.filter(d => !d.routine.rest).length;

  const weeksUntilDeload = 8 - ((planWeek - 1) % 8) - 1;

  if (weeksUntilDeload === 0) deloadBadge = '\u26A1 ' + t('Esta es tu semana de descarga \u2014 volumen al 50%');

  else if (weeksUntilDeload <= 3) deloadBadge = '\u26A1 ' + t('Descarga en') + ' ' + weeksUntilDeload + ' ' + t('semanas');

  const stats = [

    { emoji: '\uD83C\uDFCB\uD83C\uDFFB\u200D\u2642\uFE0F', label: t('Entrenados'), value: trainedThisWeek + ' / ' + totalTrainDays },
    { emoji: '\uD83D\uDCC5', label: t('Semana'), value: '#' + planWeek },
    { emoji: '\uD83C\uDFAF', label: t('Split'), value: 'Upper/Lower' },

  return html`

              <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 15, fontWeight: 800, color: T.text }}>${s.value}</div>

function MuscleMap() {
  // Scan this week's completed workouts to build muscle frequency map
  const muscleHits = useMemo(() => {
    const hits = {};
    const today = new Date();
    const dayOfWeek = today.getDay(); // 0=Sun
    const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    for (let d = 0; d <= mondayOffset; d++) {
      const date = localDate(new Date(today.getTime() - d * 86400000));
      const dayIdx = (dayOfWeek - d + 7) % 7;
      const dayKeys = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      const dk = dayKeys[dayIdx];
      const r2 = ROUTINES[dk];
      if (r2.rest || r2.cardio || !r2.exercises) continue;
      try {
        const saved = localStorage.getItem('ds_workout_' + dk + '_' + date);
        if (!saved) continue;
        const states = JSON.parse(saved);
        r2.exercises.forEach((ex, i) => {
          if (states[i] && states[i].sets.some(s => s.done)) {
            const m = ex.muscle.toLowerCase();
            hits[m] = (hits[m] || 0) + 1;
          }
        });
      } catch {}
    }
    return hits;
  }, []);

  // Map exercise muscle names → SVG group IDs
  const MUSCLE_TO_SVG = {
    'pecho': 'pecho', 'pecho sup.': 'pecho',
    'hombros': 'hombros', 'deltoides post.': 'hombros',
    'b\u00EDceps': 'biceps',
    'tr\u00EDceps': 'triceps',
    'espalda': 'espalda',
    'posterior': 'posterior',
    'core': 'core',
    'gl\u00FAteos': 'gluteos',
    'cu\u00E1driceps': 'cuadriceps',
    'isquiotibiales': 'isquiotibiales',
    'pantorrillas': 'pantorrillas',
  };

  // Aggregate hits per SVG group
  const svgHits = {};
  for (const [muscle, count] of Object.entries(muscleHits)) {
    const svgId = MUSCLE_TO_SVG[muscle];
    if (svgId) svgHits[svgId] = (svgHits[svgId] || 0) + count;
  }

  function getOpacity(svgId) {
    const count = svgHits[svgId] || 0;
    if (count === 0) return 0;
    if (count === 1) return 0.45;
    if (count === 2) return 0.65;
    return 0.85;
  }

  const totalMuscles = Object.keys(svgHits).length;
  const totalHits = Object.values(muscleHits).reduce((a, b) => a + b, 0);

  // Display list for legend
  const displayMuscles = [
    { name: 'Pecho', svgId: 'pecho' },
    { name: 'Hombros', svgId: 'hombros' },
    { name: 'Espalda', svgId: 'espalda' },
    { name: 'B\u00EDceps', svgId: 'biceps' },
    { name: 'Tr\u00EDceps', svgId: 'triceps' },
    { name: 'Core', svgId: 'core' },
    { name: 'Cu\u00E1driceps', svgId: 'cuadriceps' },
    { name: 'Gl\u00FAteos', svgId: 'gluteos' },
    { name: 'Isquiotibiales', svgId: 'isquiotibiales' },
    { name: 'Pantorrillas', svgId: 'pantorrillas' },
  ];

  const accentFill = T.accent;
  const bodyFill = T.input;

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <${SectionHeader} title=${t("Músculos esta semana")} />
      <div className="flex gap-4" style=${{ alignItems: 'flex-start' }}>
        <!-- Anatomical Body (clean, no overlays) -->
        <div className="flex-shrink-0" style=${{ width: 100 }}>
          <img src="body-figure.png" width="100" style=${{ display: 'block', opacity: 0.85 }} />
        </div>
        <!-- Legend -->
        <div className="flex-1" style=${{ minWidth: 0 }}>
          <div style=${{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            ${displayMuscles.map((mg, i) => {
              const count = svgHits[mg.svgId] || 0;
              const active = count > 0;
              return html`
                <div key=${i} className="flex items-center gap-2 px-2.5 py-1.5 rounded-lg" style=${{ background: active ? T.accentDim : T.elevated, transition: 'background 0.3s' }}>
                  <div style=${{ width: 8, height: 8, borderRadius: 4, background: active ? T.accent : T.muted, opacity: active ? getOpacity(mg.svgId) : 0.3, transition: 'all 0.5s' }} />
                  <span style=${{ fontSize: 11, fontWeight: active ? 700 : 500, color: active ? T.accent : T.muted, flex: 1 }}>${t(mg.name)}</span>
                  ${active && html`<span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 900, color: T.accent }}>${count}x</span>`}
                </div>
              `;
            })}
          </div>
        </div>
      </div>
      ${totalHits > 0 ? html`
        <div style=${{ fontSize: 11, color: T.sub, marginTop: 12, textAlign: 'center' }}>${totalMuscles} ${t('grupos musculares')} \u00B7 ${totalHits} ${t('ejercicios completados')}</div>
      ` : html`
        <div style=${{ fontSize: 11, color: T.muted, marginTop: 12, textAlign: 'center' }}>${t('Completa tus entrenamientos para ver el mapa muscular')}</div>
      `}
    </div>
  `;
}

function StreakCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayOfWeek = (new Date(year, month, 1).getDay() + 6) % 7; // Mon=0
  const monthName = today.toLocaleDateString(LANG === 'en' ? 'en' : 'es', { month: 'long' });
  const dayLabels = ['L', 'M', 'X', 'J', 'V', 'S', 'D'].map(l => t(l));
  const dayKeys = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];

  const cells = useMemo(() => {
    const result = [];
    for (let i = 0; i < firstDayOfWeek; i++) result.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const dateStr = localDate(date);
      const todayStr = localDate(today);
      const dayOfWeek = (date.getDay() + 6) % 7; // Mon=0
      const dk = dayKeys[dayOfWeek];
      const isRest = !!(ROUTINES[dk] && ROUTINES[dk].rest);
      const isFuture = dateStr > todayStr;
      const isToday = dateStr === todayStr;
      let done = false;
      if (!isFuture && !isRest) {
        try {
          const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
          if (saved) {
            const states = JSON.parse(saved);
            done = states.length > 0 && states.every(e => e.sets.every(s => s.done));
          }
        } catch {}
      }
      result.push({ day: d, done, isRest, isFuture, isToday });
    }
    return result;
  }, []);

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <${SectionHeader} title=${monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + year} />
      <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        ${dayLabels.map(l => html`
          <div key=${l} style=${{ textAlign: 'center', fontSize: 9, fontWeight: 700, color: T.muted, paddingBottom: 4 }}>${l}</div>
        `)}
        ${cells.map((c, i) => {
          if (!c) return html`<div key=${'e' + i} />`;
          const bg = c.done ? T.green : c.isToday ? T.accent : c.isRest ? T.input : c.isFuture ? 'transparent' : T.elevated;
          const opacity = c.isFuture ? 0.3 : 1;
          return html`
            <div key=${i} style=${{
              aspectRatio: '1', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: bg, opacity, transition: 'all 0.2s'
            }}>

            </div>
          `;
        })}
      </div>
    </div>
  `;
}

function MetricsCard({ unitPref, onSaved }) {
  const BODY_PARTS = [
    { key: 'cuello', label: 'Cuello', labelEn: 'Neck', placeholder: 38, y: 40, side: 'right' },
    { key: 'pecho', label: 'Pecho', labelEn: 'Chest', placeholder: 95, y: 68, side: 'right' },
    { key: 'brazo', label: 'Brazo', labelEn: 'Arm', placeholder: 32, y: 80, side: 'left' },
    { key: 'cintura', label: 'Cintura', labelEn: 'Waist', placeholder: 85, y: 100, side: 'right' },
    { key: 'cadera', label: 'Cadera', labelEn: 'Hips', placeholder: 95, y: 116, side: 'left' },
    { key: 'muslo', label: 'Muslo', labelEn: 'Thigh', placeholder: 55, y: 148, side: 'right' },
  ];

  const [selectedPart, setSelectedPart] = useState(null);
  const [inputVal, setInputVal] = useState('');
  const [weightVal, setWeightVal] = useState('');
  const [weightUnit, setWeightUnit] = useState(unitPref);
  const [measureUnit, setMeasureUnit] = useState('cm');
  const [showBodyComp, setShowBodyComp] = useState(false);
  const [bodyFatVal, setBodyFatVal] = useState('');
  const [muscleMassVal, setMuscleMassVal] = useState('');
  const [visceralFatVal, setVisceralFatVal] = useState('');
  const [bmrVal, setBmrVal] = useState('');
  const [metAgeVal, setMetAgeVal] = useState('');
  const [lastEntry, setLastEntry] = useState(() => {
    // Seed baseline if not present
    const log = getWeightLog();
    if (!log.some(e => e.date === BASELINE.date)) {
      const entry = { ...BASELINE };
      log.unshift(entry);
      localStorage.setItem('ds_weight_log', JSON.stringify(log));
    }
    return log.length ? log[log.length - 1] : null;
  });
  const [chartPart, setChartPart] = useState(null);

  const cmToIn = (v) => Math.round(v / 2.54 * 10) / 10;
  const inToCm = (v) => Math.round(v * 2.54 * 10) / 10;
  const dispMeasure = (cm) => measureUnit === 'in' ? cmToIn(cm) : cm;

  const handleSave = useCallback(() => {
    const w = parseFloat(weightVal);
    const kg = w && w > 0 ? (weightUnit === 'lbs' ? lbsToKg(w) : w) : null;
    const entry = { date: localDate() };
    if (kg) entry.kg = Math.round(kg * 10) / 10;
    // Collect all body part values from last entry as base
    BODY_PARTS.forEach(bp => { if (lastEntry && lastEntry[bp.key]) entry[bp.key] = lastEntry[bp.key]; });
    // Override the selected part if we have input
    if (selectedPart && inputVal) {
      const v = parseFloat(inputVal);
      if (v > 0) entry[selectedPart] = measureUnit === 'in' ? Math.round(inToCm(v) * 10) / 10 : Math.round(v * 10) / 10;
    }
    // Body composition fields
    if (bodyFatVal) entry.bodyFat = parseFloat(bodyFatVal);
    if (muscleMassVal) {
      const mm = parseFloat(muscleMassVal);
      entry.muscleMass = weightUnit === 'lbs' ? lbsToKg(mm) : mm;
    }
    if (visceralFatVal) entry.visceralFat = parseInt(visceralFatVal);
    if (bmrVal) entry.bmr = parseInt(bmrVal);
    if (metAgeVal) entry.metabolicAge = parseInt(metAgeVal);
    const hasBodyComp = bodyFatVal || muscleMassVal || visceralFatVal || bmrVal || metAgeVal;
    if (!entry.kg && !hasBodyComp && !Object.keys(entry).some(k => BODY_PARTS.map(b => b.key).includes(k) && entry[k])) return;
    if (!entry.kg && lastEntry) entry.kg = lastEntry.kg;
    saveWeightEntry(entry);
    setLastEntry(entry);
    setWeightVal(''); setInputVal(''); setSelectedPart(null);
    setBodyFatVal(''); setMuscleMassVal(''); setVisceralFatVal(''); setBmrVal(''); setMetAgeVal(''); setShowBodyComp(false);
    if (onSaved) onSaved();
  }, [weightVal, inputVal, selectedPart, weightUnit, measureUnit, lastEntry, onSaved, bodyFatVal, muscleMassVal, visceralFatVal, bmrVal, metAgeVal]);

  const log = getWeightLog();
  const chipStyle = (active) => ({
    fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 8, cursor: 'pointer',
    background: active ? T.accent : 'transparent', color: active ? '#fff' : T.muted,
    border: active ? 'none' : '1px solid ' + T.border, transition: 'all 0.2s',
  });

  // Mini chart for a selected body part
  const chartData = useMemo(() => {
    if (!chartPart) return [];
    return log.filter(e => e[chartPart] != null).slice(-8).map(e => ({ date: e.date, value: e[chartPart] }));
  }, [chartPart, log]);

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <${SectionHeader} title=${t("Métricas físicas")} />

      <!-- Body Map -->
      <div className="flex justify-center" style=${{ marginBottom: 16, position: 'relative' }}>
        <div style=${{ position: 'relative', width: 280, height: 220 }}>
          <!-- Anatomical body figure centered -->
          <div style=${{ position: 'absolute', left: '50%', top: 0, transform: 'translateX(-50%)', width: 110, height: 220 }}>
            <img src="body-figure.png" width="110" style=${{ display: 'block', height: 220, objectFit: 'contain', opacity: 0.85 }} />
          </div>
          <!-- Connector lines -->
          <svg width="280" height="220" viewBox="0 0 280 220" fill="none" style=${{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none', zIndex: 1 }}>
            ${BODY_PARTS.map(bp => {
              const cy = bp.y + 10;
              const bodyEdge = bp.side === 'left' ? 92 : 188;
              const pillEdge = bp.side === 'left' ? 75 : 205;
              return html`<line x1=${bodyEdge} y1=${cy} x2=${pillEdge} y2=${cy} stroke=${T.border} strokeWidth="1" strokeDasharray="3 2" />`;
            })}
          </svg>
          <!-- Tappable measurement points on sides -->
          ${BODY_PARTS.map(bp => {
            const hasData = lastEntry && lastEntry[bp.key];
            const isSelected = selectedPart === bp.key;
            const pillStyle = {
              position: 'absolute', top: bp.y,
              display: 'flex', alignItems: 'center', gap: 3,
              padding: '3px 10px', borderRadius: 10,
              background: isSelected ? T.accent : hasData ? T.greenDim : T.elevated,
              border: '1.5px solid ' + (isSelected ? T.accent : hasData ? T.green + '40' : T.border),
              transition: 'all 0.2s', zIndex: 2,
              whiteSpace: 'nowrap',
            };
            if (bp.side === 'left') { pillStyle.right = '50%'; pillStyle.marginRight = 62; }
            else { pillStyle.left = '50%'; pillStyle.marginLeft = 62; }
            return html`
              <button key=${bp.key}
                onClick=${() => { setSelectedPart(bp.key === selectedPart ? null : bp.key); setInputVal(''); setChartPart(null); }}
                className="press-scale" style=${pillStyle}>
                <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 10, fontWeight: 700, color: isSelected ? '#fff' : hasData ? T.green : T.muted }}>
                  ${hasData ? dispMeasure(lastEntry[bp.key]) + (measureUnit === 'in' ? '"' : ' cm') : (LANG === 'en' ? bp.labelEn : bp.label)}
                </span>
              </button>
            `;
          })}
        </div>
      </div>

      <!-- Weight input -->
      <div className="mb-3">
        <div className="flex items-center justify-between mb-1">
          <label style=${{ fontSize: 11, fontWeight: 600, color: T.muted }}>${t('Peso')}</label>
          <div className="flex gap-1">
            <button onClick=${() => setWeightUnit('kg')} style=${chipStyle(weightUnit === 'kg')}>kg</button>
            <button onClick=${() => setWeightUnit('lbs')} style=${chipStyle(weightUnit === 'lbs')}>lbs</button>
          </div>
        </div>
        <input type="number" placeholder=${weightUnit === 'kg' ? '72' : '159'} value=${weightVal}
          onInput=${e => setWeightVal(e.target.value)}
          className="w-full text-sm font-semibold rounded-xl py-2.5 px-3 text-center"
          style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
      </div>

      <!-- Selected body part input -->
      ${selectedPart && html`
        <div className="mb-3 slide-down">
          <div className="flex items-center justify-between mb-1">
            <label style=${{ fontSize: 11, fontWeight: 600, color: T.accent }}>
              ${LANG === 'en' ? BODY_PARTS.find(b => b.key === selectedPart).labelEn : BODY_PARTS.find(b => b.key === selectedPart).label}
            </label>
            <div className="flex gap-1">
              <button onClick=${() => setMeasureUnit('cm')} style=${chipStyle(measureUnit === 'cm')}>cm</button>
              <button onClick=${() => setMeasureUnit('in')} style=${chipStyle(measureUnit === 'in')}>in</button>
            </div>
          </div>
          <input type="number" placeholder=${measureUnit === 'cm' ? String(BODY_PARTS.find(b => b.key === selectedPart).placeholder) : String(cmToIn(BODY_PARTS.find(b => b.key === selectedPart).placeholder))} value=${inputVal}
            onInput=${e => setInputVal(e.target.value)}
            className="w-full text-sm font-semibold rounded-xl py-2.5 px-3 text-center"
            style=${{ background: T.elevated, border: '1px solid ' + T.accent + '30', color: T.text }} />
        </div>
      `}

      <!-- Body Composition toggle -->
      <button onClick=${() => setShowBodyComp(!showBodyComp)} className="w-full press-scale mb-3"
        style=${{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          padding: '10px 0', borderRadius: 12, background: T.accentDim,
          border: '1px solid ' + T.accent + '25' }}>
        <span style=${{ fontSize: 14 }}>${'\uD83D\uDCCA'}</span>
        <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 700, color: T.accent }}>
          ${LANG === 'en' ? 'Update composition' : 'Actualizar composición'}
        </span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke=${T.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style=${{ transition: 'transform 0.2s', transform: showBodyComp ? 'rotate(180deg)' : 'none' }}><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      ${showBodyComp && html`
        <div className="mb-3 slide-down" style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          ${[
            { label: 'Body Fat (%)', val: bodyFatVal, set: setBodyFatVal, ph: '17.3' },
            { label: 'Muscle Mass (' + weightUnit + ')', val: muscleMassVal, set: setMuscleMassVal, ph: weightUnit === 'lbs' ? '126.8' : '57.5' },
            { label: 'Visceral Fat', val: visceralFatVal, set: setVisceralFatVal, ph: '7' },
            { label: 'BMR (kcal)', val: bmrVal, set: setBmrVal, ph: '1665' },
            { label: LANG === 'en' ? 'Metabolic Age' : 'Edad Metabólica', val: metAgeVal, set: setMetAgeVal, ph: '32' },
          ].map((field, fi) => html`
            <div key=${fi} style=${fi === 4 ? { gridColumn: '1 / -1' } : {}}>
              <label style=${{ fontSize: 9, fontWeight: 600, color: T.muted, display: 'block', marginBottom: 2 }}>${field.label}</label>
              <input type="number" placeholder=${field.ph} value=${field.val}
                onInput=${e => field.set(e.target.value)}
                className="w-full text-sm font-semibold rounded-xl py-2 px-3 text-center"
                style=${{ background: T.elevated, border: '1px solid ' + T.accent + '20', color: T.text, fontSize: 13 }} />
            </div>
          `)}
        </div>
      `}

      <button onClick=${handleSave} disabled=${!weightVal && !inputVal && !bodyFatVal && !muscleMassVal && !visceralFatVal && !bmrVal && !metAgeVal}
        className="w-full py-2.5 rounded-xl text-sm font-bold transition-all active:scale-[0.97]"
        style=${{ background: (weightVal || inputVal || bodyFatVal || muscleMassVal || visceralFatVal || bmrVal || metAgeVal) ? T.accent : T.muted, color: '#fff', opacity: (weightVal || inputVal || bodyFatVal || muscleMassVal || visceralFatVal || bmrVal || metAgeVal) ? 1 : 0.4 }}>
        ${t('Guardar medición')}
      </button>

      <!-- Next measurement date -->
      ${(() => {
        const lastDate = lastEntry && lastEntry.date;
        if (!lastDate) return html`<div style=${{ fontSize: 11, color: T.muted, textAlign: 'center', marginTop: 10 }}>
          ${t('Registra tu primera medición')}
        </div>`;
        const next = new Date(lastDate + 'T00:00:00');
        next.setDate(next.getDate() + 14);
        const today = new Date(); today.setHours(0,0,0,0);
        const isReady = next <= today;
        const dateStr = next.toLocaleDateString(LANG === 'en' ? 'en' : 'es', { day: 'numeric', month: 'long' });
        return html`<div style=${{ fontSize: 11, fontWeight: 600, textAlign: 'center', marginTop: 10, color: isReady ? T.green : T.muted }}>
          ${isReady ? (LANG === 'en' ? 'Measurement day! Update your metrics' : 'Día de medición. Actualiza tus métricas') : (LANG === 'en' ? 'Next measurement: ' : 'Próxima medición: ') + dateStr}
        </div>`;
      })()}

      <!-- Measurement history pills -->
      ${log.length > 1 && html`
        <div className="flex flex-wrap gap-1.5 mt-3">
          ${BODY_PARTS.filter(bp => log.some(e => e[bp.key])).map(bp => html`
            <button key=${bp.key} onClick=${() => setChartPart(chartPart === bp.key ? null : bp.key)}
              className="press-scale" style=${{
                fontSize: 10, fontWeight: 700, padding: '4px 10px', borderRadius: 10,
                background: chartPart === bp.key ? T.accent : T.elevated,
                color: chartPart === bp.key ? '#fff' : T.sub,
                border: '1px solid ' + (chartPart === bp.key ? T.accent : T.border),
              }}>
              ${LANG === 'en' ? bp.labelEn : bp.label}
            </button>
          `)}
        </div>
      `}

      <!-- Evolution mini chart -->
      ${chartPart && chartData.length >= 2 && html`
        <div className="mt-3 slide-down rounded-xl overflow-hidden" style=${{ border: '1px solid ' + T.border }}>
          <div className="flex items-center gap-1.5 px-3 py-2" style=${{ background: T.elevated }}>
            <span style=${{ fontSize: 11, fontWeight: 700, color: T.muted }}>${LANG === 'en' ? BODY_PARTS.find(b => b.key === chartPart).labelEn : BODY_PARTS.find(b => b.key === chartPart).label}</span>
            <span className="ml-auto" style=${{ fontSize: 10, color: T.muted }}>${chartData.length} ${t('mediciones')}</span>
          </div>
          <div className="flex items-end gap-1 px-3 py-3" style=${{ height: 72 }}>
            ${(() => {
              const maxV = Math.max(...chartData.map(d => d.value));
              const minV = Math.min(...chartData.map(d => d.value));
              const range = maxV - minV || 1;
              return chartData.map((d, di) => {
                const pct2 = 20 + ((d.value - minV) / range) * 80;
                const isLast = di === chartData.length - 1;
                return html`
                  <div key=${di} className="flex-1 flex flex-col items-center gap-1" style=${{ height: '100%', justifyContent: 'flex-end' }}>
                    <span style=${{ fontSize: 8, fontWeight: 700, color: isLast ? T.accent : T.muted }}>${dispMeasure(d.value)}</span>
                    <div style=${{ width: '100%', maxWidth: 28, height: pct2 + '%', minHeight: 4, borderRadius: 4, background: isLast ? T.accent : T.elevated }} />
                    <span style=${{ fontSize: 7, color: T.muted }}>${new Date(d.date + 'T12:00:00').toLocaleDateString(LANG === 'en' ? 'en' : 'es', { day: 'numeric', month: 'short' }).replace(' ', '')}</span>
                  </div>
                `;
              });
            })()}
          </div>
          ${(() => {
            const first = chartData[0].value;
            const last = chartData[chartData.length - 1].value;
            const diff = Math.round((last - first) * 10) / 10;
            const diffDisp = dispMeasure(Math.abs(diff));
            return html`
              <div className="px-3 pb-2 text-center">
                <span style=${{ fontSize: 11, fontWeight: 700, color: diff < 0 ? T.green : diff > 0 ? T.amber : T.muted }}>
                  ${diff < 0 ? '\u2193 -' + diffDisp : diff > 0 ? '\u2191 +' + diffDisp : '\u2194 0'} ${measureUnit}
                </span>
              </div>
            `;
          })()}
        </div>
      `}
    </div>
  `;
}

function WeeklyShareCard() {
  const data = useMemo(() => {
    const days = [];
    const today = new Date();
    const dow = today.getDay() || 7; // 1=Mon, 7=Sun
    for (let i = dow - 1; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000);
      const ds = localDate(d);
      const dk = DAYS[d.getDay()];
      let workouts = 0, prot = 0, cal = 0, water = 0;
      try {
        const ws = localStorage.getItem('ds_workout_' + dk + '_' + ds);
        if (ws) workouts = JSON.parse(ws).filter(e => e.sets.every(s => s.done)).length;
      } catch {}
      try {
        const m = JSON.parse(localStorage.getItem('ds_meals_' + ds) || '[]');
        const conf = m.filter(x => x.confirmed);
        prot = conf.reduce((s, x) => s + x.items.reduce((a, item) => a + (item.protein || 0), 0), 0);
        cal = conf.reduce((s, x) => s + x.items.reduce((a, item) => a + (item.cal || 0), 0), 0);
      } catch {}
      try { water = Number(localStorage.getItem('ds_water_' + ds)) || 0; } catch {}
      days.push({ date: ds, dk, workouts, prot, cal, water });
    }
    return {
      days,
      totalWorkouts: days.reduce((s, d) => s + (d.workouts > 0 ? 1 : 0), 0),
      avgProtein: Math.round(days.reduce((s, d) => s + d.prot, 0) / (days.length || 1)),
      avgCalories: Math.round(days.reduce((s, d) => s + d.cal, 0) / (days.length || 1)),
      totalWater: Math.round(days.reduce((s, d) => s + d.water, 0) / 1000 * 10) / 10,
    };
  }, []);

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20, position: 'relative', overflow: 'hidden' }}>
      <div className="flex items-center justify-between" style=${{ marginBottom: 14 }}>
        <${SectionHeader} title=${t("Resumen semanal")} />

            '\uD83D\uDCCA ' + t('Mi semana en DontSkip'),

            '\uD83E\uDD69 ' + data.avgProtein + 'g ' + t('proteína promedio'),
            '\uD83D\uDD25 ' + data.avgCalories + ' ' + t('kcal promedio'),
            '\uD83D\uDCA7 ' + data.totalWater + 'L ' + t('de agua total'),
            '', '#DontSkip #Fitness'
          ].join('\n');
          if (navigator.share) navigator.share({ text: lines }).catch(() => {});
          else navigator.clipboard.writeText(lines).then(() => alert(t('Copiado')));
        }} className="press-scale" style=${{ padding: '4px 10px', borderRadius: 8, background: T.accentDim }}>
          <${ShareFat} size=${14} weight="bold" color=${T.accent} />
        </button>
      </div>
      <div className="flex gap-1.5 mb-4">
        ${data.days.map((d, i) => {
          const isToday = i === data.days.length - 1;
          const trained = d.workouts > 0;
          return html`
            <div key=${i} className="flex-1 text-center">
              <div style=${{ fontSize: 9, fontWeight: 600, color: isToday ? T.accent : T.muted, marginBottom: 4 }}>
                ${dayLabel(d.dk) ? dayLabel(d.dk).slice(0, 2) : ''}
              </div>
              <div style=${{ height: 4, borderRadius: 2, background: trained ? T.green : T.input }} />
            </div>
          `;
        })}
      </div>
      <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        <div className="text-center py-3 rounded-xl" style=${{ background: T.accentDim }}>
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 22, fontWeight: 900, color: T.accent }}>${data.totalWorkouts}</div>
          <div style=${{ fontSize: 10, fontWeight: 600, color: T.muted }}>${t('Entrenamientos')}</div>
        </div>
        <div className="text-center py-3 rounded-xl" style=${{ background: T.copperDim }}>

          <div style=${{ fontSize: 10, fontWeight: 600, color: T.muted }}>${t('Proteína prom.')}</div>
        </div>
        <div className="text-center py-3 rounded-xl" style=${{ background: T.amberDim }}>

function ProgressPhotos() {
  const [photos, setPhotos] = useState(() => {
    try { const s = localStorage.getItem('ds_progress_photos'); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [comparing, setComparing] = useState(false);

  function handleCapture(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize to max 400px to save localStorage space
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxSz = 400;
        const scale = Math.min(maxSz / img.width, maxSz / img.height, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        const entry = { date: localDate(), src: dataUrl };
        setPhotos(prev => {
          const next = [entry, ...prev].slice(0, 12); // Max 12 photos
          try { localStorage.setItem('ds_progress_photos', JSON.stringify(next)); } catch {}
          return next;
        });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  return html`
    <div className="ds-card fade-up mx-5 mb-4" style=${{ padding: 20 }}>
      <div className="flex items-center justify-between mb-3">
        <${SectionHeader} title=${"📸 " + t('Fotos de progreso')} />
        <label className="press-scale flex items-center gap-1.5 px-3 py-1.5 rounded-lg cursor-pointer"
          style=${{ background: T.accentDim, color: T.accent, fontSize: 11, fontWeight: 700 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          ${t('Capturar')}
          <input type="file" accept="image/*" capture="user" onChange=${handleCapture} className="hidden" />
        </label>
      </div>
      ${photos.length === 0 ? html`
        <div className="text-center py-6" style=${{ color: T.muted, fontSize: 12 }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke=${T.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style=${{ display: 'inline-block', marginBottom: 8, opacity: 0.5 }}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <div>${t('Toma fotos para ver tu transformación')}</div>
        </div>
      ` : html`
        ${photos.length >= 2 && html`
          <button onClick=${() => setComparing(!comparing)}
            className="w-full mb-3 py-2 rounded-lg press-scale text-center"

function BodyCompCards() {
  const log = getWeightLog();
  const latest = [...log].reverse().find(e => e.bodyFat != null || e.muscleMass != null || e.visceralFat != null || e.metabolicAge != null) || {};
  const hasNew = latest.date && latest.date !== BASELINE.date;

  const kgToLbs = (v) => Math.round(v * 2.20462 * 10) / 10;
  const USER_AGE = 34;

  // Helper: get badge
  function bfBadge(v) {
    if (v < 10) return { label: t('Excelente'), color: '#1a9e5c' };
    if (v <= 15) return { label: t('Bien'), color: '#3b6fd4' };
    if (v <= 20) return { label: t('Promedio'), color: '#e8793a' };
    return { label: t('Alto'), color: '#e05252' };
  }
  function mmBadge(lbs) {
    if (lbs >= 140) return { label: t('Excelente'), color: '#1a9e5c' };
    if (lbs >= 130) return { label: t('Bien'), color: '#3b6fd4' };
    return { label: t('Promedio'), color: '#e8793a' };
  }
  function vfBadge(v) {
    if (v <= 9) return { label: t('Saludable'), color: '#1a9e5c' };
    return { label: t('Alto'), color: '#e05252' };
  }
  function maBadge(v) {
    if (v < USER_AGE) return { label: t('Excelente'), color: '#1a9e5c' };
    if (v <= USER_AGE) return { label: t('Bien'), color: '#3b6fd4' };
    return { label: t('Alto'), color: '#e8793a' };
  }

  // Current values
  const bfVal = hasNew && latest.bodyFat != null ? latest.bodyFat : BASELINE.bodyFat;
  const mmValKg = hasNew && latest.muscleMass != null ? latest.muscleMass : BASELINE.muscleMass;
  const mmValLbs = kgToLbs(mmValKg);
  const vfVal = hasNew && latest.visceralFat != null ? latest.visceralFat : BASELINE.visceralFat;
  const maVal = hasNew && latest.metabolicAge != null ? latest.metabolicAge : BASELINE.metabolicAge;

  // Deltas
  const bfDelta = hasNew && latest.bodyFat != null ? Math.round((latest.bodyFat - BASELINE.bodyFat) * 10) / 10 : null;
  const mmDelta = hasNew && latest.muscleMass != null ? Math.round((kgToLbs(latest.muscleMass) - kgToLbs(BASELINE.muscleMass)) * 10) / 10 : null;
  const vfDelta = hasNew && latest.visceralFat != null ? latest.visceralFat - BASELINE.visceralFat : null;
  const maDelta = hasNew && latest.metabolicAge != null ? latest.metabolicAge - BASELINE.metabolicAge : null;
  const weightDelta = hasNew && latest.kg ? Math.round((latest.kg - BASELINE.kg) * 10) / 10 : null;
