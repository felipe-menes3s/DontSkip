<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { background: var(--ds-bg, #f4f6f9); }
body { font-family: 'Outfit', system-ui, sans-serif; color: #0e1a2b; margin: 0; padding: 0; overscroll-behavior: none; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; font-variant-numeric: tabular-nums; }
/* Count-up animation for stats */
@keyframes countPulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
.count-up { animation: countPulse 0.1s ease-out; }
:root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }

/* Ring animation */
.ring-circle { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
.dual-ring-arc { transition: stroke-dashoffset 800ms ease-out; }

/* Fade in */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease-out both; }

/* Tab enter */
@keyframes tabEnter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.tab-enter { animation: tabEnter 0.2s ease-out; }

/* Stagger children */
.stagger > * { animation: fadeUp 0.35s ease-out both; }
.stagger > *:nth-child(1) { animation-delay: 0s; }
.stagger > *:nth-child(2) { animation-delay: 0.06s; }
.stagger > *:nth-child(3) { animation-delay: 0.12s; }
.stagger > *:nth-child(4) { animation-delay: 0.18s; }
.stagger > *:nth-child(5) { animation-delay: 0.24s; }
.stagger > *:nth-child(6) { animation-delay: 0.30s; }
.stagger > *:nth-child(7) { animation-delay: 0.36s; }

/* Celebration */
@keyframes celebrate { 0% { transform: scale(1); } 30% { transform: scale(1.2); } 60% { transform: scale(0.95); } 100% { transform: scale(1); } }
@keyframes glowPulse { 0% { box-shadow: 0 0 0 0 var(--ds-green-glow, rgba(22,163,74,0.4)); } 70% { box-shadow: 0 0 0 10px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
.celebrate { animation: celebrate 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
.glow-pulse { animation: glowPulse 0.6s ease-out; }

/* Celebration modal */
@keyframes celebrateIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
.celebrate-modal { animation: celebrateIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Confetti particles */
@keyframes confettiFall { 0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(300px) rotate(720deg) scale(0.3); } }
.confetti-particle { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 2.5s ease-out forwards; pointer-events: none; }

/* Pop in — bouncy scale entrance */
@keyframes popIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
.pop-in { animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

/* Slide down expand */
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.slide-down { animation: slideDown 0.3s ease-out both; }

/* Check draw — SVG stroke animation */
@keyframes checkDraw { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
.check-draw polyline, .check-draw path { stroke-dasharray: 24; animation: checkDraw 0.4s ease-out 0.15s both; }

/* Slide in from right */
@keyframes slideInRight { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
.slide-in-right { animation: slideInRight 0.3s ease-out both; }

/* Scale press — universal touch feedback */
.press-scale { transition: transform 0.12s ease; }
.press-scale:active { transform: scale(0.96) !important; }

/* Number bounce — value change emphasis */
@keyframes bounceNum { 0% { transform: scale(1); } 30% { transform: scale(1.12); } 60% { transform: scale(0.97); } 100% { transform: scale(1); } }
.bounce-num { animation: bounceNum 0.35s ease-out; }

/* Green flash — confirm feedback */
@keyframes greenFlash { 0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.4); } 50% { box-shadow: 0 0 0 6px rgba(22,163,74,0.15); } 100% { box-shadow: 0 0 0 0 transparent; } }
.green-flash { animation: greenFlash 0.6s ease-out; }

/* Live workout */
@keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; animation: livePulse 1.5s ease-in-out infinite; }
@keyframes timerGlow { 0%,100% { text-shadow: 0 0 0 transparent; } 50% { text-shadow: 0 0 20px rgba(107,158,214,0.3); } }
.timer-glow { animation: timerGlow 3s ease-in-out infinite; }

/* Smooth height collapse/expand */
.smooth-expand { overflow: hidden; transition: max-height 0.35s ease-out, opacity 0.25s ease-out; }

/* Extended stagger for longer lists */
.stagger > *:nth-child(8) { animation-delay: 0.42s; }
.stagger > *:nth-child(9) { animation-delay: 0.48s; }
.stagger > *:nth-child(10) { animation-delay: 0.54s; }

/* Pulse */
@keyframes pulse-subtle { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.gif-placeholder { animation: pulse-subtle 2s ease-in-out infinite; }

/* Safe area top bar — real DOM element injected below */

/* Tab bar */
.tab-bar { padding-bottom: calc(8px + var(--safe-bottom)); }


/* Splash screen */
@keyframes splashFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
@keyframes splashLogo { 0% { opacity: 0; transform: scale(0.85); } 30% { opacity: 1; transform: scale(1.02); } 50% { transform: scale(1); } }
@keyframes splashText { 0%,40% { opacity: 0; transform: translateY(8px); } 70% { opacity: 1; transform: translateY(0); } }
.splash-screen { animation: splashFade 1.6s ease-out forwards; pointer-events: none; }
.splash-logo { animation: splashLogo 0.8s cubic-bezier(0.34,1.56,0.64,1) both; }
.splash-text { animation: splashText 1s ease-out both; }

/* Scrollbar */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Card */
.ds-card { background: var(--ds-card-bg, #ffffff); border-radius: 20px; border: 1px solid var(--ds-card-border, rgba(0,0,0,0.06)); box-shadow: var(--ds-card-shadow, 0 1px 3px rgba(0,0,0,0.04)); transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }

/* Checkbox — green confirmation */
.ds-check { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; border: 2px solid var(--ds-check-border, #cbd5e1); border-radius: 6px; cursor: pointer; position: relative; flex-shrink: 0; transition: all 0.2s; }
.ds-check:checked { background: var(--ds-green, #16a34a); border-color: var(--ds-green, #16a34a); }
.ds-check:checked::after { content: ''; position: absolute; top: 3px; left: 6px; width: 5px; height: 10px; border: solid var(--ds-check-bg, #ffffff); border-width: 0 2px 2px 0; transform: rotate(45deg); }

/* Buttons */
.meal-btn { transition: all 0.2s; }
.meal-btn:active { transform: scale(0.96); }
.unit-toggle { transition: all 0.2s; }

/* Input focus glow */
input:focus { border-color: var(--ds-input-border, rgba(39,68,114,0.4)) !important; box-shadow: 0 0 0 3px var(--ds-input-focus, rgba(39,68,114,0.08)); outline: none; }

/* Spacer */
.bottom-spacer { height: calc(90px + var(--safe-bottom)); }

/* Number input arrows */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* Jarvis typing dots */
@keyframes typingDot { 0%,60%,100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
.typing-dot { animation: typingDot 1.4s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Jarvis message fade-in */
@keyframes msgFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-enter { animation: msgFadeIn 0.25s ease-out both; }

/* Skeleton loader for GIFs (#13) */
@keyframes skeletonShimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
.skeleton-gif { background: linear-gradient(90deg, var(--ds-card-bg, #f0f2f5) 25%, var(--ds-elevated, #e2e5ea) 50%, var(--ds-card-bg, #f0f2f5) 75%); background-size: 400px 100%; animation: skeletonShimmer 1.5s ease-in-out infinite; border-radius: 12px; }

/* Glassmorphism (#7) */
.glass { backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }

/* RPE indicator colors */
.rpe-easy { color: #22c55e; }
.rpe-moderate { color: #eab308; }
.rpe-hard { color: #f97316; }
.rpe-max { color: #ef4444; }

/* Badge unlock animation */
@keyframes badgeUnlock { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 60% { transform: scale(1.15) rotate(3deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
.badge-unlock { animation: badgeUnlock 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }

window.onerror = function(msg, url, line, col, err) {
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<pre style="padding:20px;color:red;font-size:14px;white-space:pre-wrap;">ERROR: ' + msg + '\nLine: ' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</pre>';
};

const html = htm.bind(React.createElement);

// ErrorBoundary to catch React render errors with useful details
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('ErrorBoundary caught:', error, info); }
  render() {
    if (this.state.error) {
      return html`<div style=${{ padding: 20, color: 'red', whiteSpace: 'pre-wrap', fontSize: 13 }}>
        <b>Error:</b> ${this.state.error.message}${'\n'}${this.state.error.stack || ''}
      </div>`;
    }
    return this.props.children;
  }
}

  },
};

function getInitialTheme() {
  try { return localStorage.getItem('ds_theme') || 'light'; } catch { return 'light'; }
}

let T = THEMES[getInitialTheme()];

function applyThemeCSS(mode) {
  const t = THEMES[mode];
  document.body.style.background = t.bg;
  document.body.style.color = t.text;
  document.querySelector('meta[name="theme-color"]').content = t.bg;
  document.documentElement.style.setProperty('--ds-card-bg', t.card);
  document.documentElement.style.setProperty('--ds-card-border', t.cardBorder);
  document.documentElement.style.setProperty('--ds-check-bg', t.checkBg);
  document.documentElement.style.setProperty('--ds-check-border', t.checkBorder);
  document.documentElement.style.setProperty('--ds-green', t.green);
  document.documentElement.style.setProperty('--ds-input-focus', t.accentGlow);
  document.documentElement.style.setProperty('--ds-input-border', t.accent);
  document.documentElement.style.setProperty('--ds-card-shadow', mode === 'light' ? '0 1px 3px rgba(0,0,0,0.04)' : '0 1px 4px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04)');
  document.documentElement.style.setProperty('--ds-bg', t.bg);
}

applyThemeCSS(getInitialTheme());

// Force safe area measurement — env() inside CSS variables can return 0 on some iOS versions
(function() {
  if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
    var test = document.createElement('div');
    test.style.cssText = 'position:fixed;top:0;left:0;width:1px;padding-top:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none';
    document.body.appendChild(test);
    var h = test.offsetHeight;
    document.body.removeChild(test);
    // If env() returned 0, use minimal fallback
    var val = h > 0 ? h + 'px' : '20px';
    document.documentElement.style.setProperty('--safe-top', val);
  } else {
    // Non-standalone: ensure --safe-top is 0
    document.documentElement.style.setProperty('--safe-top', '0px');
  }
})();

function setGoal(key, val) { try { localStorage.setItem('ds_goal_' + key, String(val)); } catch {} }

// ── useCountUp hook — numbers animate from 0 to target ──
function useCountUp(target, duration = 600) {
  const [val, setVal] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    if (target === prev.current) { setVal(target); return; }
    const start = prev.current;
    const diff = target - start;
    const startTime = performance.now();
    let raf;
    function tick(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
      setVal(Math.round(start + diff * ease));
      if (t < 1) raf = requestAnimationFrame(tick);
      else prev.current = target;
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return val;
}

function getMuscleIntensityForDay(dayKey) {
  const intensity = {};
  const routine = ROUTINES[dayKey];
  if (!routine || routine.rest) return intensity;
  routine.exercises.forEach(ex => {
    const map = EXERCISE_MUSCLE_MAP[ex.id];
    if (!map) return;
    (map.primary   || []).forEach(s => intensity[s] = Math.max(intensity[s] || 0, 3));
    (map.secondary || []).forEach(s => intensity[s] = Math.max(intensity[s] || 0, 2));
    (map.tertiary  || []).forEach(s => intensity[s] = Math.max(intensity[s] || 0, 1));
  });
  return intensity;
}

// viewDayIdx: 0=Mon..6=Sun. If null, uses today.
function getAccumulatedMuscleIntensity(viewDayIdx) {
  const result = {};
  const weekDayKeys = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const useSchedule = viewDayIdx != null;
  for (let daysAgo = 0; daysAgo < 3; daysAgo++) {
    let dayKey;
    if (useSchedule) {
      let idx = viewDayIdx - daysAgo;
      if (idx < 0) idx += 7;
      dayKey = weekDayKeys[idx];
    } else {
      const d = new Date(); d.setDate(d.getDate() - daysAgo);
      dayKey = DAYS[d.getDay()];
    }
    const routine = ROUTINES[dayKey];
    if (!routine || routine.rest) continue;
    let trained = true;
    if (!useSchedule) {
      const d = new Date(); d.setDate(d.getDate() - daysAgo);
      const dateStr = localDate(d);
      const saved = localStorage.getItem('ds_workout_' + dayKey + '_' + dateStr);
      trained = false;
      if (saved) {
        try { const states = JSON.parse(saved); trained = states.some(e => e.sets && e.sets.some(s => s.done)); } catch(e) {}
      } else if (daysAgo === 0) { trained = true; }
    }
    if (!trained) continue;
    const dayIntensity = getMuscleIntensityForDay(dayKey);
    for (const [slug, level] of Object.entries(dayIntensity)) {
      const decayed = Math.max(0, level - daysAgo);
      if (decayed > 0) result[slug] = Math.max(result[slug] || 0, decayed);
    }
  }
  return result;
}

// Find how many days ago the last real workout happened (max 14)
function getDaysSinceLastWorkout() {
  for (let daysAgo = 0; daysAgo < 14; daysAgo++) {
    const d = new Date(); d.setDate(d.getDate() - daysAgo);
    const dateStr = localDate(d);
    const dayKey = DAYS[d.getDay()];
    const routine = ROUTINES[dayKey];
    if (!routine || routine.rest) continue;
    const saved = localStorage.getItem('ds_workout_' + dayKey + '_' + dateStr);
    if (saved) {
      try { const states = JSON.parse(saved); if (states.some(e => e.sets && e.sets.some(s => s.done))) return daysAgo; } catch(e) {}
    }
  }
  return -1; // no workout found
}

// Find last day a specific muscle slug was worked (returns dayKey or null)
function getLastDayForMuscle(slug) {
  const weekDayKeys = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  for (let daysAgo = 0; daysAgo < 7; daysAgo++) {
    const d = new Date(); d.setDate(d.getDate() - daysAgo);
    const dayKey = DAYS[d.getDay()];
    const routine = ROUTINES[dayKey];
    if (!routine || routine.rest) continue;
    const dateStr = localDate(d);
    const saved = localStorage.getItem('ds_workout_' + dayKey + '_' + dateStr);
    let trained = false;
    if (saved) { try { trained = JSON.parse(saved).some(e => e.sets && e.sets.some(s => s.done)); } catch(e) {} }
    if (!trained) continue;
    const di = getMuscleIntensityForDay(dayKey);
    if (di[slug]) return { dayKey, daysAgo };
  }
  return null;
}

// Weekly volume + frequency per muscle group (from real localStorage data)
function getWeeklyMuscleStats() {
  const today = new Date();
  const jsDay = today.getDay();
  const mondayOffset = jsDay === 0 ? 6 : jsDay - 1;
  const volume = {};
  const frequency = {};
  for (let d = 0; d <= mondayOffset; d++) {
    const date = new Date(today.getTime() - d * 86400000);
    const dateStr = localDate(date);
    const dk = DAYS[date.getDay()];
    const r = ROUTINES[dk];
    if (!r || r.rest || r.cardio || !r.exercises) continue;
    try {
      const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
      if (!saved) continue;
      const states = JSON.parse(saved);
      const dayMuscles = new Set();
      r.exercises.forEach((ex, i) => {
        if (!states[i]) return;
        const map = EXERCISE_MUSCLE_MAP[ex.id];
        if (!map) return;
        const doneSets = (states[i].sets || []).filter(s => s.done).length;
        if (doneSets === 0) return;
        (map.primary || []).forEach(slug => { volume[slug] = (volume[slug] || 0) + doneSets; dayMuscles.add(slug); });
        (map.secondary || []).forEach(slug => { volume[slug] = (volume[slug] || 0) + doneSets * 0.5; dayMuscles.add(slug); });
      });
      dayMuscles.forEach(slug => { frequency[slug] = (frequency[slug] || 0) + 1; });
    } catch(e) {}
  }
  return { volume, frequency };
}

function getWeeklySunburstData() {
  const today = new Date();
  const jsDay = today.getDay();
  const mondayOffset = jsDay === 0 ? 6 : jsDay - 1;
  const monday = new Date(today.getTime() - mondayOffset * 86400000);
  const scores = {};
  const daysHit = {};
  for (let d = 0; d <= mondayOffset; d++) {
    const date = new Date(monday.getTime() + d * 86400000);
    const dateStr = localDate(date);
    const dk = DAYS[date.getDay()];
    const r = ROUTINES[dk];
    if (!r || r.rest || r.cardio || !r.exercises) continue;
    try {
      const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
      if (!saved) continue;
      const states = JSON.parse(saved);
      r.exercises.forEach((ex, i) => {
        if (!states[i]) return;
        const map = EXERCISE_MUSCLE_MAP[ex.id];
        if (!map) return;
        const doneSets = (states[i].sets || []).filter(s => s.done).length;
        if (doneSets === 0) return;
        const add = (slug, weight) => {
          scores[slug] = (scores[slug] || 0) + doneSets * weight;
          if (!daysHit[slug]) daysHit[slug] = new Set();
          daysHit[slug].add(dateStr);
        };
        (map.primary || []).forEach(s => add(s, 3));
        (map.secondary || []).forEach(s => add(s, 2));
        (map.tertiary || []).forEach(s => add(s, 1));
      });
    } catch(e) {}
  }
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const fmt = d => localDate(d).slice(5);
  const weekRange = fmt(monday) + ' \u2014 ' + fmt(sunday);
  return { scores, daysHit, total, weekRange };
}

// DEV OVERRIDE: force a specific day for testing (comment out to use real day)
const DEV_DAY_OVERRIDE = null; // 'monday','tuesday','wednesday','thursday','friday','saturday','sunday' or null
function getTodayKey() { return DEV_DAY_OVERRIDE || DAYS[new Date().getDay()]; }

// Local date string (YYYY-MM-DD) — avoids UTC timezone bug
function localDate(d) {
  const dt = d || new Date();
  return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
}

function kgToLbs(kg) { return Math.round(kg * 2.20462 * 10) / 10; }
function lbsToKg(lbs) { return Math.round(lbs / 2.20462 * 10) / 10; }

function formatWeight(val, unit) {
  if (!val) return '';
  return unit === 'lbs' ? val + ' lbs' : val + ' kg';
}

function sumMealsProp(meals, prop) {
  let total = 0;
  meals.forEach(m => { if (m.confirmed) m.items.forEach(i => { total += (i[prop] || 0); }); });
  return total;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Buenos días';
  if (h < 18) return 'Buenas tardes';
  return 'Buenas noches';
}
// Note: getGreeting returns Spanish keys; wrap with t() at call sites

function getStreak() {
  // Calculate streak from actual workout data in localStorage
  try {
    const dayKeys = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    let streak = 0;
    const now = new Date();
    for (let d = 0; d < 60; d++) {
      const date = new Date(now.getTime() - d * 86400000);
      const dateStr = localDate(date);
      const dk = dayKeys[date.getDay()];
      const r = ROUTINES[dk];
      // Rest days (non-cardio) — skip, never break streak
      if (r.rest && !r.cardio) continue;
      // Cardio days — count if done, skip if not (never breaks streak)
      if (r.cardio) {
        try { if (localStorage.getItem('ds_cardio_done_' + dateStr) === 'true') streak++; } catch {}
        continue;
      }
      // Check if there's actual workout data with at least one completed set
      const saved = localStorage.getItem('ds_workout_' + dk + '_' + dateStr);
      if (!saved) { if (d === 0) continue; break; } // today not done yet is ok
      try {
        const states = JSON.parse(saved);
        const hasDone = states.some(ex => ex.sets && ex.sets.some(s => s.done));
        if (hasDone) { streak++; }
        else { if (d === 0) continue; break; }
      } catch { if (d === 0) continue; break; }
    }
    return streak;
  } catch { return 0; }
}

function updateStreak() {
  const count = getStreak();
  localStorage.setItem('ds_streak', JSON.stringify({ date: localDate(), count }));
  return count;
}

function getWeekDays() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  // Find Monday of this week
  const dow = today.getDay(); // 0=Sun, 1=Mon...
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const initials = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
  const dayOrder = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
  return dayOrder.map((dayKey, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    d.setHours(0, 0, 0, 0);
    const isToday = d.getTime() === today.getTime();
    return {
      date: d, dayKey, dayNum: d.getDate(), initial: initials[i],
      isToday, isPast: d < today && !isToday, isFuture: d > today,
      routine: ROUTINES[dayKey],
    };
  });
}

function getStats() {
  try {
    let stats = JSON.parse(localStorage.getItem('ds_stats') || 'null');
    if (!stats) {
      stats = { startDate: localDate() };
      localStorage.setItem('ds_stats', JSON.stringify(stats));
    }
    return stats;
  } catch { return { startDate: localDate() }; }
}

function getPlanWeek() {
  const stats = getStats();
  const start = new Date(stats.startDate + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.floor((today - start) / (7 * 86400000));
  return Math.max(diff + 1, 1);
}

function getWeightLog() {
  try { return JSON.parse(localStorage.getItem('ds_weight_log') || '[]'); } catch { return []; }
}

function saveWeightEntry(entry) {
  const log = getWeightLog();
  log.push(entry);
  localStorage.setItem('ds_weight_log', JSON.stringify(log));
}

// 1RM estimator (Epley formula)
function estimate1RM(weight, reps) {
  if (!weight || weight <= 0 || !reps || reps <= 0) return 0;
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30));
}

// Estimated calories burned (MET-based)
// Weight training MET: 3.5 (light) to 6.0 (vigorous), using 5.0 as moderate default
function calcCaloriesBurned(durationSec, bodyWeightKg) {
  const MET = 5.0;
  const hours = durationSec / 3600;
  const weight = bodyWeightKg || 72; // default 72kg
  return Math.round(MET * weight * hours);
}

function getUserWeightKg() {
  const log = getWeightLog();
  if (log.length > 0) return log[log.length - 1].kg;
  return 72; // default
}

function getRecords() {
  try { return JSON.parse(localStorage.getItem('ds_records') || '{}'); } catch { return {}; }
}

function saveRecord(exerciseId, weight, reps, date, unit) {
  if (!weight || weight <= 0) return;
  const records = getRecords();
  const weightInLbs = unit === 'kg' ? weight * 2.20462 : weight;
  const existing = records[exerciseId];
  if (existing) {
    const existingLbs = existing.unit === 'kg' ? existing.weight * 2.20462 : existing.weight;
    if (weightInLbs <= existingLbs) return;
  }
  records[exerciseId] = { weight, reps, date, unit };
  localStorage.setItem('ds_records', JSON.stringify(records));
}

function getFullStats() {
  try {
    const stats = JSON.parse(localStorage.getItem('ds_stats') || '{}');
    return { startDate: stats.startDate || localDate(), totalDays: stats.totalDays || 0, maxStreak: stats.maxStreak || 0 };
  } catch { return { startDate: localDate(), totalDays: 0, maxStreak: 0 }; }
}

function updateStatsOnComplete() {
  try {
    const stats = JSON.parse(localStorage.getItem('ds_stats') || '{}');
    if (!stats.startDate) stats.startDate = localDate();
    const today = localDate();
    if (stats.lastTrainDate === today) return;
    stats.lastTrainDate = today;
    stats.totalDays = (stats.totalDays || 0) + 1;
    const streak = updateStreak();
    if (streak > (stats.maxStreak || 0)) stats.maxStreak = streak;
    localStorage.setItem('ds_stats', JSON.stringify(stats));
  } catch {}
}


// ── Jarvis Engine ────────────────────────────────────────────────────

function buildDayContext(routine, exerciseStates, meals, waterMl) {
  const todayKey = getTodayKey();
  const ctxDayLabel = dayLabel(todayKey);
  const proteinNow = sumMealsProp(meals, 'protein');
  const caloriesNow = sumMealsProp(meals, 'cal');
  const waterGlasses = Math.floor(waterMl / WATER_GLASS_ML);
  const waterGoalGlasses = Math.floor(WATER_GOAL_ML / WATER_GLASS_ML);
  let exercisesDone = 0, exercisesTotal = 0;
  if (!routine.rest && exerciseStates.length) {
    exercisesTotal = routine.exercises.length;
    exerciseStates.forEach(es => {
      if (es.sets.every(s => s.done)) exercisesDone++;
    });
  }
  return {
    todayKey, dayLabel: ctxDayLabel, routineName: routine.name, routineFocus: routine.focus,
    isRest: !!routine.rest, proteinNow, caloriesNow, waterMl, waterGlasses, waterGoalGlasses,
    exercisesDone, exercisesTotal,
  };
}

function normalize(text) {
  return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function findFood(text) {
  const n = normalize(text);
  const keys = Object.keys(FOOD_LIBRARY);
  // Exact match first
  for (const k of keys) { if (n.includes(normalize(k))) return FOOD_LIBRARY[k]; }
  // Plural/singular variants
  for (const k of keys) {
    if (n.includes(normalize(k) + 's') || n.includes(normalize(k) + 'es')) return FOOD_LIBRARY[k];
    if (k.endsWith('s') && n.includes(normalize(k.slice(0, -1)))) return FOOD_LIBRARY[k];
  }
  return null;
}

function findExercise(text) {
  const n = normalize(text);
  const allExercises = [];
  Object.values(ROUTINES).forEach(r => {
    if (r.exercises) r.exercises.forEach(ex => allExercises.push(ex));
  });
  // Match by Spanish or English name
  for (const ex of allExercises) {
    if (n.includes(normalize(ex.name)) || n.includes(normalize(ex.nameEn))) return ex;
  }
  // Partial match
  for (const ex of allExercises) {
    const words = normalize(ex.name).split(' ');
    if (words.some(w => w.length > 3 && n.includes(w))) return ex;
    const wordsEn = normalize(ex.nameEn).split(' ');
    if (wordsEn.some(w => w.length > 3 && n.includes(w))) return ex;
  }
  return null;
}

function getTomorrowRoutine() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const key = DAYS[d.getDay()];
  return { key, ...ROUTINES[key] };
}

function detectIntent(text) {
  const n = normalize(text);
  // 1RM query
  const rmWords = ['1rm', 'one rep', 'rep max', 'mi maximo', 'mi max', 'cuanto levanto', 'my max', 'how much can i lift', 'maximos'];
  if (rmWords.some(w => n.includes(w))) return '1rm';
  // Streak query
  const streakWords = ['racha', 'streak', 'consistencia', 'consistency', 'cuantos dias', 'how many days'];
  if (streakWords.some(w => n.includes(w))) return 'streak';
  // Food check
  if (findFood(text)) return 'food';
  // Missed gym
  const missedWords = ['no pude', 'no fui', 'no voy', 'salte', 'no entre', 'no entrene', 'parque', 'camine', 'ninos', 'no puedo ir', 'missed', 'skipped', "couldn't go", "can't go"];
  if (missedWords.some(w => n.includes(w))) return 'missed_gym';
  // Exercise form
  const formWords = ['como hago', 'como se hace', 'explicame', 'tecnica de', 'forma de', 'como hacer', 'how to do', 'how do i', 'explain', 'technique', 'form for'];
  if (formWords.some(w => n.includes(w))) return 'exercise_form';
  // Weight suggestion
  const weightWords = ['que peso', 'cuanto peso', 'peso inicio', 'empezar con', 'peso inicial', 'que carga', 'what weight', 'how much weight', 'starting weight'];
  if (weightWords.some(w => n.includes(w))) return 'weight_suggest';
  // Pain
  const painWords = ['me duele', 'dolor', 'lesion', 'molestia', 'lastim', 'hurts', 'pain', 'injury', 'sore'];
  if (painWords.some(w => n.includes(w))) return 'pain';
  // Supplements
  const suppWords = ['creatina', 'whey', 'proteina', 'suplemento', 'creatine', 'protein', 'supplement'];
  if (suppWords.some(w => n.includes(w))) return 'supplements';
  // Motivation
  const motiWords = ['cansado', 'no tengo ganas', 'desmotivado', 'para que', 'flojera', 'no quiero', 'aburrido', 'tired', 'unmotivated', 'lazy', "don't want", 'bored'];
  if (motiWords.some(w => n.includes(w))) return 'motivation';
  // Default
  return 'summary';
}

function jarvisRespond(intent, text, ctx) {
  const L = LANG === 'en';
  const unitPref = (() => { try { return localStorage.getItem('ds_unit_pref') || 'lbs'; } catch { return 'lbs'; } })();
  switch (intent) {
    case '1rm': {
      const records = getRecords();
      const entries = Object.entries(records);
      if (entries.length === 0) return L ? 'No records yet. Complete some exercises to see your estimated 1RM.' : 'Aún no hay récords. Completa algunos ejercicios para ver tu 1RM estimado.';
      let resp = '\uD83C\uDFC6 ' + (L ? 'Your estimated 1RM (Epley formula)' : 'Tu 1RM estimado (fórmula Epley)') + ':\n\n';
      const allExercises = {};
      Object.values(ROUTINES).forEach(r => { if (r.exercises) r.exercises.forEach(ex => { allExercises[ex.id] = ex; }); });
      const sorted = entries.sort((a, b) => {
        const wa = a[1].unit === 'kg' ? a[1].weight * 2.20462 : a[1].weight;
        const wb = b[1].unit === 'kg' ? b[1].weight * 2.20462 : b[1].weight;
        return wb - wa;
      });
      sorted.forEach(([id, rec]) => {
        const ex = allExercises[id];
        if (!ex) return;
        const w = unitPref === rec.unit ? rec.weight : rec.unit === 'kg' ? Math.round(rec.weight * 2.20462) : Math.round(rec.weight / 2.20462);
        const orm = estimate1RM(w, rec.reps);
        resp += '\u2022 ' + exName(ex) + ': ' + orm + ' ' + unitPref + ' (PR: ' + w + ' ' + unitPref + ' x' + rec.reps + ')\n';
      });
      resp += '\n' + (L ? '\uD83D\uDCA1 To improve your 1RM: progressive overload — add 2.5kg when you hit all reps with good form.' : '\uD83D\uDCA1 Para mejorar tu 1RM: sobrecarga progresiva — sube 2.5kg cuando completes todas las reps con buena forma.');
      return resp;
    }
    case 'streak': {
      const streak = getStreak();
      const stats = getFullStats();
      let resp = '\uD83D\uDD25 ' + (L ? 'Your streak & consistency' : 'Tu racha y consistencia') + ':\n\n';
      resp += (L ? '\uD83D\uDCC5 Current streak: ' : '\uD83D\uDCC5 Racha actual: ') + streak + ' ' + (L ? 'days' : 'días') + '\n';
      if (stats.maxStreak) resp += (L ? '\uD83C\uDFC6 Best streak: ' : '\uD83C\uDFC6 Mejor racha: ') + stats.maxStreak + ' ' + (L ? 'days' : 'días') + '\n';
      if (stats.totalDays) resp += (L ? '\uD83D\uDCAA\uD83C\uDFFC Total training days: ' : '\uD83D\uDCAA\uD83C\uDFFC Días totales de entreno: ') + stats.totalDays + '\n';
      if (stats.startDate) {
        const start = new Date(stats.startDate + 'T00:00:00');
        const diff = Math.floor((Date.now() - start.getTime()) / 86400000);
        const pct = diff > 0 ? Math.round((stats.totalDays / diff) * 100) : 0;
        resp += (L ? '\uD83D\uDCCA Consistency: ' : '\uD83D\uDCCA Consistencia: ') + pct + '% (' + stats.totalDays + '/' + diff + ' ' + (L ? 'days' : 'días') + ')\n';
      }
      // Records count
      const records = getRecords();
      const prCount = Object.keys(records).length;
      if (prCount > 0) resp += (L ? '\uD83C\uDFC5 Personal records: ' : '\uD83C\uDFC5 Récords personales: ') + prCount + ' ' + (L ? 'exercises' : 'ejercicios') + '\n';
      resp += '\n';
      if (streak >= 5) resp += L ? '\uD83D\uDE80 Incredible consistency! Keep the momentum going.' : '\uD83D\uDE80 ¡Consistencia increíble! No pierdas el impulso.';
      else if (streak >= 3) resp += L ? '\uD83D\uDCAA\uD83C\uDFFC Great streak going! Consistency beats intensity.' : '\uD83D\uDCAA\uD83C\uDFFC ¡Buena racha! La consistencia le gana a la intensidad.';
      else if (streak >= 1) resp += L ? '\uD83C\uDF31 Good start! Build the habit one day at a time.' : '\uD83C\uDF31 ¡Buen inicio! Construye el hábito un día a la vez.';
      else resp += L ? "\u23F0 Let's restart! One workout today and the streak begins." : '⏰ ¡A reiniciar! Un entreno hoy y la racha comienza.';
      return resp;
    }
    case 'food': {
      const food = findFood(text);
      if (!food) return L ? "I didn't find that food in my database. Try another name." : 'No encontré ese alimento en mi base de datos. Intenta con otro nombre.';
      const calLeft = CALORIES_GOAL - ctx.caloriesNow;
      const proLeft = PROTEIN_GOAL - ctx.proteinNow;
      let light = '';
      if (food.cal <= calLeft * 0.35 && calLeft > food.cal) {
        light = L
          ? '\uD83D\uDFE2 Yes you can. You have ' + calLeft + ' kcal and ' + proLeft + 'g protein left. ' + food.name + ' has ' + food.cal + ' kcal and ' + food.protein + 'g P. Fits well in your day.'
          : '\uD83D\uDFE2 Sí puedes. Te quedan ' + calLeft + ' kcal y ' + proLeft + 'g de proteína. ' + food.name + ' aporta ' + food.cal + ' kcal y ' + food.protein + 'g P. Encaja bien en tu día.';
      } else if (food.cal <= calLeft) {
        light = L
          ? "\uD83D\uDFE1 You can, but it'll be tight. You have " + calLeft + ' kcal left and ' + food.name + ' has ' + food.cal + ' kcal. Try to compensate in the next meal.'
          : '\uD83D\uDFE1 Puedes, pero quedarás justo. Te quedan ' + calLeft + ' kcal y ' + food.name + ' tiene ' + food.cal + ' kcal. Intenta compensar en la siguiente comida.';
      } else {
        light = L
          ? '\uD83D\uDD34 Not ideal. You already have ' + ctx.caloriesNow + ' of ' + CALORIES_GOAL + ' kcal and ' + food.name + ' would put you over by ' + (food.cal - calLeft) + ' kcal. Choose something lighter.'
          : '\uD83D\uDD34 No es ideal. Ya llevas ' + ctx.caloriesNow + ' de ' + CALORIES_GOAL + ' kcal y ' + food.name + ' te pasaría por ' + (food.cal - calLeft) + ' kcal. Mejor elige algo más ligero.';
      }
      return light + '\n\n' + food.name + ': ' + food.cal + ' kcal | ' + food.protein + 'g P | ' + food.carbs + 'g C | ' + food.fat + 'g F';
    }
    case 'missed_gym': {
      const tomorrow = getTomorrowRoutine();
      const tmrLabel = dayLabel(tomorrow.key);
      if (tomorrow.rest) {
        return L
          ? "No worries, Felipe. Count it as active recovery. Tomorrow " + tmrLabel + " is also rest. Long-term consistency matters more than one day. \uD83D\uDCAA\uD83C\uDFFC"
          : 'No pasa nada, Felipe. Cuenta como descanso activo. Mañana ' + tmrLabel + ' también es descanso. La consistencia a largo plazo importa más que un día. \uD83D\uDCAA\uD83C\uDFFC';
      }
      return L
        ? "No worries, Felipe. Count it as active recovery. Tomorrow you're back with " + t(tomorrow.name) + ' (' + t(tomorrow.focus) + '). Long-term consistency matters more than one day. \uD83D\uDCAA\uD83C\uDFFC'
        : 'No pasa nada, Felipe. Cuenta como descanso activo. Mañana retomas con ' + tomorrow.name + ' (' + tomorrow.focus + '). La consistencia a largo plazo importa más que un día. \uD83D\uDCAA\uD83C\uDFFC';
    }
    case 'exercise_form': {
      const ex = findExercise(text);
      if (!ex) return L ? "I didn't find that exercise. Try the exact name." : 'No encontré ese ejercicio. Intenta con el nombre exacto (ej: "press pecho", "sentadilla", "peso muerto").';
      const sw = STARTING_WEIGHTS[ex.id];
      const rec = getRecords()[ex.id];
      const ytUrl = 'https://youtube.com/results?search_query=' + encodeURIComponent(ex.nameEn + ' form tutorial');
      let resp = '\uD83D\uDCD6 ' + exName(ex) + (L ? '' : ' (' + ex.nameEn + ')') + '\n\n';
      resp += '\uD83C\uDFAF ' + (L ? 'Muscle' : 'Músculo') + ': ' + t(ex.muscle) + '\n';
      resp += '\uD83D\uDD04 ' + (L ? 'Sets x Reps' : 'Series x Reps') + ': ' + ex.sets + 'x' + ex.reps + '\n';
      resp += '\uD83D\uDCDD ' + ex.desc + '\n';
      if (sw) resp += '\u2696\uFE0F ' + (L ? 'Starting weight' : 'Peso inicial') + ': ' + sw.kg + 'kg / ' + sw.lbs + 'lbs (' + sw.note + ')\n';
      if (rec) {
        const w = unitPref === rec.unit ? rec.weight : rec.unit === 'kg' ? Math.round(rec.weight * 2.20462) : Math.round(rec.weight / 2.20462);
        const orm = estimate1RM(w, rec.reps);
        resp += '\uD83C\uDFC6 ' + (L ? 'Your PR' : 'Tu PR') + ': ' + w + ' ' + unitPref + ' x' + rec.reps + ' | 1RM: ' + orm + ' ' + unitPref + '\n';
      }
      resp += '\n\uD83C\uDFA5 ' + (L ? 'Watch tutorial' : 'Ver tutorial') + ': ' + ytUrl;
      return resp;
    }
    case 'weight_suggest': {
      if (ctx.isRest) return L
        ? "Today is " + t(ctx.routineName).toLowerCase() + " day. No exercises scheduled. Enjoy the rest. \uD83D\uDE4C\uD83C\uDFFC"
        : 'Hoy es día de ' + ctx.routineName.toLowerCase() + '. No hay ejercicios programados. Disfruta el descanso. \uD83D\uDE4C\uD83C\uDFFC';
      const records = getRecords();
      let resp = '\uD83D\uDCAA\uD83C\uDFFC ' + (L ? 'Suggested weights' : 'Pesos sugeridos') + ' — ' + t(ctx.routineName) + ' (' + t(ctx.routineFocus) + '):\n\n';
      const routine = ROUTINES[ctx.todayKey];
      routine.exercises.forEach((ex, i) => {
        const rec = records[ex.id];
        const sw = STARTING_WEIGHTS[ex.id];
        if (rec) {
          const w = unitPref === rec.unit ? rec.weight : rec.unit === 'kg' ? Math.round(rec.weight * 2.20462) : Math.round(rec.weight / 2.20462);
          const orm = estimate1RM(w, rec.reps);
          const work70 = Math.round(orm * 0.7);
          const work80 = Math.round(orm * 0.8);
          resp += (i + 1) + '. ' + exName(ex) + '\n';
          resp += '   PR: ' + w + ' ' + unitPref + ' x' + rec.reps + ' | 1RM: ' + orm + ' ' + unitPref + '\n';
          resp += '   ' + (L ? 'Suggested' : 'Sugerido') + ': ' + work70 + '-' + work80 + ' ' + unitPref + ' (70-80% 1RM)\n';
        } else if (sw) {
          resp += (i + 1) + '. ' + exName(ex) + ' — ' + sw.kg + 'kg / ' + sw.lbs + 'lbs (' + sw.note + ')\n';
        } else {
          resp += (i + 1) + '. ' + exName(ex) + ' — ' + (L ? 'Bodyweight' : 'Peso corporal') + '\n';
        }
      });
      resp += '\n' + (L ? '\uD83D\uDCA1 Progressive overload: if you complete all reps with good form, add 2-2.5kg next session.' : '\uD83D\uDCA1 Sobrecarga progresiva: si completas todas las reps con buena forma, sube 2-2.5kg la próxima sesión.');
      return resp;
    }
    case 'pain': {
      return L
        ? '\u26A0\uFE0F If you feel sharp pain, STOP immediately.\n\n\u2705 Post-workout muscle soreness (DOMS) is normal — lasts 24-48h.\n\u274C Joint or stabbing pain: reduce weight 50%, check form.\n\n\uD83D\uDCA1 Tips:\n- Warm up 5-10 min before training\n- Stretch after workout\n- If pain persists more than 3 days, see a professional\n- Never train through acute pain'
        : '\u26A0\uFE0F Si sientes dolor agudo, PARA inmediatamente.\n\n\u2705 Dolor muscular post-entrenamiento (DOMS) es normal — dura 24-48h.\n\u274C Dolor articular o punzante: reduce peso 50%, revisa técnica.\n\n\uD83D\uDCA1 Consejos:\n- Calienta 5-10 min antes de entrenar\n- Estira después del entrenamiento\n- Si el dolor persiste más de 3 días, consulta un profesional\n- Nunca entrenes a través del dolor agudo';
    }
    case 'supplements': {
      if (ctx.isRest) {
        return L
          ? '\uD83D\uDC8A Supplements today (' + ctx.dayLabel + ' — rest):\n\n\u2705 Creatine: 5g even on rest days — consistency is key. Take it with breakfast.\n\uD83E\uDD64 Whey: optional today, only if you need protein (you have ' + ctx.proteinNow + 'g of ' + PROTEIN_GOAL + 'g).'
          : '\uD83D\uDC8A Suplementos hoy (' + ctx.dayLabel + ' — descanso):\n\n\u2705 Creatina: 5g igual aunque no entrenes — la consistencia es clave. Tómala con el desayuno.\n\uD83E\uDD64 Whey: opcional hoy, solo si te falta proteína (llevas ' + ctx.proteinNow + 'g de ' + PROTEIN_GOAL + 'g).';
      }
      return L
        ? '\uD83D\uDC8A Supplements today (' + ctx.dayLabel + ' — ' + t(ctx.routineName) + '):\n\n\uD83E\uDD64 Whey: take it post-gym (27g protein). Ideally within 30 min after training.\n\u2705 Creatine: 5g with breakfast or mixed with whey.\n\nDid you take creatine today?'
        : '\uD83D\uDC8A Suplementos hoy (' + ctx.dayLabel + ' — ' + ctx.routineName + '):\n\n\uD83E\uDD64 Whey: tómalo post-gym (27g proteína). Ideal dentro de los 30 min después de entrenar.\n\u2705 Creatina: 5g con el desayuno o mezclada con el whey.\n\n\u00BFYa tomaste la creatina hoy?';
    }
    case 'motivation': {
      const msg = t(MOTIVATION_MSGS[Math.floor(Math.random() * MOTIVATION_MSGS.length)]);
      let extra = '';
      if (!ctx.isRest && ctx.exercisesDone > 0) {
        extra = L
          ? '\n\nYou have ' + ctx.exercisesDone + '/' + ctx.exercisesTotal + ' exercises done and ' + ctx.proteinNow + 'g protein. You\'re making progress.'
          : '\n\nLlevas ' + ctx.exercisesDone + '/' + ctx.exercisesTotal + ' ejercicios completados y ' + ctx.proteinNow + 'g de proteína. Ya estás avanzando.';
      } else if (ctx.proteinNow > 0) {
        extra = L
          ? '\n\nYou already have ' + ctx.proteinNow + 'g protein today. Every meal counts.'
          : '\n\nYa llevas ' + ctx.proteinNow + 'g de proteína hoy. Cada comida cuenta.';
      }
      return '\uD83D\uDD25 ' + msg + extra;
    }
    case 'summary':
    default: {
      const streak = getStreak();
      let resp = '\uD83D\uDCCA ' + (L ? 'Day summary' : 'Resumen del día') + ' — ' + ctx.dayLabel + '\n\n';
      if (ctx.isRest) {
        resp += (L ? '\uD83D\uDECB\uFE0F Routine: ' : '\uD83D\uDECB\uFE0F Rutina: ') + t(ctx.routineName) + ' (' + t(ctx.routineFocus) + ')\n';
      } else {
        resp += '\uD83C\uDFCB\uD83C\uDFFC Gym: ' + ctx.exercisesDone + '/' + ctx.exercisesTotal + ' ' + t('ejercicios') + ' | ' + t(ctx.routineName) + ' (' + t(ctx.routineFocus) + ')\n';
      }
      resp += '\uD83E\uDD69 ' + t('Proteína') + ': ' + ctx.proteinNow + 'g / ' + PROTEIN_GOAL + 'g\n';
      resp += '\uD83D\uDD25 ' + t('Calorías') + ': ' + ctx.caloriesNow + ' / ' + CALORIES_GOAL + ' kcal\n';
      resp += '\uD83D\uDCA7 ' + t('Agua') + ': ' + ctx.waterGlasses + ' / ' + ctx.waterGoalGlasses + ' ' + t('vasos') + ' (' + ctx.waterMl + 'ml)\n';
      if (streak > 0) resp += '\uD83D\uDD25 ' + (L ? 'Streak' : 'Racha') + ': ' + streak + ' ' + (L ? 'days' : 'días') + '\n';
      // Today's PRs
      if (!ctx.isRest) {
        const today = localDate();
        const records = getRecords();
        const routine = ROUTINES[ctx.todayKey];
        const todayPRs = routine.exercises.filter(ex => records[ex.id] && records[ex.id].date === today);
        if (todayPRs.length > 0) {
          resp += '\n\uD83C\uDFC6 ' + (L ? "Today's PRs" : 'PRs de hoy') + ': ' + todayPRs.map(ex => {
            const rec = records[ex.id];
            const w = unitPref === rec.unit ? rec.weight : rec.unit === 'kg' ? Math.round(rec.weight * 2.20462) : Math.round(rec.weight / 2.20462);
            return exName(ex) + ' ' + w + unitPref + ' (1RM: ' + estimate1RM(w, rec.reps) + ')';
          }).join(', ') + '\n';
        }
      }
      const protPct = ctx.proteinNow / PROTEIN_GOAL;
      const calPct = ctx.caloriesNow / CALORIES_GOAL;
      resp += '\n';
      if (protPct >= 0.8 && calPct <= 1.05) {
        resp += L ? '\uD83C\uDF1F Excellent protein intake. Keep it up.' : '\uD83C\uDF1F Vas excelente con la proteína. Sigue así.';
      } else if (protPct < 0.5 && new Date().getHours() >= 15) {
        resp += L ? '\u26A0\uFE0F Low protein for this time of day. Prioritize protein in your next meals.' : '\u26A0\uFE0F Llevas poca proteína para esta hora. Prioriza proteína en las próximas comidas.';
      } else if (calPct > 1) {
        resp += L ? '\u26A0\uFE0F You already passed your calorie goal. Try to keep dinner light.' : '\u26A0\uFE0F Ya pasaste tu meta de calorías. Trata de mantener ligera la cena.';
      } else {
        resp += L ? '\uD83D\uDCAA\uD83C\uDFFC Good progress. Keep the pace.' : '\uD83D\uDCAA\uD83C\uDFFC Buen progreso. Mantén el ritmo.';
      }
      return resp;
    }
  }
}

// ── Week Strip ────────────────────────────────────────────────────────

function WeekStrip() {
  const dayKeys = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
  const dayLabelsShort = LANG === 'en' ? ['M', 'T', 'W', 'T', 'F', 'S', 'S'] : ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
  const today = new Date();
  const todayKey = getTodayKey();
  const todayDate = localDate(today);

  // Find Monday of current week
  const dayOfWeek = today.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;

  const days = dayKeys.map((dk, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + mondayOffset + i);
    const date = localDate(d);
    const isToday = date === todayDate;
    const isFuture = d > today && !isToday;
    const isRest = !!(ROUTINES[dk] && ROUTINES[dk].rest && !ROUTINES[dk].cardio);
    const isCardio = !!(ROUTINES[dk] && ROUTINES[dk].cardio);
    let done = false;
    if (!isFuture && !isRest) {
      if (isCardio) {
        try { done = localStorage.getItem('ds_cardio_done_' + date) === 'true'; } catch {}
      } else {
        try {
          const saved = localStorage.getItem('ds_workout_' + dk + '_' + date);
          if (saved) {
            const states = JSON.parse(saved);
            done = states.length > 0 && states.every(e => e.sets.every(s => s.done));
          }
        } catch {}
      }
    }
    return { label: dayLabelsShort[i], isToday, isFuture, isRest, done };
  });

  return html`
    <div className="flex items-center justify-end gap-3 slide-in-right" style=${{ animationDelay: '0.1s' }}>
      ${days.map((d, i) => html`
        <div key=${i} className="flex flex-col items-center gap-0.5">
          <span style=${{ fontSize: 8, fontWeight: 600, color: d.isToday ? T.accent : T.muted, lineHeight: 1 }}>${d.label}</span>
          <div style=${{
            width: 14, height: 14, borderRadius: '50%',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: d.done ? T.green : d.isToday ? T.accent : d.isRest ? T.input : 'transparent',
            border: d.done || d.isToday ? 'none' : '1.5px solid ' + (d.isFuture ? T.border : T.muted + '40'),
            transition: 'all 0.3s ease'
          }}>
            ${d.done ? html`<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
            : d.isToday ? html`<div style=${{ width: 5, height: 5, borderRadius: '50%', background: '#fff' }} />`
            : ''}
          </div>
        </div>
      `)}
    </div>
  `;
}


// ── Rest Timer ────────────────────────────────────────────────────────

// Rest time by exercise type (seconds)
// Compound heavy: 150s, Compound moderate: 120s, Isolation: 75s, Core: 60s
const REST_TIMES = {
  bench_press: 150, squat: 150, deadlift: 150, ohp: 150,
  incline_press: 120, leg_press: 120, lat_pulldown: 120, cable_row: 120, bulgarian: 120, db_row: 120,
  lateral_raise: 75, bicep_curl: 75, hammer_curl: 75, leg_ext: 75, leg_curl: 75,
  calf_raise_a: 75, calf_raise_b: 75, rear_delt: 75, tricep_push: 75, skull_crush: 75, seated_curl: 75, glute_kickback: 75,
  plank: 60, crunch: 60,
};
function getRestTime(exerciseId) { return REST_TIMES[exerciseId] || 90; }

// Weight increment by exercise type (lbs)
const WEIGHT_INCREMENTS = {
  squat: 10, deadlift: 10, leg_press: 10, glute_kickback: 10,
  bench_press: 5, incline_press: 5, ohp: 5, lat_pulldown: 5, cable_row: 5, db_row: 5, bulgarian: 5,
  lateral_raise: 5, bicep_curl: 5, hammer_curl: 5, leg_ext: 5, leg_curl: 5,
  calf_raise_a: 5, calf_raise_b: 5, rear_delt: 5, tricep_push: 5, skull_crush: 5, seated_curl: 5,
};

function getTrainingWeek() {
  try {
    const stats = JSON.parse(localStorage.getItem('ds_stats') || '{}');
    const start = stats.startDate || localDate();
    const diff = Math.floor((Date.now() - new Date(start + 'T00:00:00').getTime()) / (7 * 86400000));
    return Math.max(1, diff + 1);
  } catch { return 1; }
}

function getWeeklyRecommendations(routine, todayKey, unitPref) {
  if (!routine.exercises) return [];
  const week = getTrainingWeek();
  const isDeload = week % 4 === 0;
  const records = getRecords();
  return routine.exercises.map((ex, ei) => {
    const rec = records[ex.id];
    if (!rec || !rec.weight) return { exercise: ex, index: ei, current: null, recommended: null, status: 'new' };
    const currentW = rec.unit === unitPref ? rec.weight : (unitPref === 'kg' ? rec.weight / 2.20462 : rec.weight * 2.20462);
    const roundedCurrent = Math.round(currentW);
    if (isDeload) {
      return { exercise: ex, index: ei, current: roundedCurrent, recommended: Math.round(roundedCurrent * 0.8 / 5) * 5, status: 'deload' };
    }
    // Check if user completed all reps in last session
    let hitAllReps = false;
    try {
      for (let d = 1; d <= 28; d++) {
        const prev = localDate(new Date(Date.now() - d * 86400000));
        const pk = 'ds_workout_' + todayKey + '_' + prev;
        const ps = localStorage.getItem(pk);
        if (ps) {
          const states = JSON.parse(ps);
          if (states[ei] && states[ei].sets) {
            const doneSets = states[ei].sets.filter(s => s.done && s.weight > 0);
            hitAllReps = doneSets.length >= ex.sets && doneSets.every(s => (s.reps || 0) >= parseInt(ex.reps));
          }
          break;
        }
      }
    } catch {}
    if (hitAllReps) {
      const inc = WEIGHT_INCREMENTS[ex.id] || 5;
      const incUnit = unitPref === 'kg' ? Math.round(inc / 2.20462 / 2.5) * 2.5 || 2.5 : inc;
      return { exercise: ex, index: ei, current: roundedCurrent, recommended: roundedCurrent + incUnit, status: 'increase' };
    }
    return { exercise: ex, index: ei, current: roundedCurrent, recommended: roundedCurrent, status: 'maintain' };
  });
}

function RestTimer({ duration = 90, onDone }) {
  const [left, setLeft] = useState(duration);
  const notified = useRef(false);
  useEffect(() => {
    if (left <= 0) {
      if (!notified.current) {
        notified.current = true;
        haptic([30, 100, 30, 100, 30]);
        try { if (Notification.permission === 'granted') new Notification('DontSkip', { body: t('¡Descanso terminado! Siguiente set'), icon: 'icon-192.png' }); } catch {}
      }
      onDone && onDone();
      return;
    }
    const tid = setTimeout(() => setLeft(l => l - 1), 1000);
    return () => clearTimeout(tid);
  }, [left]);
  const pct = left / duration;
  const urgentColor = left <= 10 ? T.red : left <= 30 ? T.amber : T.accent;
  const restLabel = duration >= 150 ? (LANG === 'en' ? 'Heavy compound' : 'Compuesto pesado')
    : duration >= 120 ? (LANG === 'en' ? 'Compound' : 'Compuesto')
    : duration <= 60 ? 'Core'
    : (LANG === 'en' ? 'Isolation' : 'Aislamiento');
  const mm = Math.floor(left / 60);
  const ss = left % 60;
  const timeStr = mm > 0 ? mm + ':' + String(ss).padStart(2, '0') : left + 's';
  const sz = 52, sw = 4, r = (sz - sw) / 2, circ = 2 * Math.PI * r, off = circ * (1 - pct), ctr = sz / 2;
  return html`
    <div className="flex items-center gap-3 py-3 px-4 rounded-xl fade-up mt-2"
      style=${{ background: T.elevated, border: '1px solid ' + urgentColor + '30' }}>
      <div className="relative" style=${{ width: sz, height: sz, flexShrink: 0 }}>
        <svg width=${sz} height=${sz} style=${{ transform: 'rotate(-90deg)' }}>
          <circle cx=${ctr} cy=${ctr} r=${r} fill="none" stroke=${T.input} strokeWidth=${sw} />
          <circle cx=${ctr} cy=${ctr} r=${r} fill="none" stroke=${urgentColor} strokeWidth=${sw}
            strokeDasharray=${circ} strokeDashoffset=${off} strokeLinecap="round"
            style=${{ transition: 'stroke-dashoffset 1s linear, stroke 0.5s' }} />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 14, fontWeight: 800, color: urgentColor, fontVariantNumeric: 'tabular-nums', transition: 'color 0.5s' }}>${timeStr}</span>
        </div>
      </div>
      <div className="flex-1">
        <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 13, fontWeight: 700, color: T.text }}>${t('Descanso')}</div>
        <div style=${{ fontSize: 10, fontWeight: 600, color: T.muted }}>${restLabel} \u00B7 ${Math.floor(duration / 60)}:${String(duration % 60).padStart(2, '0')}</div>
      </div>
      <button onClick=${() => onDone && onDone()}
        className="press-scale"
        style=${{ fontSize: 11, fontWeight: 700, color: T.accent, padding: '8px 14px', borderRadius: 10, background: T.accentDim, border: 'none' }}>
        ${t('Saltar')}
      </button>
    </div>
  `;
}


// ── HIIT Timer ───────────────────────────────────────────────────────

function HIITTimer({ onClose }) {
  const [workSec, setWorkSec] = useState(30);
  const [restSec, setRestSec] = useState(15);
  const [rounds, setRounds] = useState(8);
  const [running, setRunning] = useState(false);
  const [currentRound, setCurrentRound] = useState(1);
  const [phase, setPhase] = useState('work'); // 'work' | 'rest' | 'done'
  const [timeLeft, setTimeLeft] = useState(30);
  const notifiedRef = useRef(false);

  useEffect(() => {
    if (!running || phase === 'done') return;
    if (timeLeft <= 0) {
      haptic([30, 80, 30]);
      try { if (Notification.permission === 'granted') new Notification('DontSkip HIIT', { body: phase === 'work' ? t('Descanso') + '!' : t('A trabajar') + '!', icon: 'icon-192.png' }); } catch {}
      if (phase === 'work') {
        if (currentRound >= rounds) { setPhase('done'); setRunning(false); haptic([30, 80, 30, 80, 30, 80, 30]); return; }
        setPhase('rest'); setTimeLeft(restSec);
      } else {
        setCurrentRound(r => r + 1); setPhase('work'); setTimeLeft(workSec);
      }
      return;
    }
    const tid = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
    return () => clearTimeout(tid);
  }, [running, timeLeft, phase]);

  function startHIIT() {
    setCurrentRound(1); setPhase('work'); setTimeLeft(workSec); setRunning(true);
  }
  function resetHIIT() {
    setRunning(false); setCurrentRound(1); setPhase('work'); setTimeLeft(workSec);
  }

  const phaseColor = phase === 'work' ? T.green : phase === 'rest' ? T.amber : T.accent;
  const phaseDuration = phase === 'work' ? workSec : restSec;
  const pct = phaseDuration > 0 ? timeLeft / phaseDuration : 0;
  const mm = Math.floor(timeLeft / 60);
  const ss = timeLeft % 60;
  const ringSize = 160, ringSw = 8, ringR = (ringSize - ringSw) / 2, ringCirc = 2 * Math.PI * ringR, ringOff = ringCirc * (1 - pct);

  function adjustValue(setter, current, delta, min, max) { setter(Math.max(min, Math.min(max, current + delta))); }

  if (phase === 'done') {
    return html`
      <div className="text-center fade-up">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke=${T.green} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="celebrate" style=${{ display: 'inline-block', marginBottom: 16 }}>
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>
        <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 22, fontWeight: 900, color: T.text, marginBottom: 6 }}>HIIT ${t('completado')}</div>
        <div style=${{ fontSize: 13, color: T.sub, marginBottom: 4 }}>${rounds} ${t('rondas')} \u00B7 ${workSec}s/${restSec}s</div>
        <div style=${{ fontSize: 13, color: T.sub, marginBottom: 20 }}>~${Math.round(rounds * (workSec + restSec) / 60)} min \u00B7 ~${calcCaloriesBurned(rounds * (workSec + restSec), getUserWeightKg())} kcal</div>
        <div className="flex justify-center gap-3">
          <button onClick=${resetHIIT} className="px-5 py-2.5 rounded-xl press-scale" style=${{ background: T.accentDim, color: T.accent, fontSize: 13, fontWeight: 700 }}>${t('Repetir')}</button>
          <button onClick=${onClose} className="px-5 py-2.5 rounded-xl press-scale" style=${{ background: T.input, color: T.muted, fontSize: 13, fontWeight: 700 }}>${t('Cerrar')}</button>
        </div>
      </div>
    `;
  }

  if (!running) {
    return html`
      <div className="fade-up">
        <div className="text-center" style=${{ marginBottom: 24 }}>
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 20, fontWeight: 900, color: T.text, letterSpacing: '-0.5px', marginBottom: 4 }}>HIIT Timer</div>
          <div style=${{ fontSize: 12, color: T.muted }}>${t('Configura tu intervalo')}</div>
        </div>
        <div className="space-y-4" style=${{ maxWidth: 280, margin: '0 auto' }}>
          ${[
            { label: LANG === 'en' ? 'Work' : 'Trabajo', value: workSec, setter: setWorkSec, unit: 's', min: 10, max: 120, step: 5 },
            { label: t('Descanso'), value: restSec, setter: setRestSec, unit: 's', min: 5, max: 60, step: 5 },
            { label: t('Rondas'), value: rounds, setter: setRounds, unit: '', min: 2, max: 20, step: 1 },
          ].map((cfg, ci) => html`
            <div key=${ci} className="flex items-center justify-between py-2">
              <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 14, fontWeight: 700, color: T.text }}>${cfg.label}</span>
              <div className="flex items-center gap-3">
                <button onClick=${() => adjustValue(cfg.setter, cfg.value, -cfg.step, cfg.min, cfg.max)} className="press-scale"
                  style=${{ width: 36, height: 36, borderRadius: '50%', background: T.input, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 700, color: T.muted }}>-</button>
                <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 22, fontWeight: 900, color: T.text, width: 48, textAlign: 'center', fontVariantNumeric: 'tabular-nums' }}>${cfg.value}${cfg.unit}</span>
                <button onClick=${() => adjustValue(cfg.setter, cfg.value, cfg.step, cfg.min, cfg.max)} className="press-scale"
                  style=${{ width: 36, height: 36, borderRadius: '50%', background: T.input, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 700, color: T.muted }}>+</button>
              </div>
            </div>
          `)}
        </div>
        <div className="text-center mt-2" style=${{ fontSize: 12, color: T.muted }}>
          ${t('Total')}: ${Math.round(rounds * (workSec + restSec) / 60)} min
        </div>
        <div className="flex justify-center gap-3 mt-6">
          <button onClick=${startHIIT} className="px-8 py-3 rounded-2xl press-scale"
            style=${{ background: T.green, color: '#fff', fontFamily: 'Outfit, sans-serif', fontSize: 15, fontWeight: 800, boxShadow: '0 4px 20px rgba(22,163,74,0.3)' }}>
            ${t('Iniciar')}
          </button>
          <button onClick=${onClose} className="px-5 py-3 rounded-2xl press-scale"
            style=${{ background: T.input, color: T.muted, fontSize: 13, fontWeight: 700 }}>
            ${t('Cerrar')}
          </button>
        </div>
      </div>
    `;
  }

  // Running
  return html`
    <div className="text-center fade-up">
      <div className="flex items-center justify-center gap-2 mb-2">
        <div style=${{ width: 8, height: 8, borderRadius: '50%', background: phaseColor, animation: 'livePulse 1.5s ease-in-out infinite' }} />
        <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 11, fontWeight: 800, color: phaseColor, textTransform: 'uppercase', letterSpacing: '0.12em' }}>
          ${phase === 'work' ? (LANG === 'en' ? 'Work' : 'Trabajo') : t('Descanso')}
        </span>
      </div>
      <div className="relative inline-block" style=${{ marginBottom: 16 }}>
        <svg width=${ringSize} height=${ringSize} style=${{ transform: 'rotate(-90deg)' }}>
          <circle cx=${ringSize / 2} cy=${ringSize / 2} r=${ringR} fill="none" stroke=${T.input} strokeWidth=${ringSw} />
          <circle cx=${ringSize / 2} cy=${ringSize / 2} r=${ringR} fill="none" stroke=${phaseColor} strokeWidth=${ringSw}
            strokeDasharray=${ringCirc} strokeDashoffset=${ringOff} strokeLinecap="round"
            style=${{ transition: 'stroke-dashoffset 1s linear, stroke 0.3s' }} />
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 48, fontWeight: 900, color: T.text, fontVariantNumeric: 'tabular-nums', letterSpacing: '-2px', lineHeight: 1 }}>
            ${mm > 0 ? mm + ':' + String(ss).padStart(2, '0') : ss}
          </div>
          <div style=${{ fontSize: 12, fontWeight: 600, color: T.muted, marginTop: 4 }}>
            ${t('Ronda')} ${currentRound}/${rounds}
          </div>
        </div>
      </div>
      <div className="flex justify-center gap-3">
        <button onClick=${() => setRunning(false)} className="press-scale"
          style=${{ width: 44, height: 44, borderRadius: '50%', background: T.elevated, border: '1.5px solid ' + T.border, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill=${T.text} stroke="none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <button onClick=${resetHIIT} className="press-scale"
          style=${{ width: 44, height: 44, borderRadius: '50%', background: T.elevated, border: '1.5px solid ' + T.border, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill=${T.muted} stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
      </div>
    </div>
  `;
}

  const goalReached = value >= max && max > 0;

  const sz = 120, sw = 14, r = (sz - sw) / 2, circ = 2 * Math.PI * r;
  const valColor = gradientColors ? gradientColors[1] : color;
  const off = circ * (1 - pct);

  return html`
    <div style=${{ padding: '14px 16px 16px', borderRadius: 20, background: T.card, position: 'relative', boxShadow: 'var(--ds-card-shadow)' }}>
      <div className="flex items-center justify-between" style=${{ marginBottom: 8 }}>

            <circle cx=${sz / 2} cy=${sz / 2} r=${r} fill="none" stroke=${T.input} strokeWidth=${sw} />
            <circle cx=${sz / 2} cy=${sz / 2} r=${r} fill="none" stroke=${gradientId ? 'url(#' + gradientId + ')' : color} strokeWidth=${sw}
              strokeDasharray=${circ} strokeDashoffset=${off} strokeLinecap="round"
              className="ring-circle" style=${{ transitionDelay: (delay || 0) + 'ms' }} />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <div className="flex items-baseline">
              <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, color: valColor, lineHeight: 1, letterSpacing: '-1px' }}>${animVal}</span>
              <span style=${{ fontSize: 11, fontWeight: 500, color: T.muted, marginLeft: 1 }}>/</span>
            </div>
            <div style=${{ fontSize: 11, fontWeight: 600, color: T.muted, marginTop: 2 }}>${max}${unit}</div>
          </div>
        </div>
      </div>
      ${goalReached ? html`
        <div style=${{ position: 'absolute', bottom: 10, right: 12 }}>
          <${CheckCircle} size=${16} weight="fill" color=${T.green} />
        </div>
      ` : ''}
    </div>
  `;
}

function SupplementsCheck() {
  const date = localDate();
  const [creatine, setCreatine] = useState(() => {
    try { return localStorage.getItem('ds_creatine_' + date) === 'true'; } catch { return false; }
  });
  const [whey, setWhey] = useState(() => {

// ── Dual Ring Card ───────────────────────────────────────────────────

function DualRingCard({ outer, inner }) {
  // outer/inner: { icon, label, value, max, unit, gradientId, gradientColors }
  const [mounted, setMounted] = useState(false);
  useEffect(() => { requestAnimationFrame(() => requestAnimationFrame(() => setMounted(true))); }, []);

  const outerAnimVal = useCountUp(outer.value, 700);
  const innerAnimVal = useCountUp(inner.value, 700);

  const rOuter = 41, rInner = 29, sw = 7;
  const circOuter = 2 * Math.PI * rOuter; // ~257.61
  const circInner = 2 * Math.PI * rInner; // ~182.21
  const pctOuter = outer.max > 0 ? Math.min(outer.value / outer.max, 1) : 0;
  const pctInner = inner.max > 0 ? Math.min(inner.value / inner.max, 1) : 0;
  const offOuter = mounted ? circOuter * (1 - pctOuter) : circOuter;
  const offInner = mounted ? circInner * (1 - pctInner) : circInner;
  const outerDone = outer.value >= outer.max && outer.max > 0;
  const innerDone = inner.value >= inner.max && inner.max > 0;
  const svgSz = 100;

  const inter = "'Inter', system-ui, sans-serif";

  const metricRow = (m, animVal, done) => html`
    <div className="flex items-center gap-2">
      <div style=${{ flexShrink: 0 }}>${m.icon}</div>
      <div style=${{ flex: 1, minWidth: 0 }}>
        <div style=${{ fontSize: 10, fontWeight: 700, fontFamily: inter, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em', lineHeight: 1.2 }}>${m.label}</div>
        <div className="flex items-center gap-1" style=${{ marginTop: 2 }}>
          <span style=${{ fontSize: 22, fontWeight: 800, fontFamily: inter, color: T.text, lineHeight: 1 }}>${animVal}</span>
          <span style=${{ fontSize: 10, fontWeight: 500, fontFamily: inter, color: T.muted }}>/ ${m.max}${m.unit}</span>
          ${done ? html`<${CheckCircle} size=${16} weight="fill" color=${T.green} style=${{ marginLeft: 2 }} />` : ''}
        </div>
      </div>
    </div>
  `;

  return html`
    <div style=${{ padding: '16px 18px', borderRadius: 20, background: T.card, boxShadow: 'var(--ds-card-shadow)' }}>
      <div className="flex items-center gap-4">
        <div style=${{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 10 }}>
          ${metricRow(outer, outerAnimVal, outerDone)}
          <div style=${{ height: 1, background: T.border }} />
          ${metricRow(inner, innerAnimVal, innerDone)}
        </div>
        <div style=${{ flexShrink: 0, width: svgSz, height: svgSz }}>
          <svg width=${svgSz} height=${svgSz} style=${{ transform: 'rotate(-90deg)' }}>
            <defs>
              <linearGradient id=${outer.gradientId} x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color=${outer.gradientColors[0]} />
                <stop offset="100%" stop-color=${outer.gradientColors[1]} />
              </linearGradient>
              <linearGradient id=${inner.gradientId} x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color=${inner.gradientColors[0]} />
                <stop offset="100%" stop-color=${inner.gradientColors[1]} />
              </linearGradient>
            </defs>
            <!-- Outer track -->
            <circle cx=${svgSz / 2} cy=${svgSz / 2} r=${rOuter} fill="none"
              stroke=${outer.gradientColors[1]} strokeWidth=${sw} opacity="0.1" />
            <!-- Outer arc -->
            <circle cx=${svgSz / 2} cy=${svgSz / 2} r=${rOuter} fill="none"
              stroke=${'url(#' + outer.gradientId + ')'} strokeWidth=${sw}
              strokeDasharray=${circOuter} strokeDashoffset=${offOuter}
              strokeLinecap="round" className="dual-ring-arc" />
            <!-- Inner track -->
            <circle cx=${svgSz / 2} cy=${svgSz / 2} r=${rInner} fill="none"
              stroke=${inner.gradientColors[1]} strokeWidth=${sw} opacity="0.1" />
            <!-- Inner arc -->
            <circle cx=${svgSz / 2} cy=${svgSz / 2} r=${rInner} fill="none"
              stroke=${'url(#' + inner.gradientId + ')'} strokeWidth=${sw}
              strokeDasharray=${circInner} strokeDashoffset=${offInner}
              strokeLinecap="round" className="dual-ring-arc" />
          </svg>
        </div>
      </div>
    </div>
  `;
}

// ── Exercise Item ──────────────────────────────────────────────────────

function getExerciseHistory(exerciseIndex, todayKey, maxSessions) {
  const today = localDate();
  const sessions = [];
  for (let d = 1; d <= 90 && sessions.length < maxSessions; d++) {
    const prev = new Date(Date.now() - d * 86400000);
    const date = localDate(prev);
    if (date === today) continue;
    const pk = 'ds_workout_' + todayKey + '_' + date;
    try {
      const saved = localStorage.getItem(pk);
      if (saved) {
        const states = JSON.parse(saved);
        if (states[exerciseIndex]) {
          const doneSets = states[exerciseIndex].sets.filter(s => s.done && s.weight > 0);
          if (doneSets.length > 0) {
            const maxW = Math.max(...doneSets.map(s => s.weight));
            const topSet = doneSets.find(s => s.weight === maxW);
            sessions.push({ date, weight: topSet.weight, reps: topSet.reps || 0, sets: doneSets.length });
          }
        }
      }
    } catch {}
  }
  return sessions;
}

function ExerciseItem({ exercise, index, unitPref, exerciseState, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [showTimer, setShowTimer] = useState(false);
  const [celebrating, setCelebrating] = useState(false);
  const [prSet, setPrSet] = useState(null);
  const prevAllDone = useRef(false);
  const sets = exerciseState.sets || [];
  const allDone = sets.length > 0 && sets.every(s => s.done);
  const doneSets = sets.filter(s => s.done).length;
  const isPlank = exercise.reps && exercise.reps.toString().includes('s');

  useEffect(() => {
    if (allDone && !prevAllDone.current) {
      setCelebrating(true);
      setTimeout(() => setCelebrating(false), 600);
    }
    prevAllDone.current = allDone;
  }, [allDone]);

  function updateSet(si, field, val) {
    const newSets = sets.map((s, i) => i === si ? { ...s, [field]: val } : s);
    onUpdate({ ...exerciseState, sets: newSets });
    // Save record if set is already done and weight was updated
    if (newSets[si].done && field === 'weight' && val > 0) {
      saveRecord(exercise.id, val, newSets[si].reps || 0, localDate(), unitPref);
    }
  }

  function fillSets() {
    const first = sets[0];
    if (!first || (!first.weight && !first.reps)) return;
    const newSets = sets.map(s => s.done ? s : { ...s, weight: first.weight || s.weight, reps: first.reps || s.reps });
    onUpdate({ ...exerciseState, sets: newSets });
  }


  function toggleSet(si) {
    const wasDone = sets[si].done;
    const newSets = sets.map((s, i) => i === si ? { ...s, done: !s.done } : s);
    onUpdate({ ...exerciseState, sets: newSets });
    if (!wasDone) haptic(15);
    if (!wasDone && !newSets.every(s => s.done)) setShowTimer(true);
    if (!wasDone && sets[si].weight > 0) {
      const records = getRecords();
      const prev = records[exercise.id];
      const prevLbs = prev ? (prev.unit === 'kg' ? prev.weight * 2.20462 : prev.weight) : 0;
      const curLbs = unitPref === 'kg' ? sets[si].weight * 2.20462 : sets[si].weight;
      saveRecord(exercise.id, sets[si].weight, sets[si].reps || 0, localDate(), unitPref);
      if (curLbs > prevLbs && prevLbs > 0) {
        setPrSet(si);
        setTimeout(() => setPrSet(null), 3000);
      }
    }
    if (!wasDone && newSets.every(s => s.done)) updateStatsOnComplete();
  }

  function completeAll() {
    const newSets = sets.map(s => ({ ...s, done: true }));
    onUpdate({ ...exerciseState, sets: newSets });
    haptic([15, 50, 30]);
    updateStatsOnComplete();
  }

  const ytUrl = exercise.videoId ? 'https://youtube.com/watch?v=' + exercise.videoId : 'https://youtube.com/results?search_query=' + encodeURIComponent((exercise.nameEn || exercise.name) + ' exercise gym');

  return html`
    <div style=${{ borderBottom: '1px solid ' + T.border, paddingBottom: 16 }}>
      <div className="flex items-center gap-3 cursor-pointer" style=${{ padding: '14px 2px 0' }} onClick=${() => setExpanded(!expanded)}>
        <div className=${'flex items-center justify-center w-8 h-8 rounded-lg flex-shrink-0' + (celebrating ? ' celebrate glow-pulse' : '')}
          style=${{ background: allDone ? T.green : T.elevated }}>
          ${allDone
            ? html`<svg className="check-draw" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke=${T.bg} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
            : html`<span style=${{ fontSize: 12, fontWeight: 700, color: T.muted }}>${index + 1}</span>`
          }
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <span style=${{ fontSize: 16, fontWeight: 700, color: allDone ? T.green : T.text, textDecoration: allDone ? 'line-through' : 'none' }}>${exName(exercise)}</span>
            <span className="px-2 py-0.5 rounded-full" style=${{ background: T.elevated, color: T.sub, fontSize: 10 }}>${t(exercise.muscle)}</span>
          </div>
          <div className="flex items-center gap-2" style=${{ marginTop: 3 }}>
            <span style=${{ fontSize: 12, color: T.sub }}>${exercise.sets}x${exercise.reps}</span>
            ${doneSets > 0 && html`
              <span className="px-1.5 py-0.5 rounded-md pop-in" style=${{ fontSize: 10, fontWeight: 700, background: allDone ? T.greenDim : T.elevated, color: allDone ? T.green : T.accent }}>${doneSets}/${sets.length}</span>
            `}
          </div>
        </div>
        <${CaretDown} size=${16} weight="bold" color=${T.muted} style=${{ transition: 'transform 0.2s', transform: expanded ? 'rotate(180deg)' : 'none' }} />
      </div>

      ${expanded && html`
        <div className="slide-down" style=${{ padding: '12px 2px 0' }}>
          ${exercise.gif ? html`
            <div className="mb-3 flex justify-center" style=${{ position: 'relative' }}>
              <div className="skeleton-gif" style=${{ width: 200, height: 200, position: 'absolute' }} />
              <img src=${exercise.gif} alt=${exercise.name} loading="lazy"
                style=${{ height: 200, width: 200, objectFit: 'contain', display: 'block', position: 'relative', zIndex: 1 }}
                onLoad=${(e) => { const sk = e.target.previousElementSibling; if (sk) sk.style.display = 'none'; }}
                onError=${(e) => { e.target.style.display = 'none'; const sk = e.target.previousElementSibling; if (sk) sk.style.display = 'none'; }} />
            </div>
          ` : ''}
          <div className="mb-3">
            <p className="text-xs leading-relaxed mb-2" style=${{ color: T.sub }}>${exercise.desc}</p>
            <a href=${ytUrl}
              target="_blank" rel="noopener"
              className="flex items-center justify-center gap-2 text-xs font-semibold py-2.5 rounded-xl"
              style=${{ background: 'rgba(220,38,38,0.08)', color: '#dc2626', border: '1px solid rgba(220,38,38,0.15)' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#dc2626"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8z"/><polygon fill="#fff" points="9.75 15.02 15.5 12 9.75 8.98"/></svg>
              ${t('Ver tutorial en YouTube')}
            </a>
          </div>

          ${(() => {
            const hist = getExerciseHistory(index, getTodayKey(), 6);
            if (hist.length === 0) return '';
            const chartData = [...hist].reverse();
            const maxW = Math.max(...chartData.map(h => h.weight));
            const minW = Math.min(...chartData.map(h => h.weight));
            const range = maxW - minW || 1;
            return html`
              <div className="mb-3 rounded-xl overflow-hidden" style=${{ border: '1px solid ' + T.border }}>
                <div className="flex items-center gap-1.5 px-3 py-2" style=${{ background: T.elevated }}>
                  <${TrendUp} size=${12} weight="duotone" color=${T.muted} />
                  <span style=${{ fontSize: 11, fontWeight: 700, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.04em' }}>${t('Progreso')}</span>
                  <span className="ml-auto" style=${{ fontSize: 10, color: T.muted }}>${hist.length} ${t('sesiones')}</span>
                </div>
                ${chartData.length >= 2 ? html`
                  <div className="flex items-end gap-1 px-3 py-3" style=${{ height: 72 }}>
                    ${chartData.map((h, hi) => {
                      const pct = range > 0 ? 20 + ((h.weight - minW) / range) * 80 : 50;
                      const isLast = hi === chartData.length - 1;
                      return html`
                        <div key=${hi} className="flex-1 flex flex-col items-center gap-1" style=${{ height: '100%', justifyContent: 'flex-end' }}>
                          <span style=${{ fontSize: 8, fontWeight: 700, color: isLast ? T.accent : T.muted }}>${h.weight}</span>
                          <div style=${{ width: '100%', maxWidth: 28, height: pct + '%', minHeight: 4, borderRadius: 4,
                            background: isLast ? T.accent : T.elevated, transition: 'height 0.3s' }} />
                          <span style=${{ fontSize: 7, color: T.muted }}>${new Date(h.date + 'T12:00:00').toLocaleDateString(LANG === 'en' ? 'en' : 'es', { day: 'numeric', month: 'short' }).replace(' ', '')}</span>
                        </div>
                      `;
                    })}
                  </div>
                ` : ''}
                ${hist.slice(0, 3).map((h, hi) => html`
                  <div key=${hi} className="flex items-center px-3 py-2" style=${{ borderTop: '1px solid ' + T.border }}>
                    <span className="flex-1 text-xs" style=${{ color: T.sub }}>${new Date(h.date + 'T12:00:00').toLocaleDateString(LANG === 'en' ? 'en' : 'es', { day: 'numeric', month: 'short' })}</span>
                    <span className="text-xs font-mono font-semibold" style=${{ color: T.accent }}>${h.weight} ${unitPref}</span>
