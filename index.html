function SunburstView({ dark }) {
  const [mounted, setMounted] = useState(false);
  const [selGroup, setSelGroup] = useState(null);
  const [selMuscle, setSelMuscle] = useState(null);

  useEffect(() => { requestAnimationFrame(() => requestAnimationFrame(() => setMounted(true))); }, []);

  const data = useMemo(() => getWeeklySunburstData(), []);
  const { scores, daysHit, total, weekRange } = data;

  // Compute all derived data (must not be behind early return — hooks below)
  const computed = useMemo(() => {
    if (total === 0) return null;
    const groupData = SUNBURST_GROUPS.map(g => {
      const groupScore = g.muscles.reduce((sum, m) => sum + (scores[m.slug] || 0), 0);
      const groupDays = new Set();
      g.muscles.forEach(m => { if (daysHit[m.slug]) daysHit[m.slug].forEach(d => groupDays.add(d)); });
      const muscleData = g.muscles.map(m => {
        const sc = scores[m.slug] || 0;
        return { ...m, score: sc, pct: total > 0 ? Math.round(sc / total * 100) : 0, days: daysHit[m.slug] ? daysHit[m.slug].size : 0 };
      }).filter(m => m.score > 0);
      return { ...g, score: groupScore, pct: total > 0 ? Math.round(groupScore / total * 100) : 0, days: groupDays.size, muscleData };
    }).filter(g => g.score > 0);

    const svgSz = 260, cx = 130, cy = 130;
    const rInner = 55, swInner = 28, circInner = 2 * Math.PI * rInner;
    const rOuter = 88, swOuter = 18, circOuter = 2 * Math.PI * rOuter;
    const gapInner = 3, gapOuter = 2;

    const totalInnerGap = gapInner * groupData.length;
    const usableInner = circInner - totalInnerGap;
    let offsetInner = 0;
    const innerSegs = groupData.map(g => {
      const arcLen = (g.score / total) * usableInner;
      const seg = { ...g, arcLen, offset: offsetInner, type: 'group' };
      offsetInner += arcLen + gapInner;
      return seg;
    });

    const totalOuterGap = gapOuter * groupData.reduce((n, g) => n + g.muscleData.length, 0);
    const usableOuter = circOuter - totalOuterGap;
    let offsetOuter = 0;
    const outerSegs = [];
    groupData.forEach(g => {
      g.muscleData.forEach(m => {
        const arcLen = (m.score / total) * usableOuter;
        outerSegs.push({ ...m, groupId: g.id, groupColor: g.color, arcLen, offset: offsetOuter, type: 'muscle' });
        offsetOuter += arcLen + gapOuter;
      });
    });

    // Labels with collision detection
    const labelCandidates = outerSegs.filter(s => s.pct >= 8).map(s => {
      const midAngle = ((s.offset + s.arcLen / 2) / circOuter) * 360 - 90;
      const rad = midAngle * Math.PI / 180;
      const labelR = rOuter + swOuter / 2 + 22;
      const lx = cx + labelR * Math.cos(rad);
      const ly = cy + labelR * Math.sin(rad);
      return { ...s, x: lx, y: ly, angle: midAngle, rad };
    }).sort((a, b) => b.pct - a.pct);
    const labels = [];
    labelCandidates.forEach(lbl => {
      if (!labels.some(placed => Math.abs(placed.y - lbl.y) < 14)) labels.push(lbl);
    });

    return { groupData, innerSegs, outerSegs, labels, svgSz, cx, cy, rInner, swInner, circInner, rOuter, swOuter, circOuter };
  }, [total, scores, daysHit]);

  // Selected info — safe to call unconditionally
  const selInfo = useMemo(() => {
    if (!computed) return null;
    const { outerSegs, groupData } = computed;
    if (selMuscle) {
      const seg = outerSegs.find(s => s.slug === selMuscle);
      if (seg) return { name: LANG === 'en' ? seg.labelEn : seg.label, pct: seg.pct, score: seg.score, days: seg.days, color: seg.color, groupId: seg.groupId };
    }
    if (selGroup) {
      const g = groupData.find(g => g.id === selGroup);
      if (g) return { name: LANG === 'en' ? g.labelEn : g.label, pct: g.pct, score: g.score, days: g.days, color: g.color, muscleData: g.muscleData };
    }
    return null;
  }, [selGroup, selMuscle, computed]);

  function handleInnerClick(gId) { setSelGroup(selGroup === gId ? null : gId); setSelMuscle(null); }
  function handleOuterClick(slug, gId) { setSelMuscle(selMuscle === slug ? null : slug); setSelGroup(gId); }
  function handleCenterClick() { setSelGroup(null); setSelMuscle(null); }

  if (!computed) {
    return html`
      <div style=${{ textAlign: 'center', padding: '40px 20px', animation: 'fadeUp 0.35s ease' }}>
        <div style=${{ fontSize: 40, marginBottom: 12 }}>${'\uD83D\uDCCA'}</div>
        <div style=${{ fontSize: 13, color: T.muted }}>${t('Empieza a entrenar para ver tu analytics')}</div>
      </div>
    `;
  }

  const { groupData, innerSegs, outerSegs, labels, svgSz, cx, cy, rInner, swInner, circInner, rOuter, swOuter, circOuter } = computed;
  const centerText = selInfo ? selInfo.name : t('Semana');
  const centerPct = selInfo ? selInfo.pct + '%' : '100%';

  return html`
    <div style=${{ animation: 'fadeUp 0.35s ease' }}>
      <div style=${{ textAlign: 'center', marginBottom: 16 }}>
        <div style=${{ fontSize: 15, fontWeight: 800, color: T.text }}>${t('Volumen semanal')}</div>
        <div style=${{ fontSize: 11, color: T.muted, marginTop: 2 }}>${weekRange}</div>
      </div>

      <div className="flex justify-center" style=${{ marginBottom: 16 }}>
        <svg width=${svgSz} height=${svgSz} style=${{ transform: 'rotate(-90deg)' }}>
          <!-- Inner ring tracks -->
          ${innerSegs.map(s => html`
            <circle key=${'it-' + s.id} cx=${cx} cy=${cy} r=${rInner} fill="none"
              stroke=${s.color} strokeWidth=${swInner} opacity="0.1"
              strokeDasharray=${s.arcLen + ' ' + (circInner - s.arcLen)}
              strokeDashoffset=${-s.offset} />
          `)}
          <!-- Inner ring arcs -->
          ${innerSegs.map(s => {
            const isActive = selGroup === s.id || (!selGroup && !selMuscle);
            return html`
              <circle key=${'ia-' + s.id} cx=${cx} cy=${cy} r=${rInner} fill="none"
                stroke=${s.color} strokeWidth=${isActive ? swInner : swInner - 4}
                opacity=${isActive ? 1 : 0.35}
                strokeDasharray=${mounted ? (s.arcLen + ' ' + (circInner - s.arcLen)) : ('0 ' + circInner)}
                strokeDashoffset=${-s.offset}
                strokeLinecap="round" className="dual-ring-arc"
                style=${{ cursor: 'pointer' }}
                onClick=${() => handleInnerClick(s.id)} />
            `;
          })}
          <!-- Outer ring tracks -->
          ${outerSegs.map(s => html`
            <circle key=${'ot-' + s.slug} cx=${cx} cy=${cy} r=${rOuter} fill="none"
              stroke=${s.color} strokeWidth=${swOuter} opacity="0.08"
              strokeDasharray=${s.arcLen + ' ' + (circOuter - s.arcLen)}
              strokeDashoffset=${-s.offset} />
          `)}
          <!-- Outer ring arcs -->
          ${outerSegs.map(s => {
            const isActive = selMuscle === s.slug || selGroup === s.groupId || (!selGroup && !selMuscle);
            return html`
              <circle key=${'oa-' + s.slug} cx=${cx} cy=${cy} r=${rOuter} fill="none"
                stroke=${s.color} strokeWidth=${isActive ? swOuter : swOuter - 4}
                opacity=${isActive ? 1 : 0.25}
                strokeDasharray=${mounted ? (s.arcLen + ' ' + (circOuter - s.arcLen)) : ('0 ' + circOuter)}
                strokeDashoffset=${-s.offset}
                strokeLinecap="round" className="dual-ring-arc"
                style=${{ cursor: 'pointer' }}
                onClick=${() => handleOuterClick(s.slug, s.groupId)} />
            `;
          })}
          <!-- Center tap area -->
          <circle cx=${cx} cy=${cy} r=${rInner - swInner / 2 - 2} fill="transparent"
            style=${{ cursor: 'pointer' }} onClick=${handleCenterClick} />
          <!-- Center text (un-rotated) -->
          <g style=${{ transform: 'rotate(90deg)', transformOrigin: cx + 'px ' + cy + 'px' }}>
            <text x=${cx} y=${cy - 6} textAnchor="middle" fill=${T.text}
              style=${{ fontSize: 11, fontWeight: 700, fontFamily: "'Inter', system-ui, sans-serif" }}>${centerText}</text>
            <text x=${cx} y=${cy + 12} textAnchor="middle" fill=${T.muted}
              style=${{ fontSize: 18, fontWeight: 800, fontFamily: "'Inter', system-ui, sans-serif" }}>${centerPct}</text>
          </g>
          <!-- Labels with leader lines (un-rotated) -->
          <g style=${{ transform: 'rotate(90deg)', transformOrigin: cx + 'px ' + cy + 'px' }}>
            ${labels.map(lbl => {
              const edgeR = rOuter + swOuter / 2;
              const ex = cx + edgeR * Math.cos(lbl.rad);
              const ey = cy + edgeR * Math.sin(lbl.rad);
              const anchor = lbl.x > cx ? 'start' : 'end';
              return html`
                <g key=${'lbl-' + lbl.slug}>
                  <line x1=${ex} y1=${ey} x2=${lbl.x} y2=${lbl.y} stroke=${T.muted} strokeWidth="0.5" opacity="0.6" />
                  <text x=${lbl.x + (anchor === 'start' ? 4 : -4)} y=${lbl.y + 3} textAnchor=${anchor} fill=${T.sub}
                    style=${{ fontSize: 9, fontWeight: 600, fontFamily: "'Inter', system-ui, sans-serif" }}>
                    ${LANG === 'en' ? lbl.labelEn : lbl.label} ${lbl.pct}%
                  </text>
                </g>
              `;
            })}
          </g>
        </svg>
      </div>

      <!-- Legend -->
      <div className="flex gap-3 justify-center flex-wrap" style=${{ marginBottom: 12, paddingLeft: 8, paddingRight: 8 }}>
        ${groupData.map(g => html`
          <div key=${g.id} className="flex items-center gap-1" style=${{ cursor: 'pointer', flexShrink: 0 }}
            onClick=${() => handleInnerClick(g.id)}>
            <div style=${{ width: 8, height: 8, borderRadius: 4, background: g.color, flexShrink: 0 }} />
            <span style=${{ fontSize: 11, fontWeight: selGroup === g.id ? 800 : 600, color: selGroup === g.id ? T.text : T.sub, transition: 'all 0.2s' }}>
              ${LANG === 'en' ? g.labelEn : g.label} ${g.pct}%
            </span>
          </div>
        `)}
      </div>

      <!-- Info panel -->
      ${selInfo && html`
        <div style=${{ background: T.elevated, border: '1px solid ' + T.border, borderRadius: 12, padding: '12px 14px', animation: 'fadeUp 0.2s ease' }}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <div style=${{ width: 10, height: 10, borderRadius: 5, background: selInfo.color }} />
              <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${selInfo.name}</span>
            </div>
            <span style=${{ fontSize: 13, fontWeight: 800, color: selInfo.color }}>${selInfo.pct}%</span>
          </div>
          <div style=${{ fontSize: 11, color: T.muted, marginBottom: selInfo.muscleData ? 8 : 0 }}>
            ${selInfo.score} ${t('sets ponderados')} · ${selInfo.days} ${t('dias esta semana')}
          </div>
          ${selInfo.muscleData && selInfo.muscleData.length > 1 ? html`
            <div style=${{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 4, paddingTop: 8, borderTop: '1px solid ' + T.border }}>
              ${selInfo.muscleData.map(m => html`
                <div key=${m.slug} className="flex items-center gap-2">
                  <span style=${{ fontSize: 11, fontWeight: 600, color: T.sub, width: 90, flexShrink: 0 }}>${LANG === 'en' ? m.labelEn : m.label}</span>
                  <div style=${{ flex: 1, height: 4, borderRadius: 2, background: T.input }}>
                    <div style=${{ height: '100%', borderRadius: 2, background: m.color, width: (selInfo.score > 0 ? m.score / selInfo.score * 100 : 0) + '%', transition: 'width 0.3s' }} />
                  </div>
                  <span style=${{ fontSize: 10, fontWeight: 700, color: T.muted, width: 30, textAlign: 'right' }}>${m.pct}%</span>
                </div>
              `)}
            </div>
          ` : ''}
        </div>
      `}
    </div>
  `;
}

// ── Cuerpo Tab — Muscle Map ─────────────────────────────────────────
function CuerpoTab({ dark, onThemeToggle, onLangToggle }) {
  const [cuerpoView, setCuerpoView] = useState('mapa'); // 'mapa' | 'analytics'
  const [view, setView] = useState('front');
  const svgRef = useRef(null);
  const [selectedMuscle, setSelectedMuscle] = useState(null); // { slug, level }
  const [selectedDay, setSelectedDay] = useState(null); // null = today (real data), 0-6 = schedule view
  const [refreshKey, setRefreshKey] = useState(0);
  const [showMeasurements, setShowMeasurements] = useState(false);

  useEffect(() => { setRefreshKey(k => k + 1); }, []);

  const themeKey = dark ? 'dark' : 'light';
  const colors = MUSCLE_INTENSITY_COLORS[themeKey];
  const skinColor = MUSCLE_SKIN_COLORS[themeKey];
  const outlineColor = MUSCLE_OUTLINE_COLORS[themeKey];
  const strokeColor = MUSCLE_STROKE_COLORS[themeKey];
  const labels = LANG === 'en' ? MUSCLE_INTENSITY_LABELS_EN : MUSCLE_INTENSITY_LABELS;

  const intensity = useMemo(() => getAccumulatedMuscleIntensity(selectedDay), [refreshKey, selectedDay]);
  const weeklyStats = useMemo(() => getWeeklyMuscleStats(), [refreshKey]);
  const latestMeasurements = useMemo(() => {
    const log = getWeightLog();
    for (let i = log.length - 1; i >= 0; i--) {
      const e = log[i];
      if (e.cuello || e.pecho || e.brazo || e.cintura || e.cadera || e.muslo) return e;
    }
    return null;
  }, [refreshKey]);

  // Stat computations
  const daysSince = useMemo(() => getDaysSinceLastWorkout(), [refreshKey]);
  const freshGroups = useMemo(() => {
    const allSlugs = new Set();
    [...MUSCLE_BODY_FRONT, ...MUSCLE_BODY_BACK].forEach(m => { if (!MUSCLE_SKIN_SLUGS.has(m.slug)) allSlugs.add(m.slug); });
    let fresh = 0;
    allSlugs.forEach(s => { if (!intensity[s]) fresh++; });
    return fresh;
  }, [intensity]);
  const totalGroups = useMemo(() => {
    const s = new Set();
    [...MUSCLE_BODY_FRONT, ...MUSCLE_BODY_BACK].forEach(m => { if (!MUSCLE_SKIN_SLUGS.has(m.slug)) s.add(m.slug); });
    return s.size;
  }, []);

  // Day selector data
  const weekDayKeys = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const dayLabelsShort = LANG === 'en' ? ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] : ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
  const todayWeekIdx = useMemo(() => { const jsDay = new Date().getDay(); return jsDay === 0 ? 6 : jsDay - 1; }, []);

  // SVG rendering
  useEffect(() => {
    const svg = svgRef.current;
    if (!svg) return;
    svg.innerHTML = '';
    const isFront = view === 'front';
    const outlinePath = isFront ? MUSCLE_OUTLINE_FRONT : MUSCLE_OUTLINE_BACK;
    const muscles = isFront ? MUSCLE_BODY_FRONT : MUSCLE_BODY_BACK;
    if (outlinePath) {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', outlinePath);
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', outlineColor);
      p.setAttribute('stroke-width', '2');
      svg.appendChild(p);
    }
    muscles.forEach(m => {
      const isSkin = MUSCLE_SKIN_SLUGS.has(m.slug);
      const level = intensity[m.slug] || 0;
      const color = isSkin ? skinColor : colors[level];
      const allPaths = [];
      if (m.path.common) allPaths.push(...m.path.common);
      if (m.path.left)   allPaths.push(...m.path.left);
      if (m.path.right)  allPaths.push(...m.path.right);
      allPaths.forEach(d => {
        const p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', d);
        p.setAttribute('fill', color);
        p.setAttribute('stroke', strokeColor);
        p.setAttribute('stroke-width', '1');
        p.style.cursor = 'pointer';
        p.style.transition = 'fill 0.4s ease';
        p.dataset.muscle = m.slug;
        p.dataset.level = isSkin ? '' : String(level);
        const handleSelect = () => {
          if (isSkin) { setSelectedMuscle(null); return; }
          setSelectedMuscle({ slug: m.slug, level });
        };
        p.addEventListener('mouseenter', handleSelect);
        p.addEventListener('touchstart', handleSelect, {passive:true});
        p.addEventListener('mouseleave', () => setSelectedMuscle(null));
        svg.appendChild(p);
      });
    });
  }, [view, themeKey, refreshKey, selectedDay]);

  // Muscle info panel data
  const muscleInfo = useMemo(() => {
    if (!selectedMuscle) return null;
    const { slug, level } = selectedMuscle;
    const name = slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const lastDay = getLastDayForMuscle(slug);
    let lastLabel = t('Sin actividad reciente');
    if (lastDay) {
      const dlKey = lastDay.dayKey;
      lastLabel = LANG === 'en' ? (DAY_LABELS[dlKey] || dlKey).replace(/^./, c => c.toUpperCase()) : (DAY_LABELS[dlKey] || dlKey);
      // Translate day name for EN
      if (LANG === 'en') lastLabel = t(lastLabel);
    }
    const wv = weeklyStats.volume[slug] || 0;
    const wf = weeklyStats.frequency[slug] || 0;
    const target = MUSCLE_WEEKLY_TARGETS[slug] || [8,15];
    return { name, level, levelLabel: labels[level] || '', lastLabel, color: colors[level], weeklyVolume: wv, weeklyFrequency: wf, target };
  }, [selectedMuscle, themeKey, weeklyStats]);

  const pillStyle = (active) => ({
    padding: '6px 20px', borderRadius: 8, fontSize: 13, fontWeight: 700,
    border: 'none', cursor: 'pointer', transition: 'all 0.2s',
    background: active ? T.accent : T.input,
    color: active ? '#fff' : T.muted,
  });

  const dayPillStyle = (idx) => {
    const isActive = selectedDay === null ? idx === todayWeekIdx : idx === selectedDay;
    const isRest = ROUTINES[weekDayKeys[idx]] && ROUTINES[weekDayKeys[idx]].rest;
    return {
      padding: '5px 12px', borderRadius: 8, fontSize: 12, fontWeight: 600,
      border: 'none', cursor: 'pointer', transition: 'all 0.2s', flexShrink: 0,
      background: isActive ? T.accent : T.input,
      color: isActive ? '#fff' : (isRest ? T.muted : T.sub),
    };
  };

  function handleDaySelect(idx) {
    if ((selectedDay === null && idx === todayWeekIdx) || selectedDay === idx) {
      setSelectedDay(null); // back to real data
    } else {
      setSelectedDay(idx);
    }
    setSelectedMuscle(null);
  }

  // "Days since" label
  const daysSinceLabel = useMemo(() => {
    if (daysSince === 0) return LANG === 'en' ? 'Today' : 'Hoy';
    if (daysSince === 1) return LANG === 'en' ? 'Yesterday' : 'Ayer';
    if (daysSince < 0) return '—';
    return daysSince + ' ' + t('dias');
  }, [daysSince]);

  const legendItems = [
    { level: 3, label: t('Primario') },
    { level: 2, label: t('Secundario') },
    { level: 1, label: t('Terciario') },
    { level: 0, label: t('Recuperado') },
  ];
  const viewBox = view === 'front' ? '0 0 724 1448' : '724 0 724 1448';

  const statBox = { padding: '12px 14px', borderRadius: 14, background: T.card, boxShadow: 'var(--ds-card-shadow)', textAlign: 'center' };

  return html`
    <div className="tab-content" style=${{ animation: 'fadeUp 0.35s ease' }}>
      <div className="flex items-center justify-between mb-3 px-1">
        <h2 style=${{ fontSize: 20, fontWeight: 800, color: T.text }}>${t('Cuerpo')}</h2>
        <div className="flex items-center gap-2">
          <${LangToggle} onToggle=${onLangToggle} />
          <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />
        </div>
      </div>

      <!-- Stat boxes -->
      <div className="grid grid-cols-2 gap-3 mb-3">
        <div style=${statBox}>
          <div style=${{ fontSize: 22, fontWeight: 900, color: T.amber, lineHeight: 1.1 }}>${daysSinceLabel}</div>
          <div style=${{ fontSize: 10, fontWeight: 600, color: T.muted, marginTop: 4 }}>${t('desde ultimo entreno')}</div>
        </div>
        <div style=${statBox}>
          <div style=${{ fontSize: 22, fontWeight: 900, color: T.green, lineHeight: 1.1 }}>${freshGroups}<span style=${{ fontSize: 13, fontWeight: 600, color: T.muted }}>/${totalGroups}</span></div>
          <div style=${{ fontSize: 10, fontWeight: 600, color: T.muted, marginTop: 4 }}>${t('grupos frescos')}</div>
        </div>
      </div>

      <!-- Segmented control: Mapa / Analytics -->
      <div className="flex justify-center mb-3">
        <div style=${{ display: 'inline-flex', borderRadius: 10, overflow: 'hidden', border: '1px solid ' + T.border }}>
          <button onClick=${() => setCuerpoView('mapa')} style=${{
            padding: '7px 20px', fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer',
            fontFamily: "'Inter', system-ui, sans-serif",
            background: cuerpoView === 'mapa' ? T.accent : T.card,
            color: cuerpoView === 'mapa' ? '#fff' : T.muted,
            transition: 'all 0.2s',
          }}>${t('Mapa')}</button>
          <button onClick=${() => setCuerpoView('analytics')} style=${{
            padding: '7px 20px', fontSize: 12, fontWeight: 700, border: 'none', cursor: 'pointer',
            fontFamily: "'Inter', system-ui, sans-serif",
            background: cuerpoView === 'analytics' ? T.accent : T.card,
            color: cuerpoView === 'analytics' ? '#fff' : T.muted,
            transition: 'all 0.2s',
          }}>${t('Analytics')}</button>
        </div>
      </div>

      ${cuerpoView === 'mapa' && html`
      <div className="ds-card" style=${{ padding: 20, background: T.card, borderRadius: 16 }}>
        <!-- Day selector -->
        <div className="flex gap-1 justify-center mb-3" style=${{ overflowX: 'auto', WebkitOverflowScrolling: 'touch', paddingBottom: 2 }}>
          ${dayLabelsShort.map((label, idx) => html`
            <button key=${idx} style=${dayPillStyle(idx)} onClick=${() => handleDaySelect(idx)}>${label}</button>
          `)}
        </div>
        ${selectedDay !== null && html`
          <div style=${{ textAlign: 'center', fontSize: 10, color: T.muted, marginBottom: 8 }}>
            ${LANG === 'en' ? 'Viewing schedule' : 'Vista del horario'}${' '}—${' '}
            <span style=${{ cursor: 'pointer', color: T.accent, textDecoration: 'underline' }} onClick=${() => { setSelectedDay(null); setSelectedMuscle(null); }}>${LANG === 'en' ? 'back to real data' : 'volver a datos reales'}</span>
          </div>
        `}

        <!-- Front/Back toggle -->
        <div className="flex justify-center gap-2 mb-4">
          <button style=${pillStyle(view === 'front')} onClick=${() => { setView('front'); setSelectedMuscle(null); }}>${t('Frontal')}</button>
          <button style=${pillStyle(view === 'back')} onClick=${() => { setView('back'); setSelectedMuscle(null); }}>${t('Posterior')}</button>
        </div>

        <!-- SVG Body -->
        <div className="flex justify-center">
          <svg ref=${svgRef} width="240" height="480" viewBox=${viewBox}
            style=${{ maxWidth: '100%', height: 'auto' }} />
        </div>

        <!-- Muscle info panel -->
        <div style=${{ minHeight: 60, marginTop: 12 }}>
          ${muscleInfo ? html`
            <div style=${{ background: T.elevated, border: '1px solid ' + T.border, borderRadius: 12, padding: '10px 14px', transition: 'all 0.2s', animation: 'fadeUp 0.2s ease' }}>
              <div className="flex items-center justify-between mb-1">
                <span style=${{ fontSize: 14, fontWeight: 700, color: T.text }}>${muscleInfo.name}</span>
                <span style=${{ fontSize: 11, fontWeight: 600, color: muscleInfo.color }}>${muscleInfo.levelLabel}</span>
              </div>
              <div style=${{ height: 4, borderRadius: 2, background: T.input, marginBottom: 6 }}>
                <div style=${{ height: '100%', borderRadius: 2, background: muscleInfo.color, width: (muscleInfo.level / 3 * 100) + '%', transition: 'width 0.3s ease' }} />
              </div>
              <div className="flex items-center justify-between">
                <span style=${{ fontSize: 10, color: T.muted }}>${t('Ultimo entreno')}</span>
                <span style=${{ fontSize: 11, fontWeight: 600, color: T.sub }}>${muscleInfo.lastLabel}</span>
              </div>
              <div style=${{ marginTop: 8, paddingTop: 8, borderTop: '1px solid ' + T.border }}>
                <div className="flex items-center justify-between mb-1">
                  <span style=${{ fontSize: 10, color: T.muted }}>${t('Volumen semanal')}</span>
                  <span style=${{ fontSize: 11, fontWeight: 700, color: muscleInfo.weeklyVolume >= muscleInfo.target[0] ? T.green : T.amber }}>
                    ${muscleInfo.weeklyVolume % 1 === 0 ? muscleInfo.weeklyVolume : muscleInfo.weeklyVolume.toFixed(1)} sets
                  </span>
                </div>
                <div style=${{ height: 4, borderRadius: 2, background: T.input }}>
                  <div style=${{ height: '100%', borderRadius: 2, background: muscleInfo.weeklyVolume >= muscleInfo.target[0] ? T.green : T.amber, width: Math.min(100, (muscleInfo.weeklyVolume / muscleInfo.target[1]) * 100) + '%', transition: 'width 0.3s ease' }} />
                </div>
                <div className="flex items-center justify-between" style=${{ marginTop: 3 }}>
                  <span style=${{ fontSize: 9, color: T.muted }}>${t('Optimo')}: ${muscleInfo.target[0]}-${muscleInfo.target[1]} sets</span>
                  <span style=${{ fontSize: 10, fontWeight: 700, color: muscleInfo.weeklyFrequency >= 2 ? T.green : T.amber }}>
                    ${muscleInfo.weeklyFrequency}x ${t('esta semana')}
                  </span>
                </div>
              </div>
            </div>
          ` : html`
            <div className="flex flex-col items-center gap-1" style=${{ paddingTop: 12 }}>
              <${Lightbulb} size=${18} weight="fill" color=${T.amber} />
              <div style=${{ fontSize: 12, color: T.muted, textAlign: 'center', lineHeight: 1.4 }}>
                ${LANG === 'en' ? 'Tap a muscle to see its status and last workout' : 'Toca un musculo para ver su estado y ultimo entreno'}
              </div>
            </div>
          `}
        </div>

        <!-- Legend -->
        <div className="flex flex-wrap justify-center gap-3" style=${{ marginTop: 14 }}>
          ${legendItems.map(item => html`
            <div key=${item.level} className="flex items-center gap-1" style=${{ fontSize: 11, fontWeight: 600, color: T.sub }}>
              <div style=${{ width: 12, height: 12, borderRadius: 3, background: colors[item.level], border: '1px solid ' + outlineColor }} />
              <span>${item.label}</span>
            </div>
          `)}
        </div>

        <!-- Info text -->
        <div style=${{ textAlign: 'center', marginTop: 12, fontSize: 11, color: T.muted }}>
          ${t('Los musculos se recuperan gradualmente en ~3 dias')}
        </div>
      </div>
      `}

                  const goodDir = bp.key === 'cintura' || bp.key === 'cadera' ? -1 : 1;
                  const deltaColor = delta && delta * goodDir > 0 ? T.green : delta && delta * goodDir < 0 ? T.amber : T.muted;

                      <div style=${{ fontSize: 9, color: T.muted }}> cm</div>
                      ${delta !== null && delta !== 0 ? html`

                      ` : ''}

                })}

              <div style=${{ textAlign: 'center', marginTop: 8, fontSize: 10, color: T.muted }}>

}

function PerfilTab({ dark, onThemeToggle, onLangToggle, unitPref, onUnitToggle }) {
  const date = localDate();

  const [name, setName] = useState(() => {
    try { return localStorage.getItem('ds_profile_name') || 'Felipe'; } catch { return 'Felipe'; }
  });
  const [editingName, setEditingName] = useState(false);
  const [nameInput, setNameInput] = useState(name);

  const [waterUnit, setWaterUnit] = useState(() => {
    try { return localStorage.getItem('ds_unit_water') || 'ml'; } catch { return 'ml'; }
  });

  const handleExportJSON = useCallback(() => {
    const data = {};
    Object.keys(localStorage).filter(k => k.startsWith('ds_')).forEach(k => { data[k] = localStorage.getItem(k); });
    const backup = { version: 1, exportedAt: new Date().toISOString(), app: 'DontSkip', data };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dontskip-backup-' + localDate() + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }, []);

  const handleImportJSON = useCallback(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backup = JSON.parse(ev.target.result);
          if (!backup.version || !backup.data || typeof backup.data !== 'object') {
            alert(t('Archivo inválido. Debe ser un backup de DontSkip con version y data.'));
            return;
          }
          const keys = Object.keys(backup.data);
          const msg = LANG === 'en'
            ? keys.length + ' keys will be imported. This will overwrite your current data. Continue?'
            : 'Se importarán ' + keys.length + ' keys. Esto sobreescribirá tus datos actuales. ¿Continuar?';
          if (!confirm(msg)) return;
          keys.forEach(k => localStorage.setItem(k, backup.data[k]));
          alert(t('Datos importados correctamente'));
          location.reload();
        } catch { alert(t('Archivo inválido. Debe ser un backup de DontSkip con version y data.')); }
      };
      reader.readAsText(file);
    };
    input.click();
  }, []);

  const handleFactoryReset = useCallback(() => {
    if (!confirm(t('¿Estás seguro? Se borrarán entrenamientos, comidas, agua, récords, fotos y notas.'))) return;
    const keep = ['ds_theme','ds_lang','ds_unit_pref','ds_goal_protein','ds_goal_calories','ds_goal_water_ml'];
    Object.keys(localStorage).filter(k => k.startsWith('ds_') && !keep.includes(k)).forEach(k => localStorage.removeItem(k));
    sessionStorage.clear();
    alert(t('Datos eliminados'));
    location.reload();
  }, []);

  const [expandedSuppInfo, setExpandedSuppInfo] = useState(null);

  const [notes, setNotes] = useState(() => {
    try { return localStorage.getItem('ds_notes') || ''; } catch { return ''; }
  });
  const notesTimer = useRef(null);
  function handleNotesChange(e) {
    const v = e.target.value;
    setNotes(v);
    clearTimeout(notesTimer.current);
    notesTimer.current = setTimeout(() => {
      try { localStorage.setItem('ds_notes', v); } catch {}
    }, 400);
  }

  const initWeight = (() => {
    const log = getWeightLog();
    return log.length ? log[log.length - 1].kg : 72;
  })();
  const [currentWeight, setCurrentWeight] = useState(initWeight);
  const [editingWeight, setEditingWeight] = useState(false);
  const [weightInput, setWeightInput] = useState(String(initWeight));

  function saveWeight() {
    const val = parseFloat(weightInput);
    if (isNaN(val) || val <= 0) return;
    setCurrentWeight(val);
    setEditingWeight(false);
    saveWeightEntry({ date: localDate(), kg: val });
  }

  const initHeight = (() => {
    try { return parseFloat(localStorage.getItem('ds_height_cm')) || 174; } catch { return 174; }
  })();
  const [heightCm, setHeightCm] = useState(initHeight);
  const [editingHeight, setEditingHeight] = useState(false);
  const [heightInput, setHeightInput] = useState(String(initHeight));

  function saveHeight() {
    const val = parseFloat(heightInput);
    if (isNaN(val) || val <= 0) return;
    setHeightCm(val);
    setEditingHeight(false);
    try { localStorage.setItem('ds_height_cm', String(val)); } catch {}
  }

  function formatHeight(cm) {
    if (unitPref === 'lbs') {
      const totalIn = cm / 2.54;
      const ft = Math.floor(totalIn / 12);
      const inches = Math.round(totalIn % 12);
      return ft + "'" + inches + '"';
    }
    return (cm / 100).toFixed(2) + 'm';
  }

  function formatWeightDisplay(kg) {

function getRecentFoods() {
  const foods = new Map();
  const today = new Date();
  for (let d = 0; d < 7; d++) {
    const dt = new Date(today);
    dt.setDate(dt.getDate() - d);
    const key = 'ds_meals_' + localDate(dt);
    try {
      const mealsData = JSON.parse(localStorage.getItem(key) || '[]');
      mealsData.forEach(m => {
        if (m.confirmed) m.items.forEach(item => {
          if (!foods.has(item.name)) {
            foods.set(item.name, {
              id: 'recent_' + foods.size,
              name: item.name,
              icon: item.icon || foodIcon(item.name),
              portion: '1 porción',
              protein: item.protein || 0,
              cal: item.cal || 0,
              carbs: item.carbs || 0,
              fat: item.fat || 0,
            });
          }
        });
      });
    } catch {}
  }
  return Array.from(foods.values());
}


// ── Food Verifier ──────────────────────────────────────────────────────

function FoodVerifier({ consumedCal, consumedProtein, foodLibrary }) {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);

  function handleVerify() {
    if (!query.trim()) return;
    const q = query.toLowerCase().trim();

    // Try to parse quantity (e.g., "2 slices de pizza", "3 huevos")
    const qtyMatch = q.match(/^(\d+)\s*(slices?|rebanadas?|porciones?|unidades?|latas?|scoops?|tazas?|barras?)?\s*(de\s+)?(.+)$/);
    let qty = 1;
    let searchTerm = q;
    if (qtyMatch) {
      qty = parseInt(qtyMatch[1]);
      searchTerm = qtyMatch[4] || q;
    }

    // Search in library
    const match = foodLibrary.find(f => {
      const fname = f.name.toLowerCase();
      return fname.includes(searchTerm) || searchTerm.includes(fname.split(' ')[0]);
    });

    if (!match) {
      setResult({ type: 'not_found' });
      return;
    }

    const addedCal = match.cal * qty;
    const addedProtein = match.protein * qty;
    const totalCal = consumedCal + addedCal;
    const totalProtein = consumedProtein + addedProtein;
    const remainingCal = CALORIES_GOAL - totalCal;
    const remainingProtein = PROTEIN_GOAL - totalProtein;

    let type = 'green';
    let message = '';

    if (totalCal <= CALORIES_GOAL && totalProtein >= 0) {
      type = 'green';
      message = t('Te quedan') + ' ' + Math.max(0, remainingCal) + ' ' + t('kcal y necesitas') + ' ' + Math.max(0, remainingProtein) + 'g ' + t('de proteína hoy.');
    } else if (totalCal <= CALORIES_GOAL * 1.1) {
      type = 'yellow';
      message = t('Puedes, pero estarías cerca del límite. Compensa en tu próxima comida con algo más ligero.');
    } else {
      type = 'red';
      message = t('Superarías tu meta por') + ' ' + Math.abs(remainingCal) + ' ' + t('kcal. Considera una porción más pequeña.');
    }

    setResult({ type, match, qty, addedCal, addedProtein, message });
  }

  const colors = { green: { bg: T.greenDim, border: T.greenDim, text: T.green, icon: '\u2705' },
    yellow: { bg: T.amberDim, border: T.amberDim, text: T.amber, icon: '\u26A0\uFE0F' },
    red: { bg: T.redDim, border: T.redDim, text: T.red, icon: '\u274C' },
  };

  return html`
    <div className="ds-card fade-up" style=${{ padding: 20, marginBottom: 12 }}>
      <div className="flex items-center gap-2 mb-3">
        <span className="text-lg">\uD83E\uDD14</span>
        <span className="font-bold" style=${{ color: T.text }}>${t('¿Puedo comer esto?')}</span>
      </div>
      <div className="flex gap-2 mb-3">
        <input type="text" value=${query} onChange=${e => setQuery(e.target.value)}
          onKeyDown=${e => e.key === 'Enter' && handleVerify()}
          placeholder=${t('Ej: 2 slices de pizza')}
          className="flex-1 text-sm rounded-xl py-2.5 px-4"
          style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
        <button onClick=${handleVerify}
          className="px-4 py-2.5 rounded-xl text-sm font-bold flex-shrink-0"
          style=${{ background: T.accent, color: T.bg }}>
          ${t('Verificar')}
        </button>
      </div>

      ${result && result.type === 'not_found' && html`
        <div className="rounded-xl p-4 text-sm" style=${{ background: T.elevated, border: '1px solid ' + T.border }}>
          <div className="flex items-start gap-2">
            <span className="text-lg flex-shrink-0">\uD83D\uDCA1</span>
            <div>
              <div className="font-semibold mb-1" style=${{ color: T.text }}>${t('No tengo ese alimento en tu biblioteca')}</div>
              <div className="text-xs leading-relaxed" style=${{ color: T.sub }}>${t('Puedes añadirlo manualmente en "Mi Biblioteca", o en una próxima versión Jarvis podrá calcularlo automáticamente.')}</div>
            </div>
          </div>
        </div>
      `}

      ${result && result.type !== 'not_found' && html`
        <div className="rounded-xl p-4" style=${{ background: colors[result.type].bg, border: '1px solid ' + colors[result.type].border }}>
          <div className="flex items-center gap-2 mb-2">
            <span>${colors[result.type].icon}</span>
            ${result.match.icon && html`<span style=${{ fontSize: 16 }}>${result.match.icon}</span>`}
            <span className="font-bold text-sm" style=${{ color: colors[result.type].text }}>
              ${result.qty > 1 ? result.qty + 'x ' : ''}${result.match.name}
            </span>
          </div>
          <div className="flex gap-4 mb-2 text-xs">
            <span style=${{ color: colors[result.type].text }}>+${result.addedCal} kcal</span>
            <span style=${{ color: colors[result.type].text }}>+${result.addedProtein}g ${t('proteína')}</span>
          </div>
          <div className="text-xs leading-relaxed" style=${{ color: colors[result.type].text, opacity: 0.85 }}>${result.message}</div>
        </div>
      `}
    </div>
  `;
}

function FoodLibrary({ foodLibrary, onAddFood }) {
  const [search, setSearch] = useState('');
  const [adding, setAdding] = useState(false);
  const [newFood, setNewFood] = useState({ name: '', portion: '', protein: '', cal: '' });

  const filtered = search
    ? foodLibrary.filter(f => f.name.toLowerCase().includes(search.toLowerCase()))
    : foodLibrary;

  function handleAdd() {
    if (!newFood.name || !newFood.cal) return;
    onAddFood({
      id: 'custom_' + Date.now(),
      name: newFood.name,
      portion: newFood.portion || '1 porción',
      protein: Number(newFood.protein) || 0,
      cal: Number(newFood.cal) || 0,
    });
    setNewFood({ name: '', portion: '', protein: '', cal: '' });
    setAdding(false);
  }

  return html`
    <div className="stagger">
      <!-- Search -->
      <div className="ds-card p-4 mb-3 fade-up">
        <div className="flex items-center gap-2 rounded-xl px-3 py-2.5"
          style=${{ background: T.elevated, border: '1px solid ' + T.border }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke=${T.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" value=${search} onChange=${e => setSearch(e.target.value)}
            placeholder=${t('Buscar alimento...')}
            className="flex-1 text-sm outline-none bg-transparent" />
        </div>
      </div>

      <!-- Food list -->
      <div className="ds-card overflow-hidden mb-3 fade-up">
        ${filtered.map((food, i) => html`
          <div key=${food.id} className="flex items-center justify-between px-5 py-3"
            style=${{ borderBottom: i < filtered.length - 1 ? '1px solid ' + T.border : 'none' }}>
            <div className="flex items-center gap-2 flex-1 min-w-0 mr-3">
              <span style=${{ fontSize: 18, flexShrink: 0 }}>${food.icon || '🍽️'}</span>
              <div className="min-w-0">
                <div className="text-sm font-semibold truncate" style=${{ color: T.text }}>${food.name}</div>
                <div className="text-xs" style=${{ color: T.muted }}>${food.portion}</div>
              </div>
            </div>
            <div className="flex items-center gap-4 flex-shrink-0">
              <div className="text-right">
                <div className="text-sm font-bold" style=${{ color: T.accent }}>${food.protein}g</div>
                <div style=${{ fontSize: 9, color: T.muted }}>${t('proteína')}</div>
              </div>
              <div className="text-right">
                <div className="text-sm font-bold" style=${{ color: T.amber }}>${food.cal}</div>
                <div style=${{ fontSize: 9, color: T.muted }}>kcal</div>
              </div>
            </div>
          </div>
        `)}
        ${filtered.length === 0 && html`
          <div className="text-center py-8 text-sm " style=${{ color: T.muted }}>${t('No se encontraron alimentos')}</div>
        `}
      </div>

      <!-- Add food -->
      ${!adding ? html`
        <button onClick=${() => setAdding(true)}
          className="ds-card w-full p-4 mb-3 text-sm font-bold text-center fade-up"
          style=${{ color: T.accent, border: '1px dashed ' + T.accentDim, background: T.accentDim }}>
          + ${t('Agregar alimento')}
        </button>
      ` : html`
        <div className="ds-card fade-up" style=${{ padding: 20, marginBottom: 12 }}>
          <div className="font-bold text-sm mb-3" style=${{ color: T.text }}>${t('Nuevo alimento')}</div>
          <div className="space-y-2 mb-4">
            <input type="text" value=${newFood.name} onChange=${e => setNewFood({ ...newFood, name: e.target.value })}
              placeholder=${t('Nombre del alimento')}
              className="w-full text-sm rounded-xl py-2.5 px-4 outline-none"
              style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
            <input type="text" value=${newFood.portion} onChange=${e => setNewFood({ ...newFood, portion: e.target.value })}
              placeholder=${t('Porción (ej: 100g, 1 unidad)')}
              className="w-full text-sm rounded-xl py-2.5 px-4 outline-none"
              style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
            <div className="flex gap-2">
              <input type="number" value=${newFood.protein} onChange=${e => setNewFood({ ...newFood, protein: e.target.value })}
                placeholder=${t('Proteína (g)')}
                className="flex-1 text-sm rounded-xl py-2.5 px-4 outline-none"
                style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
              <input type="number" value=${newFood.cal} onChange=${e => setNewFood({ ...newFood, cal: e.target.value })}
                placeholder=${t('Calorías')}
                className="flex-1 text-sm rounded-xl py-2.5 px-4 outline-none"
                style=${{ background: T.elevated, border: '1px solid ' + T.border, color: T.text }} />
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick=${handleAdd}
              className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white"
              style=${{ background: T.accent, color: T.bg }}>
              ${t('Guardar')}
            </button>
            <button onClick=${() => setAdding(false)}
              className="py-2.5 px-4 rounded-xl text-sm font-semibold"
              style=${{ background: T.accentDim, color: T.accent }}>
              ${t('Cancelar')}
            </button>
          </div>
        </div>
      `}
    </div>
  `;
}

function MealEditorModal({ visible, category, initialItems, foodLibrary, onSave, onClose, onAddFood, templates, onDeleteTemplate }) {
  const [selected, setSelected] = useState([]);
  const [query, setQuery] = useState('');
  const [qtyPick, setQtyPick] = useState(null);
  const [showCustom, setShowCustom] = useState(false);
  const [customEmoji, setCustomEmoji] = useState('\u{1F37D}\uFE0F');
  const [customName, setCustomName] = useState('');
  const [customPortion, setCustomPortion] = useState('');
  const [customCal, setCustomCal] = useState('');
  const [customProtein, setCustomProtein] = useState('');
  const [foodTab, setFoodTab] = useState('library');

  const recentFoods = useMemo(() => visible ? getRecentFoods() : [], [visible]);

  useEffect(() => {
    if (visible) {
      setSelected(initialItems ? initialItems.map(it => ({ ...it })) : []);
      setQuery(''); setQtyPick(null); setShowCustom(false); setFoodTab('library');
      setCustomEmoji('\u{1F37D}\uFE0F'); setCustomName(''); setCustomPortion(''); setCustomCal(''); setCustomProtein('');
    }
  }, [visible]);

  if (!visible) return null;

  const currentList = foodTab === 'recent' ? recentFoods : foodLibrary;
  const filtered = query.trim() ? currentList.filter(f => f.name.toLowerCase().includes(query.toLowerCase().trim())) : currentList;
  const totalCal = selected.reduce((s, i) => s + (i.cal || 0), 0);
  const totalP = selected.reduce((s, i) => s + (i.protein || 0), 0);
  const qtyOptions = [0.5, 1, 1.5, 2, 3];

  function addItem(food, qty) {
    const cal = Math.round(food.cal * qty);
    const protein = Math.round(food.protein * qty);
    const carbs = Math.round((food.carbs || 0) * qty);
    const fat = Math.round((food.fat || 0) * qty);
    const label = qty === 1 ? food.name : food.name + ' (x' + qty + ')';
    const icon = food.icon || foodIcon(food.name);
    setSelected(prev => [...prev, { name: label, icon, cal, protein, carbs, fat }]);
    setQtyPick(null);
  }
  function removeItem(idx) { setSelected(prev => prev.filter((_, i) => i !== idx)); }

  function handleAddCustom() {
    const n = customName.trim();
    const p = customPortion.trim() || '1 porci\u00F3n';
    const cal = parseInt(customCal) || 0;
    const protein = parseInt(customProtein) || 0;
    if (!n || cal <= 0) return;
    const food = { id: 'custom_' + Date.now(), icon: customEmoji, name: n, portion: p, protein, cal, carbs: 0, fat: 0 };
    if (onAddFood) onAddFood(food);
    setSelected(prev => [...prev, { name: n, icon: customEmoji, cal, protein, carbs: 0, fat: 0 }]);
    setShowCustom(false);
    setCustomEmoji('\u{1F37D}\uFE0F'); setCustomName(''); setCustomPortion(''); setCustomCal(''); setCustomProtein('');
  }

  function handleUseTemplate(tpl) {
    setSelected(prev => [...prev, ...tpl.items.map(it => ({ ...it, icon: it.icon || foodIcon(it.name) }))]);
  }

  return html`
    <div style=${{ position: 'fixed', inset: 0, zIndex: 9000, background: T.bg, display: 'flex', flexDirection: 'column', paddingTop: 'var(--safe-top)' }} className="fade-up">

      <div style=${{ padding: '14px 20px', borderBottom: '1px solid ' + T.border, flexShrink: 0 }}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <span style=${{ fontSize: 22 }}>${category?.icon || '\u{1F37D}\uFE0F'}</span>
            <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 20, fontWeight: 800, letterSpacing: '-0.5px', color: T.text }}>${LANG === 'en' ? (category?.nameEn || category?.name) : category?.name}</span>
          </div>
          <button onClick=${onClose} className="press-scale"
            style=${{ width: 36, height: 36, borderRadius: 12, background: T.input, border: '1px solid ' + T.border, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke=${T.sub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div style=${{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>

        ${selected.length > 0 && html`
          <div style=${{ padding: '12px 20px 0' }}>
            <div className="text-xs font-bold mb-2" style=${{ color: T.sub }}>${t('Tu comida')}</div>
            <div className="rounded-xl overflow-hidden" style=${{ border: '1px solid ' + T.border }}>
              ${selected.map((item, i) => html`
                <div key=${i} className="flex items-center py-2.5 px-3"
                  style=${{ borderTop: i > 0 ? '1px solid ' + T.border : 'none' }}>
                  <span style=${{ fontSize: 15, marginRight: 8, flexShrink: 0 }}>${item.icon || foodIcon(item.name)}</span>
                  <span className="flex-1 text-xs truncate mr-2" style=${{ color: T.text, fontWeight: 600 }}>${item.name}</span>
                  <span className="text-xs font-mono font-bold" style=${{ color: T.accent, width: 36, textAlign: 'right' }}>${item.protein}g</span>
                  <span className="text-xs font-mono" style=${{ color: T.muted, width: 42, textAlign: 'right' }}>${item.cal}</span>
                  <button onClick=${() => removeItem(i)} className="ml-2 press-scale" style=${{ color: T.red, padding: 4, flexShrink: 0 }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              `)}
              <div className="flex items-center py-2.5 px-3" style=${{ background: T.input, borderTop: '1px solid ' + T.border }}>
                <span style=${{ fontSize: 15, marginRight: 8 }}>\u{1F4CA}</span>
                <span className="flex-1 text-xs font-bold" style=${{ color: T.text }}>${t('Total')}</span>
                <span className="text-xs font-mono font-bold" style=${{ color: T.accent, width: 36, textAlign: 'right' }}>${totalP}g</span>
                <span className="text-xs font-mono font-bold" style=${{ color: T.muted, width: 42, textAlign: 'right' }}>${totalCal}</span>
                <div style=${{ width: 22 }} />
              </div>
            </div>
          </div>
        `}

        ${templates && templates.length > 0 && selected.length === 0 && html`
          <div style=${{ padding: '12px 20px 0' }}>
            <div className="text-xs font-bold mb-2" style=${{ color: T.sub }}>\u{1F4CB} ${LANG === 'en' ? 'My templates' : 'Mis plantillas'}</div>
            <div className="space-y-1.5">
              ${templates.map(tpl => html`
                <div key=${tpl.id} className="flex items-center gap-2">
                  <button onClick=${() => handleUseTemplate(tpl)}
                    className="flex-1 flex items-center gap-2 py-2.5 px-3 rounded-xl press-scale text-left"
                    style=${{ background: T.input, border: '1px solid ' + T.border }}>
                    <span className="text-xs font-semibold truncate" style=${{ color: T.text }}>${tpl.name}</span>
                    <span className="text-xs flex-shrink-0" style=${{ color: T.muted }}>${tpl.items.reduce((s, it) => s + it.protein, 0)}g P \u00B7 ${tpl.items.reduce((s, it) => s + it.cal, 0)} cal</span>
                  </button>
                  ${onDeleteTemplate && html`
                    <button onClick=${() => onDeleteTemplate(tpl.id)} className="press-scale" style=${{ color: T.muted, padding: 4 }}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  `}
                </div>
              `)}
            </div>
          </div>
        `}

        ${qtyPick ? html`
          <div style=${{ padding: '12px 20px' }}>
            <div className="rounded-xl fade-up" style=${{ padding: 16, background: T.elevated, border: '1px solid ' + T.accent + '40' }}>
              <div className="flex items-center gap-3 mb-3">
                <span style=${{ fontSize: 24 }}>${qtyPick.icon || foodIcon(qtyPick.name)}</span>
                <div>
                  <div className="text-sm font-bold" style=${{ color: T.text }}>${qtyPick.name}</div>
                  <div className="text-xs" style=${{ color: T.muted }}>${qtyPick.portion} \u00B7 ${qtyPick.cal} cal \u00B7 ${qtyPick.protein}g P</div>
                </div>
              </div>
              <div className="text-xs font-bold mb-2" style=${{ color: T.sub }}>${t('Cantidad')}</div>
              <div className="flex gap-2">
                ${qtyOptions.map(q => html`
                  <button key=${q} onClick=${() => addItem(qtyPick, q)}
                    className="flex-1 py-3 rounded-xl text-sm font-bold transition-all active:scale-[0.95]"
                    style=${{ background: q === 1 ? T.accent : T.input, color: q === 1 ? '#fff' : T.text, border: '1px solid ' + (q === 1 ? T.accent : T.border) }}>
                    ${q === 0.5 ? '\u00BD' : q === 1.5 ? '1\u00BD' : q}x
                  </button>
                `)}
              </div>
              <button onClick=${() => setQtyPick(null)} className="w-full mt-3 py-2 text-xs font-semibold" style=${{ color: T.muted }}>${t('Cancelar')}</button>
            </div>
          </div>
        ` : html`
          <div style=${{ padding: '12px 20px 0' }}>
            <input type="text" placeholder=${t('Buscar alimento...')} value=${query}
              onInput=${e => setQuery(e.target.value)}
              className="w-full py-3 px-4 rounded-xl"
              style=${{ background: T.input, border: '1px solid ' + T.border, color: T.text, fontSize: 15, fontFamily: 'Outfit, sans-serif' }} />
          </div>

          <div className="flex gap-2 px-5 py-3">
            ${[{ id: 'library', label: t('Biblioteca'), icon: '\u{1F4DA}' }, { id: 'recent', label: t('Recientes'), icon: '\u23F1' }].map(s => html`
              <button key=${s.id} onClick=${() => setFoodTab(s.id)}
                className="py-2 px-3.5 rounded-xl text-xs font-bold transition-all"
                style=${{ background: foodTab === s.id ? T.accentDim : T.input,
                  color: foodTab === s.id ? T.accent : T.muted, border: '1px solid ' + (foodTab === s.id ? T.accent + '40' : T.border) }}>

                <div className="text-sm mb-2" style=${{ color: T.muted }}>${t('No se encontr\u00F3')} "${query}"</div>
                <button onClick=${() => { setShowCustom(true); setCustomName(query); }}
                  className="text-xs font-bold px-4 py-2 rounded-xl"

                  <button key=${food.id || i} onClick=${() => setQtyPick(food)}
                    className="flex items-center w-full py-3 px-3.5 text-left transition-all active:scale-[0.98]"
                    style=${{ borderTop: i > 0 ? '1px solid ' + T.border : 'none', background: 'transparent' }}>
                    <span style=${{ fontSize: 18, marginRight: 10, flexShrink: 0 }}>${food.icon || foodIcon(food.name)}</span>

                      <div className="text-sm font-semibold truncate" style=${{ color: T.text }}>${food.name}</div>
                      <div className="text-xs" style=${{ color: T.muted }}>${food.portion}</div>
                    </div>
                    <span className="text-xs font-mono font-bold flex-shrink-0" style=${{ color: T.accent }}>${food.protein}g</span>
                    <span className="text-xs font-mono flex-shrink-0 ml-2" style=${{ color: T.muted }}>${food.cal}</span>
                    <svg className="ml-2 flex-shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke=${T.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

              </div>

                style=${{ color: T.accent, background: T.accentDim }}>

              <div className="rounded-xl mt-3 fade-up" style=${{ padding: 16, background: T.elevated, border: '1px solid ' + T.border }}>
                <div className="text-sm font-bold mb-3" style=${{ color: T.text }}>${t('Nuevo alimento')}</div>
                <div className="text-xs font-semibold mb-2" style=${{ color: T.sub }}>${t('\u00CDcono')}</div>

function WorkoutTimer({ startTime }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    if (!startTime) return;
    setElapsed(Math.floor((Date.now() - startTime) / 1000));
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
    return () => clearInterval(id);
  }, [startTime]);
  if (!startTime) return null;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  return html`
    <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 12, fontWeight: 700, color: T.accent, fontVariantNumeric: 'tabular-nums' }}>
      ${m}:${String(s).padStart(2, '0')}
    </span>
  `;
}

function calcVolume(exerciseStates, routine, unitPref) {
  if (!routine.exercises) return 0;
  let total = 0;
  exerciseStates.forEach((es, i) => {
    const ex = routine.exercises[i];
    if (!ex || ex.reps.toString().includes('s')) return; // skip planks
    es.sets.forEach(s => {
      if (s.done && s.weight > 0) {
        const reps = s.reps || parseInt(ex.reps) || 0;
        total += s.weight * reps;
      }
    });
  });
  return Math.round(total);
}

function formatVolume(vol) {
  if (vol >= 1000) return (vol / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(vol);
}

function LiveTab({ routine, exerciseStates, onExerciseUpdate, unitPref, workoutStartTime, pausedElapsed, onStartTimer, onPauseTimer, onStopTimer, dark, onThemeToggle, onLangToggle }) {
  const isPaused = pausedElapsed !== null;
  const [elapsed, setElapsed] = useState(isPaused ? pausedElapsed : 0);
  useEffect(() => {
    if (!workoutStartTime || isPaused) {
      if (isPaused) setElapsed(pausedElapsed);
      return;
    }
    const calc = () => setElapsed(Math.floor((Date.now() - workoutStartTime) / 1000));
    calc();
    const id = setInterval(calc, 1000);
    const onVis = () => { if (document.visibilityState === 'visible') calc(); };
    document.addEventListener('visibilitychange', onVis);
    return () => { clearInterval(id); document.removeEventListener('visibilitychange', onVis); };
  }, [workoutStartTime, isPaused, pausedElapsed]);

  const [confirmStop, setConfirmStop] = useState(false);
  const [confirmedDone, setConfirmedDone] = useState(false);
  const [expandedNext, setExpandedNext] = useState(false);
  const [cardioChoice, setCardioChoice] = useState(() => {
    if (!routine.cardio) return '';
    try { return localStorage.getItem('ds_cardio_choice_' + localDate()) || ''; } catch { return ''; }
  });
  const [showWarmup, setShowWarmup] = useState(true);
  const [warmupDone, setWarmupDone] = useState(() => {
    try { const v = JSON.parse(localStorage.getItem('ds_warmup_' + localDate()) || '[]'); return Array.isArray(v) ? v : []; } catch { return []; }
  });
  const [showStretching, setShowStretching] = useState(true);
  const [stretchDone, setStretchDone] = useState(() => {
    try { const v = JSON.parse(localStorage.getItem('ds_stretch_' + localDate()) || '[]'); return Array.isArray(v) ? v : []; } catch { return []; }
  });
  const warmupKey = routine.cardio && cardioChoice ? 'Cardio:' + cardioChoice : routine.name;
  const warmupExercises = WARMUP_ROUTINES[warmupKey] || [];
  const stretchExercises = STRETCHING_ROUTINES[warmupKey] || [];
  const [expandedWarmup, setExpandedWarmup] = useState(null);
  const [expandedStretch, setExpandedStretch] = useState(null);

  function toggleWarmup(idx) {
    const next = warmupDone.includes(idx) ? warmupDone.filter(i => i !== idx) : [...warmupDone, idx];
    setWarmupDone(next);
    try { localStorage.setItem('ds_warmup_' + localDate(), JSON.stringify(next)); } catch {}
    haptic([10]);
  }
  function toggleStretch(idx) {
    const next = stretchDone.includes(idx) ? stretchDone.filter(i => i !== idx) : [...stretchDone, idx];
    setStretchDone(next);
    try { localStorage.setItem('ds_stretch_' + localDate(), JSON.stringify(next)); } catch {}
    haptic([10]);
  }

  function pickCardio(key) {
    setCardioChoice(key);
    localStorage.setItem('ds_cardio_choice_' + localDate(), key);
    setWarmupDone([]);
    setStretchDone([]);
    localStorage.setItem('ds_warmup_' + localDate(), '[]');
    localStorage.setItem('ds_stretch_' + localDate(), '[]');
    haptic([10]);
  }

  // HIIT timer
  const [showHIIT, setShowHIIT] = useState(false);

  // Weekly coach
  const [showCoach, setShowCoach] = useState(false);
  const trainingWeek = getTrainingWeek();
  const recommendations = useMemo(() => getWeeklyRecommendations(routine, getTodayKey(), unitPref), [routine, unitPref]);
  const hasRecommendations = recommendations.some(r => r.status !== 'new');

  // Mood/energy check-in
  const moodKey = 'ds_mood_' + localDate();
  const [mood, setMood] = useState(() => {
    try { return Number(localStorage.getItem(moodKey)) || 0; } catch { return 0; }
  });
  const moods = [
    { emoji: '😫', label: t('Agotado') },
    { emoji: '😐', label: t('Normal') },
    { emoji: '😊', label: t('Bien') },
    { emoji: '💪🏼', label: t('Fuerte') },
    { emoji: '🔥', label: t('Imparable') },
  ];
  function pickMood(idx) {
    setMood(idx);
    try { localStorage.setItem(moodKey, String(idx)); } catch {}
    haptic([10]);
  }

  const totalSec = elapsed;
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const timerStr = h > 0 ? h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') : String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const startTimeStr = workoutStartTime ? new Date(workoutStartTime).toLocaleTimeString(LANG === 'en' ? 'en' : 'es', { hour: '2-digit', minute: '2-digit' }) : null;

  const exercises = routine.exercises || [];
  const currentIdx = exerciseStates.findIndex(e => !e.sets.every(s => s.done));
  const nextIdx = currentIdx >= 0 ? currentIdx + 1 : -1;
  const currentEx = currentIdx >= 0 ? exercises[currentIdx] : null;
  const currentState = currentIdx >= 0 ? exerciseStates[currentIdx] : null;
  const nextEx = nextIdx >= 0 && nextIdx < exercises.length ? exercises[nextIdx] : null;
  const gymDone = exerciseStates.filter(e => e.sets.every(s => s.done)).length;
  const gymTotal = exercises.length;
  const totalVolume = calcVolume(exerciseStates, routine, unitPref);
  const completedSets = exerciseStates.reduce((a, e) => a + e.sets.filter(s => s.done).length, 0);
  const totalSets = exerciseStates.reduce((a, e) => a + e.sets.length, 0);
  const allDone = gymDone === gymTotal && gymTotal > 0;
  const progressPct = gymTotal > 0 ? Math.round((gymDone / gymTotal) * 100) : 0;

  const prevCurrentIdx = useRef(currentIdx);
  useEffect(() => {
    if (currentIdx !== prevCurrentIdx.current) { setExpandedNext(false); prevCurrentIdx.current = currentIdx; }
  }, [currentIdx]);

  function toggleSet(exIdx, si) {
    const es = exerciseStates[exIdx];
    const newSets = es.sets.map((set, i) => i === si ? { ...set, done: !set.done } : set);
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
  }

  function completeExercise(exIdx) {
    const es = exerciseStates[exIdx];
    const newSets = es.sets.map(set => ({ ...set, done: true }));
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
  }

  function updateLiveSet(exIdx, si, field, val) {
    const es = exerciseStates[exIdx];
    const newSets = es.sets.map((s, i) => i === si ? { ...s, [field]: val } : s);
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
    if (newSets[si].done && field === 'weight' && val > 0) {
      saveRecord(exercises[exIdx].id, val, newSets[si].reps || 0, localDate(), unitPref);
    }
  }

  function fillLiveSets(exIdx) {
    const es = exerciseStates[exIdx];
    const first = es.sets[0];
    if (!first || !first.weight) return;
    const newSets = es.sets.map(s => s.done || s.weight ? s : { ...s, weight: first.weight, reps: first.reps || 0 });
    onExerciseUpdate(exIdx, { ...es, sets: newSets });
  }

  // Rest day (non-cardio)
  if (routine.rest && !routine.cardio) {
    return html`
      <div className="stagger">
        <div className="px-5 pt-2 pb-3 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <img src="logo-icon.png" alt="" style=${{ height: 28, width: 'auto' }} />
            <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, letterSpacing: '-1px', color: T.text }}>Live</div>
          </div>
          <div className="flex items-center gap-2">
            <${LangToggle} onToggle=${onLangToggle} />
            <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />

          ${showHIIT ? html`

              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

            </button>

        <div className="bottom-spacer" />
      </div>

                <div style=${{ fontSize: 13, color: T.sub }}>${LANG === 'en' ? selectedOption.descEn : selectedOption.desc}</div>
              </div>
            </div>

            ${stretchExercises.length > 0 ? html`
              <div className="px-5 mb-4 fade-up">

                    <span style=${{ fontSize: 16 }}>${'\uD83E\uDDD8\uD83C\uDFFC'}</span>
                    <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 14, fontWeight: 800, color: T.accent, letterSpacing: '-0.3px' }}>${t('Estiramientos post-entreno')}</span>
                    <span style=${{ fontSize: 11, fontWeight: 600, color: T.muted }}>${stretchDone.length}/${stretchExercises.length}</span>

                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke=${T.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style=${{ transition: 'transform 0.2s', transform: showStretching ? 'rotate(180deg)' : 'none' }}><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                ${showStretching ? html`
                  <div className="slide-down" style=${{ paddingTop: 4 }}>
                    <div style=${{ fontSize: 11, color: T.sub, marginBottom: 10, lineHeight: 1.4 }}>${t('Enfría y estira después de tu sesión')}</div>
                    ${stretchExercises.map((st, si) => html`
                      <div key=${si} className="flex items-center gap-3 py-2.5"
                        style=${{ borderBottom: si < stretchExercises.length - 1 ? '1px solid ' + T.border + '60' : 'none', opacity: stretchDone.includes(si) ? 0.5 : 1, transition: 'opacity 0.2s' }}>
                        <button onClick=${() => toggleStretch(si)} className="press-scale" style=${{ flexShrink: 0 }}>

                          }}>

                              ? html`<svg className="check-draw" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
                              : html`<span style=${{ fontSize: 14 }}>${st.emoji}</span>`

                            <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 11, fontWeight: 600, color: T.accent, flexShrink: 0 }}>${st.sets}${st.detail ? ' ' + t(st.detail) : ''}</span>
                          </div>
                          ${expandedStretch === si && st.howTo ? html`
                            ${st.gif ? html`<img src=${st.gif} alt=${st.nameEn || st.name} loading="lazy" style=${{ width: 120, height: 120, objectFit: 'contain', display: 'block', margin: '8px auto 4px', borderRadius: 10, background: T.input }} onError=${(e) => { e.target.style.display = 'none'; }} />` : ''}
                            <div style=${{ fontSize: 12, color: T.sub, lineHeight: 1.5, paddingTop: 6 }}>${LANG === 'en' ? st.howToEn : st.howTo}</div>
                          ` : ''}
                        </div>
                      </div>

                  </div>

              </div>

          <div className="text-center mt-2">
            <button onClick=${() => setShowHIIT(true)}
              className="inline-flex items-center gap-2 px-6 py-3 rounded-2xl press-scale"
              style=${{ background: T.green, boxShadow: '0 4px 24px rgba(22,163,74,0.3)' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 15, fontWeight: 800, color: '#fff' }}>HIIT Timer</span>
            </button>
          </div>
        `}

        <div className="bottom-spacer" />
      </div>
    `;
  }

  // Not started
  if (!workoutStartTime) {
    return html`
      <div className="stagger">
        <div className="px-5 pt-2 pb-3 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <img src="logo-icon.png" alt="" style=${{ height: 28, width: 'auto' }} />
            <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 28, fontWeight: 900, letterSpacing: '-1px', color: T.text }}>Live</div>
          </div>
          <div className="flex items-center gap-2">
            <${LangToggle} onToggle=${onLangToggle} />
            <${ThemeToggle} dark=${dark} onToggle=${onThemeToggle} />
          </div>
        </div>
        <div className="text-center px-5" style=${{ paddingTop: 24 }}>
          <div style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 60, fontWeight: 900, color: T.text + '12', letterSpacing: '-3px', lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>00:00</div>
          <div style=${{ marginTop: 16, marginBottom: 4 }}>
            <span style=${{ fontFamily: 'Outfit, sans-serif', fontSize: 18, fontWeight: 900, color: T.text, letterSpacing: '-0.5px' }}>${routine.name}</span>

          <div style=${{ marginBottom: 24 }}>

            <div className="flex justify-center gap-3">
              ${moods.map((m, i) => html`
                <button key=${i} onClick=${() => pickMood(i + 1)}
